<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Burger Shot — Connexion</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Barlow', sans-serif;
      background: #0d0d0d;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 20px;
    }
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(192,57,43,0.2);
      border-top-color: #c0392b;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .text {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 24px;
      letter-spacing: 2px;
      color: #c0392b;
    }
    .sub {
      font-size: 14px;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <div class="text">Vérification en cours...</div>
  <div class="sub">Authentification Discord</div>

  <script>
    // Redirige vers la fonction Netlify
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    if (code) {
      window.location.href = '/.netlify/functions/callback?code=' + code;
    } else {
      window.location.href = '/?error=nocode';
    }
  </script>
</body>
</html>
