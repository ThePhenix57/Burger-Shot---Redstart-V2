<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Burger Shot — Connexion</title>
<link rel="icon" href="https://upload.redstartrp.fr/uploads/photo-1779965966-13fd724e49fb.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--red:#c0392b;--bg:#0d0d0d;--card:#141414;--border:rgba(255,255,255,.07);--text:#f1f1f1;--muted:#777;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;}
.bg-glow{position:fixed;top:50%;left:50%;width:600px;height:600px;background:radial-gradient(ellipse,rgba(192,57,43,.12),transparent 70%);transform:translate(-50%,-50%);pointer-events:none;}
.checker{position:fixed;left:0;right:0;height:10px;background:repeating-linear-gradient(90deg,var(--red) 0,var(--red) 10px,#fff 10px,#fff 20px);}
.checker.top{top:0;}.checker.bottom{bottom:0;}
.login-card{position:relative;z-index:1;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:48px 52px;text-align:center;width:460px;max-width:94vw;box-shadow:0 40px 80px rgba(0,0,0,.5);}
.login-card::before{content:'';position:absolute;inset:0;border-radius:20px;background:linear-gradient(135deg,rgba(192,57,43,.06),transparent);pointer-events:none;}
.logo{width:180px;margin:0 auto 10px;}
.logo img{width:100%;filter:drop-shadow(0 0 20px rgba(192,57,43,.5));}
.brand{font-family:'Bebas Neue',sans-serif;font-size:42px;letter-spacing:4px;color:var(--red);margin-bottom:4px;}
.tagline{font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--muted);margin-bottom:36px;}
.sep{height:1px;background:var(--border);margin:0 -16px 28px;}
.connect-label{font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:16px;}
.btn-discord{display:inline-flex;align-items:center;justify-content:center;gap:12px;width:100%;padding:16px 24px;background:#5865F2;border:none;border-radius:12px;color:#fff;font-family:'Barlow',sans-serif;font-size:16px;font-weight:700;letter-spacing:.5px;cursor:pointer;transition:.25s;position:relative;overflow:hidden;}
.btn-discord::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.1),transparent);border-radius:12px;}
.btn-discord:hover{background:#4752C4;transform:translateY(-2px);box-shadow:0 12px 32px rgba(88,101,242,.4);}
.btn-discord:active{transform:translateY(0);}
.btn-discord svg{width:24px;height:24px;flex-shrink:0;}
.error-box{margin-top:20px;padding:12px 16px;background:rgba(192,57,43,.1);border:1px solid rgba(192,57,43,.3);border-radius:10px;font-size:13px;color:#e74c3c;display:none;}
.footer-note{margin-top:24px;font-size:11px;color:var(--muted);line-height:1.6;}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow"></div>
<div class="checker top"></div>
<div class="checker bottom"></div>

<div class="login-card">
  <div class="logo"><img src="https://upload.redstartrp.fr/uploads/photo-1779920811-a57e8bd11bf7.png" alt="Burger Shot" onerror="this.style.opacity=.3"></div>
  <div class="brand">BURGER SHOT</div>
  <div class="tagline">Espace Employé — RedStart RP</div>
  <div class="sep"></div>
  <div class="connect-label">Connexion requise</div>
  <button class="btn-discord" onclick="login()">
    <svg viewBox="0 0 71 55" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M60.1 4.9A58.5 58.5 0 0045.7 0.7a.2.2 0 00-.2.1 40.8 40.8 0 00-1.8 3.7 54 54 0 00-16.2 0A37.3 37.3 0 0025.7.8a.2.2 0 00-.2-.1A58.4 58.4 0 0011 4.9a.2.2 0 00-.1.1C1.6 18.7-.9 32.2.3 45.5a.2.2 0 00.1.2 58.8 58.8 0 0017.7 8.9.2.2 0 00.3-.1 42 42 0 003.6-5.9.2.2 0 00-.1-.3 38.7 38.7 0 01-5.5-2.6.2.2 0 010-.4l1.1-.8a.2.2 0 01.2 0c11.6 5.3 24.1 5.3 35.5 0a.2.2 0 01.2 0l1.1.8a.2.2 0 010 .4 36.1 36.1 0 01-5.5 2.6.2.2 0 00-.1.3c1.1 2 2.3 4 3.6 5.9a.2.2 0 00.3.1 58.6 58.6 0 0017.7-8.9.2.2 0 00.1-.2c1.5-15.5-2.5-29-10.5-41a.2.2 0 00-.1-.2zM23.7 37.3c-3.5 0-6.4-3.2-6.4-7.1s2.8-7.1 6.4-7.1c3.6 0 6.5 3.2 6.4 7.1 0 4-2.8 7.1-6.4 7.1zm23.7 0c-3.5 0-6.4-3.2-6.4-7.1s2.8-7.1 6.4-7.1c3.6 0 6.5 3.2 6.4 7.1 0 4-2.8 7.1-6.4 7.1z" fill="currentColor"/>
    </svg>
    Se connecter avec Discord
  </button>
  <div class="error-box" id="errorBox"></div>
  <div class="footer-note">Seuls les employés enregistrés par la direction peuvent accéder à cet espace.</div>
</div>

<script src="/config.js"></script>
<script>
const REDIRECT_URI = `${window.location.origin}/api/callback`;

function login() {
  const url = `https://discord.com/oauth2/authorize`
    + `?client_id=${BS_CONFIG.DISCORD_CLIENT_ID}`
    + `&redirect_uri=${encodeURIComponent(REDIRECT_URI)}`
    + `&response_type=code`
    + `&scope=identify`;
  window.location.href = url;
}

(function checkExistingSession() {
  const err = new URLSearchParams(location.search).get('error');
  if (err) return;
  try {
    const gouv = localStorage.getItem('bs_gouv_user');
    if (gouv) {
      const g = JSON.parse(gouv);
      if (g?.id && g?.role === 'gouvernement') {
        location.replace('/dashboard.html');
        return;
      }
    }
    const emp = localStorage.getItem('bs_user');
    if (emp) {
      const u = JSON.parse(emp);
      if (u?.id) {
        location.replace('/dashboard.html');
      }
    }
  } catch {}
})();

const err = new URLSearchParams(location.search).get('error');
if (err) {
  const box = document.getElementById('errorBox');
  const msgs = {
    not_registered: '❌ Votre compte Discord n\'est pas enregistré. Contactez la direction.',
    no_code:        '❌ Connexion annulée.',
    server_error:   '❌ Erreur serveur. Réessayez.',
    missing_env:    '❌ Configuration serveur incomplète. Contactez l\'administrateur.',
    no_token:       '❌ Échec de l\'authentification Discord. Vérifiez la configuration OAuth.',
    storage_error:  '❌ Impossible d\'enregistrer la session. Vérifiez les cookies / stockage du navigateur.',
    inactive:       '❌ Votre compte employé est désactivé. Contactez la direction.',
    parse_error:    '❌ Session invalide. Réessayez de vous connecter.',
  };
  box.textContent = msgs[err] || '❌ Erreur inconnue.';
  box.style.display = 'block';
}
</script>
</body>
</html>
