<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Burger Shot — Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --red: #c0392b; --red-dark: #922b21; --orange: #e67e22;
      --bg: #0d0d0d; --bg-card: #111111; --bg-card2: #1a1a1a;
      --text: #f0f0f0; --text-muted: #888; --border: rgba(255,255,255,0.08);
      --success: #27ae60; --warning: #f39c12; --sidebar-width: 240px;
    }
    [data-theme="light"] {
      --bg: #f0ece6; --bg-card: #ffffff; --bg-card2: #f5f0ea;
      --text: #1a1a1a; --text-muted: #666; --border: rgba(0,0,0,0.1);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Barlow',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; transition:background .3s,color .3s; }

    /* SIDEBAR */
    .sidebar {
      position:fixed;left:0;top:0;bottom:0;width:var(--sidebar-width);
      background:var(--bg-card);border-right:1px solid var(--border);
      display:flex;flex-direction:column;z-index:100;overflow:hidden;
    }
    .sidebar-logo {
      padding:20px 16px;border-bottom:1px solid var(--border);
      display:flex;align-items:center;gap:10px;flex-shrink:0;
    }
    .sidebar-logo-img { width:38px;height:38px;border-radius:10px;object-fit:cover;flex-shrink:0; }
    .sidebar-logo-text { font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:var(--red);line-height:1; }
    .sidebar-logo-sub { font-size:10px;color:var(--text-muted);letter-spacing:1px;margin-top:2px; }

    /* NAV ZONE — quadrillage rouge/blanc avec séparateur bleu marine */
    .sidebar-nav-zone {
      flex:1;min-height:0;overflow-y:auto;
      position:relative;
      /* Quadrillage rouge + blanc semi-transparent */
      background-color: #0d0d0d;
      background-image:
        linear-gradient(rgba(192,57,43,0.13) 1px, transparent 1px),
        linear-gradient(90deg, rgba(192,57,43,0.13) 1px, transparent 1px),
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 32px 32px, 32px 32px, 8px 8px, 8px 8px;
    }
    [data-theme="light"] .sidebar-nav-zone {
      background-color: #f0ece6;
      background-image:
        linear-gradient(rgba(192,57,43,0.15) 1px, transparent 1px),
        linear-gradient(90deg, rgba(192,57,43,0.15) 1px, transparent 1px),
        linear-gradient(rgba(0,0,0,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,0.04) 1px, transparent 1px);
      background-size: 32px 32px, 32px 32px, 8px 8px, 8px 8px;
    }

    /* Séparateur bleu marine entre nav-zone et user-zone */
    .sidebar-nav-separator {
      height: 3px;
      flex-shrink: 0;
      background: linear-gradient(90deg, #0a1628, #1a3a6b, #0d2444, #0a1628);
      box-shadow: 0 0 8px rgba(26,58,107,0.8), 0 0 16px rgba(26,58,107,0.4);
      position: relative;
      z-index: 2;
    }

    .sidebar-nav { padding:12px 0;display:flex;flex-direction:column;gap:2px; }
    .nav-section {
      padding:10px 16px 4px;font-size:10px;letter-spacing:2px;
      text-transform:uppercase;color:rgba(255,255,255,0.35);
      text-shadow: 0 0 8px rgba(192,57,43,0.5);
    }
    [data-theme="light"] .nav-section { color:rgba(0,0,0,0.35); text-shadow:none; }
    .nav-item {
      display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;
      transition:all .2s;border-left:3px solid transparent;
      font-size:14px;font-weight:500;color:rgba(240,240,240,0.6);
      position:relative;
    }
    [data-theme="light"] .nav-item { color:rgba(26,26,26,0.6); }
    .nav-item:hover {
      background:rgba(192,57,43,0.12);
      color:var(--text);
      backdrop-filter: blur(4px);
    }
    .nav-item.active {
      background:rgba(192,57,43,0.18);
      border-left-color:var(--red);
      color:#fff;
      backdrop-filter: blur(4px);
      box-shadow: inset 0 0 20px rgba(192,57,43,0.1);
    }
    [data-theme="light"] .nav-item.active { color:var(--text); }
    .nav-icon { font-size:16px;width:20px;text-align:center; }
    .role-hidden { display:none!important; }

    /* USER ZONE en bas */
    .sidebar-user-zone {
      flex-shrink:0;
      background: var(--bg-card);
      padding: 14px 16px 10px;
    }
    .user-card {
      display:flex;align-items:center;gap:10px;
      padding:10px 12px;
      background:var(--bg-card2);
      border:1px solid var(--border);
      border-radius:10px;
      margin-bottom:10px;
    }
    .user-avatar {
      width:34px;height:34px;border-radius:50%;background:var(--red);
      display:flex;align-items:center;justify-content:center;
      font-weight:700;font-size:13px;overflow:hidden;flex-shrink:0;
    }
    .user-avatar img { width:100%;height:100%;object-fit:cover; }
    .user-info { flex:1;min-width:0; }
    .user-name { font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
    .user-role { font-size:11px;color:var(--orange);text-transform:uppercase;letter-spacing:1px; }

    /* BOUTON DÉCONNEXION */
    .logout-btn {
      width:100%;
      padding:9px 16px;
      background:#c0392b;
      color:#fff;
      border:none;
      border-radius:8px;
      font-family:'Barlow',sans-serif;
      font-size:13px;
      font-weight:700;
      letter-spacing:1px;
      text-transform:uppercase;
      cursor:pointer;
      position:relative;
      overflow:hidden;
      transition:background .2s, box-shadow .2s;
      box-shadow:
        0 0 0 1px rgba(192,57,43,0.6),
        0 0 8px rgba(192,57,43,0.4),
        0 0 16px rgba(192,57,43,0.15);
    }
    .logout-btn::before {
      content:'';
      position:absolute;
      top:-50%;left:-60%;
      width:40%;height:200%;
      background:rgba(255,255,255,0.25);
      transform:skewX(-20deg);
      transition:left .4s ease;
    }
    .logout-btn:hover {
      background:#a93226;
      box-shadow:
        0 0 0 1px rgba(192,57,43,0.9),
        0 0 12px rgba(192,57,43,0.7),
        0 0 24px rgba(192,57,43,0.3);
    }
    .logout-btn:hover::before { left:130%; }

    /* MAIN */
    .main { margin-left:var(--sidebar-width);min-height:100vh;display:flex;flex-direction:column;width:calc(100% - var(--sidebar-width)); }
    .topbar { position:sticky;top:0;z-index:50;padding:16px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg);backdrop-filter:blur(10px); }
    .page-title { font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:2px; }
    .topbar-right { display:flex;align-items:center;gap:12px; }
    .theme-btn { background:var(--bg-card2);border:1px solid var(--border);color:var(--text);width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .2s; }
    .theme-btn:hover { border-color:var(--red);transform:scale(1.1); }
    .content { flex:1;padding:28px;width:100%; }
    .page { display:none;width:100%; }
    .page.active { display:block; }

    /* COMPOSANTS */
    .card { background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:24px; }
    .card-title { font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;margin-bottom:16px;color:var(--red); }
    .grid-2 { display:grid;grid-template-columns:1fr 1fr;gap:16px; }
    .grid-3 { display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px; }
    .grid-4 { display:grid;grid-template-columns:repeat(4,1fr);gap:16px; }
    .stat-card { background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:20px;text-align:center; }
    .stat-value { font-family:'Bebas Neue',sans-serif;font-size:36px;color:var(--red); }
    .stat-label { font-size:12px;color:var(--text-muted);letter-spacing:1px;text-transform:uppercase;margin-top:4px; }
    .form-group { margin-bottom:16px; }
    .form-label { display:block;font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted);margin-bottom:6px; }
    .form-input,.form-select { width:100%;padding:10px 14px;background:var(--bg-card2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Barlow',sans-serif;font-size:14px;transition:border-color .2s; }
    .form-input:focus,.form-select:focus { outline:none;border-color:var(--red); }
    .form-select option { background:var(--bg-card2); }
    .btn { padding:10px 20px;border-radius:8px;border:none;font-family:'Barlow',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:.5px; }
    .btn-primary { background:var(--red);color:#fff; }
    .btn-primary:hover { background:var(--red-dark);transform:translateY(-1px); }
    .btn-success { background:var(--success);color:#fff; }
    .btn-success:hover { opacity:.9; }
    .btn-danger { background:var(--red);color:#fff; }
    .btn-danger:hover { background:var(--red-dark); }
    .btn-outline { background:transparent;color:var(--text);border:1px solid var(--border); }
    .btn-outline:hover { border-color:var(--red);color:var(--red); }
    table { width:100%;border-collapse:collapse; }
    th { text-align:left;padding:10px 12px;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted);border-bottom:1px solid var(--border); }
    td { padding:12px;font-size:14px;border-bottom:1px solid var(--border); }
    tr:last-child td { border-bottom:none; }
    tr:hover td { background:var(--bg-card2); }
    .badge { display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.5px; }
    .badge-red { background:rgba(192,57,43,.2);color:var(--red); }
    .badge-orange { background:rgba(230,126,34,.2);color:var(--orange); }
    .badge-green { background:rgba(39,174,96,.2);color:var(--success); }
    .badge-blue { background:rgba(52,152,219,.2);color:#3498db; }
    .badge-gold { background:rgba(241,196,15,.2);color:#f1c40f; }
    .alert { padding:12px 16px;border-radius:8px;font-size:14px;margin-bottom:16px; }
    .alert-success { background:rgba(39,174,96,.1);border:1px solid rgba(39,174,96,.3);color:var(--success); }
    .alert-error { background:rgba(192,57,43,.1);border:1px solid rgba(192,57,43,.3);color:var(--red); }
    .red-line { height:3px;background:linear-gradient(90deg,var(--red),var(--orange));border-radius:2px;margin-bottom:24px; }

    /* CAISSE */
    .caisse-layout { display:grid;grid-template-columns:1fr 360px;gap:24px;align-items:start;width:100%; }
    .caisse-categorie { margin-bottom:24px; }
    .caisse-categorie-title { font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--text-muted);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border); }
    .caisse-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px; }
    .caisse-produit { background:var(--bg-card2);border:1px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;transition:all .2s;text-align:center; }
    .caisse-produit:hover { transform:translateY(-2px);border-color:var(--red);box-shadow:0 4px 12px rgba(192,57,43,.2); }
    .caisse-produit img { width:56px;height:56px;object-fit:contain;margin-bottom:8px; }
    .caisse-produit-nom { font-size:13px;font-weight:600;margin-bottom:4px; }
    .caisse-produit-prix { font-size:12px;color:var(--red);font-weight:700; }
    .caisse-produit-pts { font-size:11px;color:var(--text-muted); }

    /* TICKET */
    .ticket-wrapper { position:sticky;top:80px; }
    .ticket-thermal { width:100%;background:#f5f1e8;color:#111;border-radius:12px;padding:24px;font-family:'Courier New',monospace;box-shadow:0 10px 30px rgba(0,0,0,.4); }
    [data-theme="light"] .ticket-thermal { box-shadow:0 4px 20px rgba(0,0,0,.15); }
    .ticket-logo { text-align:center;font-size:22px;font-weight:bold;margin-bottom:14px;letter-spacing:2px; }
    .ticket-info { font-size:12px;margin-bottom:10px;color:#444; }
    .ticket-separator { border:none;border-top:1px dashed #999;margin:12px 0; }
    .ticket-articles { min-height:60px; }
    .ticket-line { display:flex;justify-content:space-between;margin-bottom:6px;font-size:13px; }
    .ticket-empty { text-align:center;color:#999;font-size:13px;padding:20px 0; }
    .ticket-total-block { margin-top:10px; }
    .ticket-total { font-size:18px;font-weight:bold;text-align:right; }
    .ticket-reduc { font-size:13px;color:#c0392b;text-align:right;margin-top:4px; }
    .ticket-points-info { font-size:12px;color:#444;text-align:right;margin-top:4px; }
    .ticket-meta { margin-top:10px;font-size:12px;color:#555; }
    .ticket-buttons { display:flex;gap:10px;margin-top:18px; }
    .ticket-buttons .btn { flex:1; }
    .client-results { margin-bottom:12px; }

    /* PRODUIT CARDS */
    .produit-card { background:var(--bg-card2);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center;position:relative; }
    .produit-card img { width:56px;height:56px;object-fit:contain;margin-bottom:8px; }
    .produit-card-nom { font-size:13px;font-weight:600;margin-bottom:4px; }
    .produit-card-prix { font-size:12px;color:var(--red); }
    .produit-card-pts { font-size:11px;color:var(--text-muted); }
    .produit-card-actions { position:absolute;top:6px;right:6px;display:flex;gap:4px; }
    .produit-card-actions button { background:none;border:none;cursor:pointer;font-size:14px;padding:2px; }

    /* STATS */
    .stats-section { margin-bottom:32px; }
    .stats-section-title { font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;color:var(--text-muted);margin-bottom:12px; }
    .coffre-card { background:linear-gradient(135deg,rgba(192,57,43,.15),rgba(230,126,34,.1));border:1px solid rgba(192,57,43,.3);border-radius:12px;padding:24px; }

    /* POPUP */
    .popup-overlay { position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:9999; }
    .popup-box { width:500px;max-width:95vw;background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:24px;max-height:90vh;overflow-y:auto; }
    .popup-title { font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;color:var(--red);margin-bottom:16px; }
  </style>
</head>
<body>
<div id="app" style="display:none;">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-logo">
      <img class="sidebar-logo-img" src="https://upload.redstartrp.fr/uploads/photo-1779909454-241fe4af9eb4.png" onerror="this.style.display='none'">
      <div>
        <div class="sidebar-logo-text">Burger Shot</div>
        <div class="sidebar-logo-sub">Espace Employé</div>
      </div>
    </div>
    <div class="sidebar-nav-zone">
      <nav class="sidebar-nav" id="sidebarNav">
        <!-- injecté par JS selon rôle -->
      </nav>
    </div>
    <div class="sidebar-nav-separator"></div>
    <div class="sidebar-user-zone">
      <div class="user-card">
        <div class="user-avatar" id="userAvatar"></div>
        <div class="user-info">
          <div class="user-name" id="userName">—</div>
          <div class="user-role" id="userRole">—</div>
        </div>
      </div>
      <button class="logout-btn" onclick="logout()">🚪 Déconnexion</button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <div class="page-title" id="pageTitle">Accueil</div>
      <div class="topbar-right">
        <div style="font-size:13px;color:var(--text-muted);" id="topDate"></div>
        <button class="theme-btn" onclick="toggleTheme()" id="themeBtn" title="Changer le thème">☀️</button>
      </div>
    </div>
    <div class="content" id="mainContent">
      <!-- Pages injectées dynamiquement -->
    </div>
  </div>
</div>

<!-- POPUP VALIDATION COMMANDE -->
<div id="popupValidation" class="popup-overlay" style="display:none;">
  <div class="popup-box">
    <div class="popup-title">✅ Validation commande</div>
    <div id="popupRecap"></div>
    <div style="display:flex;gap:10px;margin-top:20px;">
      <button class="btn btn-outline" onclick="fermerPopup('popupValidation')">❌ Retour</button>
      <button class="btn btn-success" onclick="validerCommande()">✅ Confirmer</button>
    </div>
  </div>
</div>

<!-- POPUP PASS CLIENT -->
<div id="popupPass" class="popup-overlay" style="display:none;">
  <div class="popup-box">
    <div class="popup-title">🪪 Enregistrer un Pass</div>
    <p style="color:var(--text-muted);font-size:14px;margin-bottom:16px;">Sélectionnez le client et le type de pass.</p>
    <div class="form-group">
      <label class="form-label">Recherche client</label>
      <input class="form-input" id="passClientSearch" placeholder="Nom du client...">
    </div>
    <div id="passClientResults" style="margin-bottom:12px;"></div>
    <div id="passClientSelectionne" style="display:none;margin-bottom:12px;padding:10px;background:var(--bg-card2);border-radius:8px;font-size:14px;"></div>
    <div class="form-group">
      <label class="form-label">Type de pass</label>
      <select class="form-select" id="passType"></select>
    </div>
    <div id="passInfo" style="font-size:13px;color:var(--text-muted);margin-bottom:16px;"></div>
    <div style="display:flex;gap:10px;">
      <button class="btn btn-outline" onclick="fermerPopup('popupPass')">Annuler</button>
      <button class="btn btn-primary" onclick="confirmerPass()">✅ Enregistrer le pass</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://jztrbqkbunxiacofqhic.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp6dHJicWtidW54aWFjb2ZxaGljIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4MjY2NTcsImV4cCI6MjA5NTQwMjY1N30.E9TJtGn3eBQJCE2HmgKmmETyvu_1dufmm3EvJzuTHgY';
const DIRECTION_IDS = ['280415204477501451','1157333780898529333','370510144766738432'];
const GOUVERNEMENT_IDS = []; // Ajoute ici les IDs Discord gouvernement

let currentUser = null;
let currentRole = 'employe'; // employe | direction | gouvernement
let produitsCaisse = [];
let passTypes = [];
let commande = [];
let selectedClient = null;
let selectedPassClient = null;

// ── NAVIGATION CONFIG ──
const NAV_CONFIG = {
  employe: [

    { section: 'Caisse' },

// ── INIT ──
window.addEventListener('DOMContentLoaded', async () => {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  const username = params.get('username');
  const avatar = params.get('avatar');

function buildNav() {
  const nav = document.getElementById('sidebarNav');
  const items = NAV_CONFIG[currentRole] || NAV_CONFIG.employe;
  nav.innerHTML = items.map(item => {
    if (item.section) return `<div class="nav-section">${item.section}</div>`;
    return `<div class="nav-item" id="nav-${item.id}" onclick="showPage('${item.id}',this)">
      <span class="nav-icon">${item.icon}</span> ${item.label}
    </div>`;
  }).join('');
}

function showPage(name, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const page = document.getElementById('page-'+name);
  if (page) page.classList.add('active');
  const navEl = el || document.getElementById('nav-'+name);
  if (navEl) navEl.classList.add('active');
  const titles = {
    accueil:'Accueil', caisse:'Caisse', clients:'Clients',
    'enregistrer-client':'Nouveau Client', employes:'Employés',
    'ajouter-employe':'Ajouter un Employé', menu:'Gestion du Menu',
    stats:'Statistiques', coffre:'Coffre', contrats:'Contrats', primes:'Primes'
  };
  document.getElementById('pageTitle').textContent = titles[name] || name;
  if (name==='clients') loadClients();
  if (name==='employes') loadEmployes();
  if (name==='menu') loadProduits();
  if (name==='caisse') loadCaisseProduits();
  if (name==='stats') loadStats();
  if (name==='coffre') loadCoffre();
  if (name==='contrats') loadContrats();
  if (name==='primes') loadPrimes();
  if (name==='accueil') loadAccueil();
}

// ── SUPABASE ──
async function supabaseFetch(endpoint, options={}) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${endpoint}`, {
    headers: {
      'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json', 'Prefer': 'return=representation',
      ...options.headers
    }, ...options
  });
  try { return await res.json(); } catch(e) { return []; }
}

function getSemaine() {
  const now = new Date();
  const d = new Date(Date.UTC(now.getFullYear(), now.getMonth(), now.getDate()));
  const dayNum = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  const weekNo = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
  return `${d.getUTCFullYear()}-W${String(weekNo).padStart(2,'0')}`;
}

function calcImpot(montant) {
  if (montant < 200000) return 0;
  if (montant < 400000) return montant * 0.05;
  if (montant < 600000) return montant * 0.08;
  if (montant < 800000) return montant * 0.11;
  if (montant < 1000000) return montant * 0.14;
  if (montant < 2500000) return montant * 0.17;
  return montant * 0.19;
}

function tauxImpot(montant) {
  if (montant < 200000) return '0%';
  if (montant < 400000) return '5%';
  if (montant < 600000) return '8%';
  if (montant < 800000) return '11%';
  if (montant < 1000000) return '14%';
  if (montant < 2500000) return '17%';
  return '19%';
}

// ── ACCUEIL ──
async function loadAccueil() {
  const [clients, employes, passActifs, commandes] = await Promise.all([
    supabaseFetch('clients?select=id'),
    supabaseFetch('employes?select=id&actif=eq.true'),
    supabaseFetch('clients?select=id&pass=not.is.null'),
    supabaseFetch(`commandes?select=total&semaine=eq.${getSemaine()}`)
  ]);
  const ca = Array.isArray(commandes) ? commandes.reduce((a,c)=>a+(c.total||0),0) : 0;
  document.getElementById('accueilStats').innerHTML = [
    { v: Array.isArray(clients)?clients.length:0, l: 'Clients' },
    { v: Array.isArray(employes)?employes.length:0, l: 'Employés actifs' },
    { v: Array.isArray(passActifs)?passActifs.length:0, l: 'Pass actifs' },
    { v: ca.toLocaleString('fr-FR')+'$', l: 'CA semaine' },
  ].map(s=>`<div class="stat-card"><div class="stat-value">${s.v}</div><div class="stat-label">${s.l}</div></div>`).join('');
}

  let image_url=null;
  if (imageFile) {
    const fileName=`${Date.now()}_${imageFile.name.replace(/\s/g,'_')}`;
    const uploadRes=await fetch(`${SUPABASE_URL}/storage/v1/object/produits/${fileName}`,{method:'POST',headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`,'Content-Type':imageFile.type},body:imageFile});

function updateContrat() {
  const sel=document.getElementById('caisseContrat');
  const opt=sel.options[sel.selectedIndex];
  commandeContrat = sel.value ? { id:sel.value, pct:parseFloat(opt.dataset.pct), nom:opt.text } : null;
  renderTicket();
}

function ajouterAuTicket(id) {
  const p=produitsCaisse.find(p=>p.id===id);
  if (!p) return;
  const exist=commande.find(c=>c.id===id);
  if (exist) exist.quantite++;
  else commande.push({...p,quantite:1});
  renderTicket();
}

function calcTotalCommande() {
  const brut = commande.reduce((a,b)=>a+(b.prix*b.quantite),0);
  let reduction=0;
  // Pass du client
  if (selectedClient?.pass) {
    const pt=passTypes.find(p=>p.nom===selectedClient.pass);
    if (pt && pt.reduction>0) reduction=Math.max(reduction,parseFloat(pt.reduction));
  }
  // Contrat
  if (commandeContrat) reduction=Math.max(reduction,commandeContrat.pct);
  const montantReduc=Math.round(brut*reduction/100);
  return { brut, reduction, montantReduc, net:brut-montantReduc };
}

function calcPoints() {
  if (!selectedClient || !selectedClient.pass) return 0;
  const pt=passTypes.find(p=>p.nom===selectedClient.pass);
  const mult=pt?parseFloat(pt.multiplicateur):0;
  return Math.round(commande.reduce((a,b)=>a+(b.points*b.quantite),0)*mult);
}

function renderTicket() {
  const el=document.getElementById('ticketArticles');
  if (!commande.length) {
    el.innerHTML='<div class="ticket-empty">Aucune commande</div>';
  } else {
    el.innerHTML=commande.map(p=>`
      <div class="ticket-line">
        <div>${p.nom} ×${p.quantite} <span style="font-size:11px;color:#888;">🎯${p.points*p.quantite}pts</span></div>
        <div>${p.prix*p.quantite}$</div>
      </div>`).join('');
  }
  const {brut,reduction,montantReduc,net}=calcTotalCommande();
  const pts=calcPoints();
  document.getElementById('ticketTotal').textContent=brut+'$';
  const reducEl=document.getElementById('ticketReduc');
  if (reduction>0) {
    reducEl.style.display='block';
    reducEl.textContent=`Réduction -${reduction}% : -${montantReduc}$ → ${net}$`;
  } else {
    reducEl.style.display='none';
  }
  const ptsEl=document.getElementById('ticketPointsInfo');
  if (pts>0) ptsEl.textContent=`🎯 +${pts} points gagné${pts>1?'s':''}`;
  else ptsEl.textContent='';
  document.getElementById('ticketClient').textContent=selectedClient?`${selectedClient.prenom} ${selectedClient.nom}`:'Inconnu';
  const passInfoEl=document.getElementById('ticketPassInfo');
  if (selectedClient?.pass) {
    const pt=passTypes.find(p=>p.nom===selectedClient.pass);
    passInfoEl.textContent=`${selectedClient.pass} • ×${pt?pt.multiplicateur:1} pts${pt&&pt.reduction>0?' • -'+pt.reduction+'%':''}`;
  } else passInfoEl.textContent='';
  document.getElementById('ticketEmploye').textContent=currentUser?.username||'—';
}

function genererTicket() {
  const now=new Date();
  const dd=String(now.getDate()).padStart(2,'0');
  const mm=String(now.getMonth()+1).padStart(2,'0');
  const yyyy=now.getFullYear();
  const hh=String(now.getHours()).padStart(2,'0');
  const min=String(now.getMinutes()).padStart(2,'0');
  document.getElementById('ticketId').textContent=`BS-${dd}${mm}${yyyy}${hh}${min}-001`;
  document.getElementById('ticketDate').textContent=now.toLocaleString('fr-FR');
  renderTicket();
}

async function validerCommande() {
  const {brut,reduction,montantReduc,net}=calcTotalCommande();
  const pts=calcPoints();
  const semaine=getSemaine();
  // Enregistrer commande
  await supabaseFetch('commandes',{method:'POST',body:JSON.stringify({
    client_id:selectedClient?.id||null,
    employe_discord_id:currentUser.id,
    items:JSON.stringify(commande),
    total:brut,
    reduction_pct:reduction,
    total_apres_reduction:net,
    points_gagnes:pts,
    paye_par_points:false,
    contrat_id:commandeContrat?.id||null,
    semaine
  })});
  // Ajouter points au client
  if (selectedClient && pts>0) {
    await supabaseFetch(`clients?id=eq.${selectedClient.id}`,{
      method:'PATCH',
      body:JSON.stringify({points:(selectedClient.points||0)+pts})
    });
  }
  // Transaction
  await supabaseFetch('transactions',{method:'POST',body:JSON.stringify({
    montant:net,type:'vente',employe_discord:currentUser.id,
    client_id:selectedClient?.id||null,semaine
  })});
  // Mettre à jour le CA dans parametres
  const caData=await supabaseFetch('parametres?cle=eq.ca_semaine');
  const caActuel=parseFloat(Array.isArray(caData)&&caData[0]?caData[0].valeur:0)||0;
  await supabaseFetch('parametres?cle=eq.ca_semaine',{method:'PATCH',body:JSON.stringify({valeur:String(caActuel+net)})});

  fermerPopup('popupValidation');
  alert('✅ Commande validée !');
  commande=[];selectedClient=null;commandeContrat=null;
  document.getElementById('clientSearch').value='';
  document.getElementById('clientResults').innerHTML='';
  if (document.getElementById('caisseContrat')) document.getElementById('caisseContrat').value='';
  genererTicket();
}

async function calculerPrimes() {
  const semaine=getSemaine();
  const [employes,caData]=await Promise.all([
    supabaseFetch('employes?select=*&actif=eq.true'),
    supabaseFetch('parametres?cle=eq.ca_semaine')
  ]);
  const ca=parseFloat(Array.isArray(caData)&&caData[0]?caData[0].valeur:0)||0;
  if (ca===0) { alert('CA de la semaine = 0$. Pas de primes à calculer.'); return; }

  const taux={
    'Patron':0.4,'Co-Patron':0.4,'Manager':0.3,"Chef d'équipe":0.3,'Employé':0
  };
  const tauxContrat={'CDI':0.2,'CDD':0.1};

  for (const emp of (Array.isArray(employes)?employes:[])) {
    // Direction/Management → taux poste, sinon taux contrat
    const t = (emp.poste==='Employé') ? (tauxContrat[emp.contrat]||0.1) : (taux[emp.poste]||0.1);
    const montant=Math.round(ca*t);
    if (montant>0) {
      // Vérifier si prime déjà calculée
      const exist=await supabaseFetch(`primes?employe_id=eq.${emp.id}&semaine=eq.${semaine}`);
      if (!Array.isArray(exist)||!exist.length) {
        await supabaseFetch('primes',{method:'POST',body:JSON.stringify({
          employe_id:emp.id,employe_discord:emp.discord_id,montant,semaine,verse:false
        })});
      }
    }
  }
  alert('✅ Primes calculées !');
  loadPrimes();
}

async function verserPrime(id) {
  await supabaseFetch(`primes?id=eq.${id}`,{method:'PATCH',body:JSON.stringify({verse:true})});
  loadPrimes();
}

    {min:2500000,max:Infinity,taux:'19%'}
  ];
  document.getElementById('statsImpots').innerHTML=`
    <table><thead><tr><th>Tranche</th><th>Taux</th><th>Statut</th></tr></thead><tbody>
    ${paliers.map(p=>`<tr>
      <td>${p.min.toLocaleString('fr-FR')}$ — ${p.max===Infinity?'+∞':p.max.toLocaleString('fr-FR')+'$'}</td>
      <td><span class="badge badge-blue">${p.taux}</span></td>
      <td>${ca>=p.min&&ca<=(p.max===Infinity?Infinity:p.max)?'<span class="badge badge-orange">📍 Votre tranche</span>':''}</td>
    </tr>`).join('')}</tbody></table>
  `;
}

// ── UTILS ──
function fermerPopup(id) { document.getElementById(id).style.display='none'; }
function logout() { window.location.href='/'; }
</script>
