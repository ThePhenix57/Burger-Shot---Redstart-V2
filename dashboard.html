<!DOCTYPE html>
<html lang="fr">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Burger Shot — Dashboard</title>

  <style>
    :root {
      --red: #c0392b;
      --red-dark: #922b21;
      --navy: #1a2744;
      --orange: #e67e22;
      --bg: #0d0d0d;
      --bg-card: #111111;
      --bg-card2: #1a1a1a;
      --text: #f0f0f0;
      --text-muted: #888;
      --border: rgba(255,255,255,0.08);
      --success: #27ae60;
      --warning: #f39c12;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Barlow', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* SIDEBAR */
    .sidebar {
      position: fixed;
      left: 0; top: 0; bottom: 0;
      width: 240px;
      background: var(--bg-card);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      z-index: 100;
    }
    .sidebar-logo {
      padding: 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .sidebar-logo-text {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 2px;
      color: var(--red);
    }
    .sidebar-logo-sub {
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 1px;
    }
    .sidebar-nav {
      flex: 1;
      padding: 16px 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .nav-section {
      padding: 8px 16px 4px;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      cursor: pointer;
      transition: all 0.2s;
      border-left: 3px solid transparent;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-muted);
    }
    .nav-item:hover { background: var(--bg-card2); color: var(--text); }
    .nav-item.active {
      background: rgba(192,57,43,0.1);
      border-left-color: var(--red);
      color: var(--text);
    }
    .nav-item.direction-only { display: none; }
    .nav-icon { font-size: 18px; width: 20px; text-align: center; }
    .sidebar-user {
      padding: 16px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }
