async function loadEmployes(){
  const el=document.getElementById('empGrid');if(!el)return;
  if(!el.innerHTML.trim())el.innerHTML='<div class="loading"><div class="spin"></div></div>';
  const semaine=getSemaine();
  const filt=document.getElementById('empFilterStatut')?.value||'';
  let base='comptes_dashboard?select=*&role=neq.gouvernement&order=created_at.desc';
  if(filt==='actif')base='comptes_dashboard?select=*&role=neq.gouvernement&statut_activite=eq.actif&actif=eq.true&order=created_at.desc';
  else if(filt==='absent')base='comptes_dashboard?select=*&role=neq.gouvernement&statut_activite=eq.absent&actif=eq.true&order=created_at.desc';
  else if(filt==='inactif')base='comptes_dashboard?select=*&role=neq.gouvernement&statut_activite=eq.inactif&actif=eq.true&order=created_at.desc';
  const [data,cmds,primesData,contratsData]=await Promise.all([
  sb(base),
  sb(`commandes?select=employe_discord_id,total_apres_reduction,total&semaine=eq.${semaine}`),
  sb(`primes?select=employe_discord,montant&semaine=eq.${semaine}&verse=eq.false`),
  sb('contrats_travail?select=employe_discord_id,statut')
]);
  if(!data?.length){el.innerHTML='<p style="color:var(--muted)">Aucun employé.</p>';return;}
  data.sort((a,b)=>{
  // CDI avant CDD
  if (a.contrat !== b.contrat) return a.contrat === 'CDI' ? -1 : 1;
  // Puis par niveau de poste décroissant
  const nDiff = (NIVEAU[b.poste]||0) - (NIVEAU[a.poste]||0);
  if (nDiff !== 0) return nDiff;
  // Puis par embauche la plus récente
  return new Date(b.date_embauche||0) - new Date(a.date_embauche||0);
  });
  const empCountEl = document.getElementById('empCount');
  if (empCountEl) {
    const nbCDI = data.filter(e => e.contrat === 'CDI').length;
    const nbCDD = data.filter(e => e.contrat === 'CDD').length;
    empCountEl.textContent = `${data.length} EMPLOYÉ${data.length > 1 ? 'S' : ''} · ${nbCDI} CDI · ${nbCDD} CDD`;
  }
  const caMap={},primesMap={},cntMap={};
  (cmds||[]).forEach(c=>{caMap[c.employe_discord_id]=(caMap[c.employe_discord_id]||0)+(c.total_apres_reduction||c.total||0);cntMap[c.employe_discord_id]=(cntMap[c.employe_discord_id]||0)+1;});
  (primesData||[]).forEach(p=>{primesMap[p.employe_discord]=(primesMap[p.employe_discord]||0)+p.montant;});
  const contratsSet=new Set((contratsData||[]).filter(c=>c.statut==='signe'||c.statut==='en_attente').map(c=>c.employe_discord_id));
  el.innerHTML=data.map(e=>{
    const init=`${e.prenom?.charAt(0)||''}${e.nom?.charAt(0)||''}`.toUpperCase();
    const prime=primesMap[e.discord_id]||0;
    const maxV=e.contrat==='CDI'?quotaCfg.cdi_viande:quotaCfg.cdd_viande;
    const maxP=e.contrat==='CDI'?quotaCfg.cdi_patates:quotaCfg.cdd_patates;
    const pV=maxV>0?Math.min(100,Math.round((+(e.quota_viande_validee||0)/maxV)*100)):0;
    const pP=maxP>0?Math.min(100,Math.round((+(e.quota_patates_validee||0)/maxP)*100)):0;
    const statut=e.statut_activite||'actif';
    return`<div class="emp-card">
      <div class="emp-head">
        <div class="emp-head-bg"></div>
        <div class="emp-av">${e.photo_url?`<img src="${e.photo_url}" onerror="this.style.display='none'">`:`<span style="font-size:15px;font-weight:800">${init}</span>`}</div>
        <div style="flex:1;z-index:1">
          <div style="display:flex;align-items:center;gap:6px">
            <div class="emp-nm">${e.prenom} ${e.nom}</div>
            <button class="btn-info" onclick="voirFicheEmp('${e.id}','${e.prenom} ${e.nom}')">ℹ</button>
            ${!contratsSet.has(e.discord_id)?'<span class="badge badge-red" title="Aucun contrat de travail">⚠️ Pas de contrat</span>':''}
          </div>
          <div class="emp-disc">${e.discord_id||'—'}</div>
          <div style="margin-top:4px;display:flex;gap:5px;flex-wrap:wrap">
            <span class="badge ${e.actif?statut==='actif'?'badge-green':statut==='absent'?'badge-orange':'badge-grey':'badge-red'}"><span class="status-dot dot-${statut}"></span>${statut.charAt(0).toUpperCase()+statut.slice(1)}</span>
            <span class="badge badge-orange">${e.poste||'—'}</span>
            <span class="badge badge-blue">${e.contrat||'—'}</span>
          </div>
        </div>
      </div>
      <div class="emp-body">
        <div class="emp-stats">
          <div class="emp-stat"><div class="emp-stat-v">${cntMap[e.discord_id]||0}</div><div class="emp-stat-l">Cmds</div></div>
          <div class="emp-stat"><div class="emp-stat-v" style="font-size:13px">${fmtMoney(caMap[e.discord_id]||0)}</div><div class="emp-stat-l">CA sem.</div></div>
          <div class="emp-stat"><div class="emp-stat-v" style="font-size:13px;color:var(--green)">${fmtMoney(prime)}</div><div class="emp-stat-l">Prime</div></div>
        </div>
        <div class="emp-prime-row">
          <div><div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px">${e.contrat==='CDI'?`Prime vente (${Math.round((TAUX_PRIME[e.poste]||.10)*100)}%) · Plaf. ${fmtMoney(PLAFOND_PRIME[e.poste]||50000)}`:`Plafond ${fmtMoney(PLAFOND_PRIME[e.poste]||50000)}`}</div><div class="emp-prime-val">${fmtMoney(prime)}</div></div>
          <div style="display:flex;gap:5px">
            <button class="btn btn-outline btn-sm" onclick="voirPrimes('${e.discord_id}','${e.prenom} ${e.nom}')">💰</button>
            <button class="btn btn-orange btn-sm" onclick="ouvrirPrimeExcep('${e.discord_id}','${e.prenom} ${e.nom}')">🎁</button>
          </div>
        </div>
        <div style="margin-bottom:9px">
          <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-bottom:2px"><span>🥩 Viande ${+(e.quota_viande_validee||0)}/${maxV}</span><span>${pV}%</span></div>
          <div class="quota-bar-bg"><div class="quota-bar-fill" style="width:${pV}%"></div></div>
          <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-top:5px;margin-bottom:2px"><span>🥔 Patates ${+(e.quota_patates_validee||0)}/${maxP}</span><span>${pP}%</span></div>
          <div class="quota-bar-bg"><div class="quota-bar-fill" style="width:${pP}%;background:linear-gradient(90deg,var(--orange),var(--warn))"></div></div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px">
          <select style="padding:5px 8px;background:var(--card2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:11px" onchange="updatePoste('${e.id}',this.value)">${POSTES.map(p=>`<option${p===e.poste?' selected':''}>${p}</option>`).join('')}</select>
          <select style="padding:5px 8px;background:var(--card2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:11px" onchange="updateContratEmp('${e.id}',this.value)"><option${e.contrat==='CDD'?' selected':''}>CDD</option><option${e.contrat==='CDI'?' selected':''}>CDI</option></select>
        </div>
        <div style="display:flex;gap:5px;flex-wrap:wrap">
          <button class="btn btn-outline btn-sm" onclick="ouvrirDocsAjout('${e.id}','${e.prenom} ${e.nom}')">📎 Docs</button>
          <button class="btn btn-outline btn-sm" onclick="toggleEmp('${e.id}',${e.actif})">${e.actif?'🔴 Désactiver':'🟢 Activer'}</button>
          <button class="btn btn-warn btn-sm" onclick="ouvrirAvertissement('${e.id}','${e.prenom} ${e.nom}',${e.avertissements||0})" title="Avertissements">⚠️ ${e.avertissements||0}/3</button>
          <button class="btn btn-danger btn-sm" onclick="virerEmp('${e.id}','${e.prenom} ${e.nom}')">🚪 Virer</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

async function updatePoste(id,poste){await sb(`comptes_dashboard?id=eq.${id}`,{method:'PATCH',body:JSON.stringify({poste})});}

async function setAvertissement(empId, niveau) {
  // Récupérer le discord_id depuis l'id
  const empData = await sb(`comptes_dashboard?id=eq.${empId}&select=discord_id,nom,prenom`);
  const emp = empData?.[0];
  if (!emp) return;

  if (niveau === 0) {
    // Retirer tous les avertissements actifs
    await sb(`avertissements?employe_discord_id=eq.${emp.discord_id}&actif=eq.true`, {
      method: 'PATCH',
      body: JSON.stringify({ actif: false })
    });
    await sb(`comptes_dashboard?id=eq.${empId}`, {
      method: 'PATCH',
      body: JSON.stringify({ avertissements: 0 })
    });
    closeOv('ovDocs');
    loadEmployes();
    alert('✅ Avertissements retirés.');
    return;
  }

  // Calculer la date d'expiration
  const semaines = niveau === 1 ? 1 : 2;
  const expireDate = new Date();
  expireDate.setDate(expireDate.getDate() + semaines * 7);

  // Désactiver les anciens avertissements actifs
  await sb(`avertissements?employe_discord_id=eq.${emp.discord_id}&actif=eq.true`, {
    method: 'PATCH',
    body: JSON.stringify({ actif: false })
  });

  // Créer le nouvel avertissement
  await sb('avertissements', {
    method: 'POST',
    body: JSON.stringify({
      employe_discord_id: emp.discord_id,
      niveau,
      expire_le: expireDate.toISOString(),
      actif: true
    })
  });

  // Mettre à jour comptes_dashboard
  await sb(`comptes_dashboard?id=eq.${empId}`, {
    method: 'PATCH',
    body: JSON.stringify({ avertissements: niveau })
  });

  // Webhook si niveau 3
  if (niveau === 3) {
    await webhook({
      username: 'Burger Shot — RH',
      embeds: [{
        title: '🚨 Avertissement niveau 3',
        color: 0xc0392b,
        description: `**${emp.prenom} ${emp.nom}** a reçu un 3ème avertissement.\n⚠️ Cet employé peut être licencié.`,
        timestamp: new Date().toISOString(),
        footer: { text: 'Burger Shot • Direction RH' }
      }]
    });
  }

  closeOv('ovDocs');
  loadEmployes();

  const delais = niveau === 1 ? '1 semaine' : niveau === 2 ? '2 semaines' : 'licenciement possible';
  alert(`✅ Avertissement ${niveau} enregistré. Délai : ${delais}.\nExpire le : ${expireDate.toLocaleDateString('fr-FR')}`);
}
async function verifierExpirationAvertissements() {
  try {
    const now = new Date().toISOString();
    const expires = await sb(`avertissements?actif=eq.true&expire_le=lte.${now}&select=*`);
    if (!expires?.length) return;

  for (const avert of expires) {
    // Désactiver
    await sb(`avertissements?id=eq.${avert.id}`, {
      method: 'PATCH',
      body: JSON.stringify({ actif: false })
    });
    // Remettre à 0 dans comptes_dashboard si plus d'avertissement actif
    const restants = await sb(`avertissements?employe_discord_id=eq.${avert.employe_discord_id}&actif=eq.true`);
    if (!restants?.length) {
      await sb(`comptes_dashboard?discord_id=eq.${avert.employe_discord_id}`, {
        method: 'PATCH',
        body: JSON.stringify({ avertissements: 0 })
      });
    }
  }
  } catch(e) {
    console.warn('verifierExpirationAvertissements:', e);
  }
}

async function loadCDIEligibles() {
  const el = document.getElementById('cdiEligiblesContent');
  if (!el) return;
  el.innerHTML = '<div class="loading"><div class="spin"></div></div>';

  const semaine = getSemaine();
  const [employes, tousTickets] = await Promise.all([
    sb('comptes_dashboard?select=*&actif=eq.true&contrat=eq.CDD&role=neq.gouvernement&order=nom.asc'),
    sb(`quotas_tickets?select=employe_discord_id,type,quantite,semaine&statut=eq.valide`)
  ]);

  if (!employes?.length) {
    el.innerHTML = '<div class="card"><p style="color:var(--muted);text-align:center;padding:28px">Aucun employé CDD actif.</p></div>';
    return;
  }

  // Calcul quota par employé ET par semaine, sur tout l'historique
  const quotaParEmpParSemaine = {};
  (tousTickets || []).forEach(t => {
    if (!quotaParEmpParSemaine[t.employe_discord_id]) quotaParEmpParSemaine[t.employe_discord_id] = {};
    if (!quotaParEmpParSemaine[t.employe_discord_id][t.semaine]) quotaParEmpParSemaine[t.employe_discord_id][t.semaine] = { viande: 0, patates: 0 };
    if (t.type === 'viande') quotaParEmpParSemaine[t.employe_discord_id][t.semaine].viande += t.quantite;
    if (t.type === 'patates') quotaParEmpParSemaine[t.employe_discord_id][t.semaine].patates += t.quantite;
  });
  // Pour chaque employé, on garde la MEILLEURE semaine jamais atteinte
  const quotaMap = {};
  Object.keys(quotaParEmpParSemaine).forEach(id => {
    const semaines = quotaParEmpParSemaine[id];
    let meilleure = { viande: 0, patates: 0 };
    let meilleurScore = -1;
    Object.values(semaines).forEach(q => {
      const score = q.viande + q.patates;
      if (score > meilleurScore) { meilleurScore = score; meilleure = q; }
    });
    quotaMap[id] = meilleure;
  });

  // Charger les avertissements actifs sur la semaine actuelle + la semaine passée (sam→ven)
  const semaineActuelleDebut = new Date(getSemaine() + 'T00:00:00');
  const semainePasseeDebut = new Date(semaineActuelleDebut);
  semainePasseeDebut.setDate(semainePasseeDebut.getDate() - 7);
  const nowCdi = new Date();
   const avertsActifs = await sb(`avertissements?actif=eq.true&select=employe_discord_id,niveau,cree_le`).catch(()=>[]) || [];
  const avertsRecents = (await sb(`avertissements?actif=eq.false&cree_le=gte.${semainePasseeDebut.toISOString()}&select=employe_discord_id,niveau,cree_le,expire_le`).catch(()=>[]) || [])
    .filter(a => a.expire_le && new Date(a.expire_le) <= nowCdi);
  const tousAverts = [...avertsActifs, ...avertsRecents];
  const avertMap = {};
  tousAverts.forEach(a => {
    if (!avertMap[a.employe_discord_id]) avertMap[a.employe_discord_id] = 0;
    avertMap[a.employe_discord_id] = Math.max(avertMap[a.employe_discord_id], a.niveau);
  });

  const results = employes.filter(e => {
    const diff = Date.now() - new Date(e.date_embauche || 0).getTime();
    return Math.floor(diff / (1000*60*60*24)) >= 6;
  }).map(e => {
    const diff = Date.now() - new Date(e.date_embauche || 0).getTime();
    const joursAnc = Math.floor(diff / (1000*60*60*24));
    const ancOk = true; // déjà filtré ≥ 6j

    const maxV = quotaCfg.cdd_viande;
    const maxP = quotaCfg.cdd_patates;
    const q = quotaMap[e.discord_id] || { viande: 0, patates: 0 };
    const quotaOk = maxV > 0
      ? (Math.round(q.viande/maxV*100) >= 100 && Math.round(q.patates/maxP*100) >= 100)
      : true;

    const reglOk = e.reglement_signe || false;

    // Vérifier docs
    let docs = [];
    try { docs = typeof e.documents === 'string' ? JSON.parse(e.documents) : (e.documents || []); } catch {}
    const hasVisite = docs.some(d => d.type === 'Visite médicale');
    const hasPermis = docs.some(d => d.type === 'Permis de conduire');

    const avertOk = (avertMap[e.discord_id] || 0) === 0;

    const eligible = ancOk && quotaOk && reglOk && hasVisite && hasPermis && avertOk;

    return { e, joursAnc, ancOk, quotaOk, reglOk, hasVisite, hasPermis, avertOk, eligible, q };
  });

  const sortByAnciennete = (a, b) => new Date(a.e.date_embauche || 0) - new Date(b.e.date_embauche || 0);
  const eligibles = results.filter(r => r.eligible).sort(sortByAnciennete);
  const nonEligibles = results.filter(r => !r.eligible).sort(sortByAnciennete);

  const renderRow = ({ e, joursAnc, ancOk, quotaOk, reglOk, hasVisite, hasPermis, avertOk, eligible, q }) => {
    const check = ok => ok
      ? '<span style="color:var(--green);font-weight:700">✅</span>'
      : '<span style="color:var(--red);font-weight:700">❌</span>';
    const init = `${e.prenom?.charAt(0)||''}${e.nom?.charAt(0)||''}`.toUpperCase();
    return `<tr style="background:${eligible?'rgba(39,174,96,.04)':''}">
      <td>
        <div style="display:flex;align-items:center;gap:8px">
          <div style="width:32px;height:32px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;overflow:hidden;flex-shrink:0">
            ${e.photo_url?`<img src="${e.photo_url}" style="width:100%;height:100%;object-fit:cover">`:init}
          </div>
          <div>
            <div style="font-weight:700">${e.prenom} ${e.nom}</div>
            <div style="font-size:10px;color:var(--muted)">${e.poste||'—'}</div>
          </div>
        </div>
      </td>
      <td style="text-align:center">${check(ancOk)}<div style="font-size:10px;color:var(--muted)">${joursAnc}j</div></td>
      <td style="text-align:center">${check(quotaOk)}<div style="font-size:10px;color:var(--muted)">${Math.round(q.viande/quotaCfg.cdd_viande*100)}% / ${Math.round(q.patates/quotaCfg.cdd_patates*100)}%</div></td>
      <td style="text-align:center">${check(reglOk)}</td>
      <td style="text-align:center">${check(hasVisite)}</td>
      <td style="text-align:center">${check(hasPermis)}</td>
      <td style="text-align:center">${check(avertOk)}<div style="font-size:10px;color:var(--muted)">${e.avertissements||0}/3</div></td>
      <td style="text-align:center">
        ${eligible
          ? `<span class="badge badge-green">✅ Éligible</span>`
          : `<span class="badge badge-red">❌ Non éligible</span>`}
      </td>
      ${eligible ? `<td><button class="btn btn-success btn-sm" onclick="passerCDI('${e.id}','${e.prenom} ${e.nom}')">⬆️ Passer CDI</button></td>` : '<td>—</td>'}
    </tr>`;
  };

  el.innerHTML = `
    <div style="display:flex;gap:12px;margin-bottom:18px;flex-wrap:wrap">
      <div class="stat" style="--accent:var(--green);flex:1;min-width:140px">
        <div class="stat-icon">🏆</div>
        <div class="stat-label">Éligibles CDI</div>
        <div class="stat-val">${eligibles.length}</div>
      </div>
      <div class="stat" style="--accent:var(--orange);flex:1;min-width:140px">
        <div class="stat-icon">⏳</div>
        <div class="stat-label">Non éligibles</div>
        <div class="stat-val">${nonEligibles.length}</div>
      </div>
      <div class="stat" style="flex:1;min-width:140px">
        <div class="stat-icon">👤</div>
        <div class="stat-label">Total CDD actifs</div>
        <div class="stat-val">${results.length}</div>
        <div class="stat-sub">≥ 7j d'ancienneté</div>
      </div>
    </div>

    <div class="card">
      <div style="overflow-x:auto">
        <table>
          <thead>
            <tr style="background:var(--card2)">
              <th>Employé</th>
              <th style="text-align:center">📅 Ancienneté<br><span style="font-weight:400;font-size:9px">≥ 7 jours</span></th>
              <th style="text-align:center">🚚 Quota<br><span style="font-weight:400;font-size:9px">100% vian. + pat.</span></th>
              <th style="text-align:center">📜 Règlement</th>
              <th style="text-align:center">🏥 Visite méd.</th>
              <th style="text-align:center">🪪 Permis</th>
              <th style="text-align:center">⚠️ Avertiss.</th>
              <th style="text-align:center">Statut</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            ${eligibles.length ? eligibles.map(renderRow).join('') : ''}
            ${nonEligibles.map(renderRow).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
}

async function passerCDI(empId, nom) {
  if (!confirm(`Passer ${nom} en CDI ?`)) return;
  await sb(`comptes_dashboard?id=eq.${empId}`, {

    body: JSON.stringify({ contrat: 'CDI' })
  });
  alert(`✅ ${nom} est maintenant en CDI !`);
  loadCDIEligibles();
}

async function handleDocFile(file,empId){
  if(!file)return;
  const inner=document.getElementById('docUploadInner');
  if(inner)inner.innerHTML='<div style="font-size:11px;color:var(--muted)">⏳ Upload...</div>';
  const ext=file.name.split('.').pop();
  const fn=`doc_${empId}_${Date.now()}_${Math.random().toString(36).slice(2,8)}.${ext}`;
  try{
    const res=await fetch(`${SB_URL}/storage/v1/object/produits/${fn}`,{method:'POST',headers:{apikey:SB_KEY,Authorization:`Bearer ${SB_KEY}`,'Content-Type':file.type,'x-upsert':'true'},body:file});
    if(!res.ok)throw new Error();
    const url=`${SB_URL}/storage/v1/object/public/produits/${fn}`;
    const inp=document.getElementById('docUrl');if(inp)inp.value=url;
    if(inner)inner.innerHTML=`<div style="font-size:11px;color:var(--green)">✅ Fichier uploadé !</div>`;
  }catch{
    if(inner)inner.innerHTML='<div style="font-size:11px;color:var(--red)">❌ Erreur upload</div>';
  }
}

async function verserPrimesGroupe(idsStr){

async function calculerPrimes(){
  // Recalcule les primes de vente pour tous les employés actifs
  // basé sur le CA total de chaque employé cette semaine
  const semaine=getSemaine();
  const[employes,cmds]=await Promise.all([
    sb('comptes_dashboard?select=*&actif=eq.true&role=neq.gouvernement'),
    sb(`commandes?select=employe_discord_id,total_apres_reduction,total,paye_en_points&semaine=eq.${semaine}`)
  ]);
  if(!employes?.length){alert('Aucun employé actif.');return;}
  // Calculer CA par employé (hors paiements par points)
  const caMap={};
  (cmds||[]).filter(c=>!c.paye_en_points).forEach(c=>{
    caMap[c.employe_discord_id]=(caMap[c.employe_discord_id]||0)+(c.total_apres_reduction||c.total||0);
  });
  let count=0;
  for(const emp of employes){
    if(!emp.discord_id||!caMap[emp.discord_id])continue;
    // Vérifier si prime vente déjà calculée pour cette semaine
    const exist=await sb(`primes?employe_discord=eq.${emp.discord_id}&semaine=eq.${semaine}&type=eq.vente`);
    if(exist?.length)continue; // déjà calculée
    await enregistrerPrimeVente(emp.discord_id,caMap[emp.discord_id],semaine);
    count++;
  }
  alert(`✅ Primes calculées pour ${count} employé(s).`);
  await loadPrimesTable();
}

async function loadPrimesTable(){
  const el=document.getElementById('primesTable');if(!el)return;
  const semaineActuelle = getSemaine();
  const semainePrecedente = (() => {
    const d = new Date(semaineActuelle + 'T00:00:00');
    d.setDate(d.getDate() - 7);
    const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), j = String(d.getDate()).padStart(2,'0');
    return `${y}-${m}-${j}`;
  })();
  const [dataSemaine, dataEnAttenteAnciennes] = await Promise.all([
    sb(`primes?select=*&semaine=eq.${semaineActuelle}&order=created_at.desc`),
    sb(`primes?select=*&semaine=eq.${semainePrecedente}&verse=eq.false&order=created_at.desc`)
  ]);
  const data=[...(dataSemaine||[]), ...(dataEnAttenteAnciennes||[])];
  if(!data?.length){el.innerHTML='<p style="color:var(--muted)">Aucune prime cette semaine.</p>';return;}
  const ids=[...new Set(data.map(p=>p.employe_discord).filter(Boolean))];
  let empMap={};
  if(ids.length){const emps=await sb(`comptes_dashboard?discord_id=in.(${ids.join(',')})&select=discord_id,nom,prenom,poste`);(emps||[]).forEach(e=>empMap[e.discord_id]=e);}
  const enAtt=data.filter(p=>!p.verse),versees=data.filter(p=>p.verse);
  const totAtt=enAtt.reduce((a,p)=>a+p.montant,0),totVer=versees.reduce((a,p)=>a+p.montant,0);

  function regrouperPrimes(list){
    const groupes={};
    list.forEach(p=>{
      const cle=`${p.employe_discord}|${p.type||'vente'}|${p.semaine}|${p.verse}`;
      if(!groupes[cle]) groupes[cle]={...p, montant:0, ids:[], dateRecente:p.created_at};
      groupes[cle].montant+=p.montant;
      groupes[cle].ids.push(p.id);
      if(new Date(p.created_at)>new Date(groupes[cle].dateRecente)) groupes[cle].dateRecente=p.created_at;
    });
    return Object.values(groupes).sort((a,b)=>new Date(b.dateRecente)-new Date(a.dateRecente));
  }

  const rows=(list)=>regrouperPrimes(list).map(p=>{const emp=empMap[p.employe_discord]||{};const ancienne=p.semaine!==getSemaine();const idsStr=p.ids.join(',');return`<tr>
    <td><strong>${emp.prenom?`${emp.prenom} ${emp.nom}`:'—'}</strong></td>
    <td>${emp.poste||'—'}</td>
    <td><span class="badge badge-blue">${p.type||'vente'}</span>${p.ids.length>1?` <span class="badge badge-grey">×${p.ids.length}</span>`:''}</td>
    <td><strong style="color:var(--green)">${fmtMoney(p.montant)}</strong></td>
    <td style="font-size:11px;color:var(--muted)">${p.dateRecente?new Date(p.dateRecente).toLocaleString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit',timeZone:'Europe/Paris'}):'—'}${ancienne?` <span class="badge badge-orange" style="margin-left:4px">${getLabelSemaine(p.semaine)}</span>`:''}</td>
    <td><span class="badge ${p.verse?'badge-green':'badge-orange'}">${p.verse?'Versée':'En attente'}</span></td>
    <td>${!p.verse?`<button class="btn btn-success btn-sm" onclick="verserPrimesGroupe('${idsStr}')">Verser</button> <button class="btn btn-danger btn-sm" onclick="supprimerPrimesGroupe('${idsStr}')">🗑️</button>`:''}</td>
  </tr>`;}).join('');
  el.innerHTML=`<div style="display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap">
    <div style="padding:9px 14px;background:rgba(243,156,18,.1);border:1px solid rgba(243,156,18,.28);border-radius:7px;font-size:12px">⏳ En attente : <strong style="color:var(--warn)">${fmtMoney(totAtt)}</strong></div>
    <div style="padding:9px 14px;background:rgba(39,174,96,.1);border:1px solid rgba(39,174,96,.28);border-radius:7px;font-size:12px">✅ Versées : <strong style="color:var(--green)">${fmtMoney(totVer)}</strong></div>
  </div>
  <div style="display:flex;gap:7px;margin-bottom:12px">
    <button class="btn btn-primary btn-sm" id="tabPrimeAtt" onclick="switchTabPrime('att')">⏳ En attente (${enAtt.length})</button>
    <button class="btn btn-outline btn-sm" id="tabPrimeVer" onclick="switchTabPrime('ver')">✅ Versées (${versees.length})</button>
  </div>
  <div id="primeTabAtt"><table><thead><tr><th>Employé</th><th>Poste</th><th>Type</th><th>Montant</th><th>Date</th><th>Statut</th><th></th></tr></thead><tbody>${rows(enAtt)}</tbody></table></div>
  <div id="primeTabVer" style="display:none"><table><thead><tr><th>Employé</th><th>Poste</th><th>Type</th><th>Montant</th><th>Date</th><th>Statut</th><th></th></tr></thead><tbody>${rows(versees)}</tbody></table></div>`;
}
function switchTabPrime(t){
  document.getElementById('primeTabAtt').style.display=t==='att'?'block':'none';
  document.getElementById('primeTabVer').style.display=t==='ver'?'block':'none';
  document.getElementById('tabPrimeAtt').className=`btn btn-sm ${t==='att'?'btn-primary':'btn-outline'}`;
  document.getElementById('tabPrimeVer').className=`btn btn-sm ${t==='ver'?'btn-primary':'btn-outline'}`;
}

async function loadCoffreComplet(){
  const semaine=getSemaine();
  const[coffreD,caD,livrD,depD,cmdsD]=await Promise.all([
    sb('coffre_solde?limit=1'),
    sb('parametres?cle=eq.ca_semaine'),
    sb(`livraisons?select=montant&semaine=eq.${semaine}`),
    sb(`depenses?select=montant&semaine=eq.${semaine}`),
    sb(`commandes?select=total_apres_reduction,total,items,created_at&semaine=eq.${semaine}`)
  ]);
  const soldeD=+(coffreD?.[0]?.solde??500000);
  const ca=+(caD?.[0]?.valeur||0);
  const livr=(livrD||[]).reduce((a,l)=>a+(l.montant||0),0);
  const dep=(depD||[]).reduce((a,d)=>a+(d.montant||0),0);
  const imp=Math.round(calcImpot(ca+livr));
  const benef=ca+livr-dep-imp;
  const soldeFin=soldeD+benef;
  // Coffre temps réel = solde + CA + livr - dep (sans impôts)
  const coffreNow=soldeD+ca+livr-dep;

  const statsEl=document.getElementById('coffreStats');
  if(statsEl)statsEl.innerHTML=[
    {label:'🏦 Solde départ',val:fmtMoney(soldeD),accent:'var(--blue)'},
    {label:'🧾 CA Ventes',val:`+${fmtMoney(ca)}`,accent:'var(--green)'},
    {label:'🚚 Livraisons',val:`+${fmtMoney(livr)}`,accent:'var(--orange)'},
    {label:'💸 Dépenses',val:`-${fmtMoney(dep)}`,accent:'var(--red)'},
    {label:`🏛️ Impôts (${tauxImpot(ca+livr)})`,val:`-${fmtMoney(imp)}`,accent:'var(--red-d)'},
    {label:'📊 Bénéfice net',val:(benef>=0?'+':'')+fmtMoney(benef),accent:benef>=0?'var(--green)':'var(--red)'},
    {label:'💰 Coffre temps réel',val:fmtMoney(coffreNow),accent:'var(--blue)'},
    {label:'💰 Coffre fin sem. estimé',val:fmtMoney(soldeFin),accent:'var(--blue)'},
  ].map(s=>`<div class="stat" style="--accent:${s.accent}"><div class="stat-label">${s.label}</div><div class="stat-val" style="font-size:20px">${s.val}</div></div>`).join('');

  // CA par produit
  const prodMap={};
  (cmdsD||[]).forEach(c=>{let items=[];try{items=JSON.parse(c.items||'[]');}catch{}items.forEach(it=>{if(!prodMap[it.nom])prodMap[it.nom]={qte:0,ca:0,prix:it.prix};prodMap[it.nom].qte+=it.qte;prodMap[it.nom].ca+=it.prix*it.qte;});});
  const caEl=document.getElementById('coffreCA');
  if(caEl){const sorted=Object.entries(prodMap).sort((a,b)=>b[1].ca-a[1].ca);caEl.innerHTML=sorted.length?`<table><thead><tr><th>Produit</th><th>Qté</th><th>CA</th></tr></thead><tbody>`+sorted.map(([nom,d])=>`<tr><td><strong>${nom}</strong></td><td>${d.qte}</td><td><strong style="color:var(--green)">+${fmtMoney(d.ca)}</strong></td></tr>`).join('')+`<tr style="border-top:2px solid var(--border)"><td colspan="2"><strong>TOTAL</strong></td><td><strong style="color:var(--red)">${fmtMoney(ca)}</strong></td></tr></tbody></table>`:'<p style="color:var(--muted)">Aucune vente cette semaine.</p>';}

  // Graphique évolution
  await chargerGraphiqueEvolution(semaine);
}

async function chargerGraphiqueEvolution(semaine) {
  const el = document.getElementById('coffreGraph'); if (!el) return;

  const jours = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    jours.push(d.toISOString().split('T')[0]);
  }

  const dateDebut = jours[0];
  const dateFin = jours[6];

  const [cmdsD, livrD, depD, coffreD] = await Promise.all([
    sb(`commandes?select=created_at,total_apres_reduction&created_at=gte.${dateDebut}T00:00:00&created_at=lte.${dateFin}T23:59:59&order=created_at.asc`),
    sb(`livraisons?select=created_at,montant&created_at=gte.${dateDebut}T00:00:00&created_at=lte.${dateFin}T23:59:59&order=created_at.asc`),
    sb(`depenses?select=created_at,montant&created_at=gte.${dateDebut}T00:00:00&created_at=lte.${dateFin}T23:59:59&order=created_at.asc`),
    sb('coffre_solde?limit=1')
  ]);

  // Solde actuel = point final, on remonte en arrière
  const soldeActuel = +(coffreD?.[0]?.solde ?? 0);

  // Calculer les entrées/sorties par jour
  const jourData = jours.map(jour => {
    const caJ  = (cmdsD||[]).filter(c => c.created_at.startsWith(jour)).reduce((a,c) => a + (c.total_apres_reduction||0), 0);
    const livJ = (livrD||[]).filter(l => l.created_at.startsWith(jour)).reduce((a,l) => a + (l.montant||0), 0);
    const depJ = (depD||[]).filter(d => d.created_at.startsWith(jour)).reduce((a,d) => a + (d.montant||0), 0);
    return { entrees: caJ + livJ, sorties: depJ };
  });

  // Reconstruire le solde jour par jour en partant de la fin
  const totalEntrees = jourData.reduce((a,d) => a + d.entrees - d.sorties, 0);
  let soldeCourant = soldeActuel - totalEntrees;
  const soldes = [], caJours = [];
  for (const d of jourData) {
    soldeCourant += d.entrees - d.sorties;
    soldes.push(soldeCourant);
    caJours.push(d.entrees);
  }

  const labels = jours.map(j => {
    const d = new Date(j + 'T12:00:00');
    return d.toLocaleDateString('fr-FR', { weekday: 'short', day: 'numeric', month: 'short' });
  });

  // Créer le canvas dans un div caché, puis swap sans flash
  const wrapper = document.createElement('div');
  wrapper.style.cssText = 'position:relative;width:100%;height:260px';
  const canvas = document.createElement('canvas');
  canvas.id = 'chartEvol';
  wrapper.appendChild(canvas);

  if (!window.Chart) {
    await new Promise(r => {
      const s = document.createElement('script');
      s.src = 'https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js';
      s.onload = r;
      document.head.appendChild(s);
    });
  }

  // Détruire l'ancien graphique si existe
  if (window._chartEvol) { window._chartEvol.destroy(); window._chartEvol = null; }

  el.innerHTML = '';
  el.appendChild(wrapper);
  const zoom = window.devicePixelRatio || 1;
  const cssZoom = 1.25;
  canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    e._chartjs = {
    x: (e.clientX - rect.left) / cssZoom,
    y: (e.clientY - rect.top) / cssZoom
    };
  }, { passive: true });
  const originalGetEventPosition = window.Chart.helpers.getRelativePosition;
  window.Chart.helpers.getRelativePosition = function(evt, chart) {
    const pos = originalGetEventPosition(evt, chart);
    return { x: pos.x * 1.25, y: pos.y * 1.25 };
  };
  window._chartEvol = new window.Chart(canvas, {
    type: 'line',
    data: {
      labels,
      datasets: [
        {
          label: 'Solde coffre ($)',
          data: soldes,
          borderColor: '#27ae60',
          backgroundColor: 'rgba(39,174,96,.1)',
          fill: true, tension: .3, borderWidth: 2,
          pointBackgroundColor: '#27ae60'
        },
        {
          label: 'Entrées du jour ($)',
          data: caJours,
          borderColor: '#3498db',
          fill: false, tension: .3, borderWidth: 2,
          borderDash: [5,5],
          pointBackgroundColor: '#3498db'
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: true, position: 'top' },
        tooltip: {
          mode: 'index',
          intersect: false,
          callbacks: {
            label: ctx => `${ctx.dataset.label}: ${ctx.parsed.y.toLocaleString('fr-FR')}$`
          }
        }
      },
      scales: {
        y: {
          ticks: { callback: v => (v/1000000).toFixed(1) + 'M$' },
          grid: { color: 'rgba(255,255,255,.05)' }
        },
        x: { grid: { display: false } }
      }
    }
  });
}

async function cloturerSemaine(){
  if(!confirm('⚠️ Clôturer la semaine ? Les quotas seront remis à zéro et le coffre mis à jour.'))return;
  const cr=await executerCloture();
  if(cr)alert(`✅ Semaine clôturée ! Bénéfice net : ${fmtMoney(cr.benefice_net)}`);
  loadGestion();
}

async function executerCloture(){
  const semaine = getSemaine();
  // VÉRIF ANTI-BOUCLE
  const deja = await sb(`comptes_rendus?semaine=eq.${semaine}`);
  if (deja?.length) {
    console.log('Semaine déjà clôturée, skip.');
    return null;
  }
  const dates=getDatesSemaine();
  const[coffreD,caD,livrD,primesD,depD,cmdsD,empsD]=await Promise.all([
    sb('coffre_solde?limit=1'),
    sb('parametres?cle=eq.ca_semaine'),
    sb(`livraisons?select=montant&semaine=eq.${semaine}`),
    sb(`primes?select=montant&semaine=eq.${semaine}`),
    sb(`depenses?select=montant&semaine=eq.${semaine}`),
    sb(`commandes?select=id&semaine=eq.${semaine}`),
    sb('comptes_dashboard?select=id&actif=eq.true')
  ]);
  const soldeD=+(coffreD?.[0]?.solde??500000);
  const ca=+(caD?.[0]?.valeur||0);
  const livr=(livrD||[]).reduce((a,l)=>a+(l.montant||0),0);
  const primes=(primesD||[]).reduce((a,p)=>a+(p.montant||0),0);
  const dep=(depD||[]).reduce((a,d)=>a+(d.montant||0),0);
  const imp=Math.round(calcImpot(ca+livr));
  const benef=ca+livr-dep-imp;
  const soldeFin=soldeD+benef;
  const semLabel=getLabelSemaine(semaine);
  const cr={semaine,semaine_label:semLabel,date_debut:dates.debut.toISOString().split('T')[0],date_fin:dates.fin.toISOString().split('T')[0],solde_depart:soldeD,ca_ventes:ca,ca_livraisons:livr,total_primes:primes,total_depenses:dep,total_impots:imp,benefice_net:benef,solde_final:soldeFin,nb_commandes:cmdsD?.length||0,nb_employes:empsD?.length||0};
  // Sauvegarder compte rendu

async function saveImpotsReels(crId){
  const val=+document.getElementById(`impReel-${crId}`)?.value;
  if(!val||val<0){alert('Montant invalide.');return;}
  if(!confirm('Corriger les impôts va recalculer le bénéfice net et ajuster le solde du coffre. Continuer ?'))return;

  const data=await sb(`comptes_rendus?id=eq.${crId}&select=*`);
  const cr=data?.[0];
  if(!cr){alert('Compte rendu introuvable.');return;}

  const ancienImpot=+(cr.total_impots||0);
  const nouvelImpot=val;
  const ecart=nouvelImpot-ancienImpot; // positif = on doit retirer plus du coffre, négatif = on rend de l'argent

  const nouveauBenefice=(cr.benefice_net||0)-ecart;
  const nouveauSoldeFinal=(cr.solde_depart||0)+nouveauBenefice;

  // Mettre à jour le compte rendu
  await sb(`comptes_rendus?id=eq.${crId}`,{method:'PATCH',body:JSON.stringify({
    impots_reels:nouvelImpot,
    benefice_net:nouveauBenefice,
    solde_final:nouveauSoldeFinal
  })});

  // Ajuster le coffre réel en conséquence (seulement l'écart, pas tout le solde)
  const coffreData=await sb('coffre_solde?limit=1');
  const coffreActuel=+(coffreData?.[0]?.solde??500000);
  const coffreCorrige=coffreActuel-ecart;
  if(coffreData?.[0]?.id){
    await sb(`coffre_solde?id=eq.${coffreData[0].id}`,{method:'PATCH',body:JSON.stringify({solde:coffreCorrige,updated_at:new Date().toISOString()})});
  }

  alert(`✅ Impôts corrigés ! Écart : ${ecart>=0?'-':'+'}${fmtMoney(Math.abs(ecart))}\nNouveau solde coffre : ${fmtMoney(coffreCorrige)}`);
  loadHistoriqueCompteRendus();
  loadCoffreComplet();
}

/* VÉRIF CLÔTURE VENDREDI */
async function verifierClotureVendredi(){
  const now=new Date();
  const paris=new Intl.DateTimeFormat('fr-FR',{timeZone:'Europe/Paris',weekday:'short',hour:'numeric',minute:'numeric',hour12:false}).formatToParts(now);
  const pm={};paris.forEach(p=>{pm[p.type]=p.value;});
  if(pm.weekday!=='ven.'||+pm.hour<23||+pm.minute<55)return;
  const semaine=getSemaine();
  const deja=await sb(`comptes_rendus?semaine=eq.${semaine}`);
  if(deja?.length)return;
  await executerCloture();
}

/* ÉVOLUTION COFFRE DU JOUR */
async function enregistrerEvolutionJour(){
  const semaine=getSemaine();
  const today=new Date().toISOString().split('T')[0];
  const[caD,coffreD]=await Promise.all([sb('parametres?cle=eq.ca_semaine'),sb('coffre_solde?limit=1')]);
  const solde=+(coffreD?.[0]?.solde??500000);
  const caJour=+(caD?.[0]?.valeur||0);
  const exist=await sb(`coffre_evolution?semaine=eq.${semaine}&jour=eq.${today}`);
  if(exist?.length)await sb(`coffre_evolution?semaine=eq.${semaine}&jour=eq.${today}`,{method:'PATCH',body:JSON.stringify({solde,ca_jour:caJour})});
  else await sb('coffre_evolution',{method:'POST',body:JSON.stringify({semaine,jour:today,solde,ca_jour:caJour})});
}

  ]);

  const data = await sb(`depenses?semaine=eq.${semaineFiltre}&order=created_at.desc`);
  const total=(data||[]).reduce((a,d)=>a+(d.montant||0),0);
 
  const selectHtml = `

async function _loadRegistreCore(containerId){

    sb(`livraisons?select=*&semaine=eq.${semaineFiltre}&order=created_at.asc`),
    sb(`primes?select=*&semaine=eq.${semaineFiltre}&order=created_at.asc`),
    sb(`depenses?select=*&semaine=eq.${semaineFiltre}&order=created_at.asc`),

  let empMap={};
  const uniq=[...new Set(allD)];
  if(uniq.length){const emps=await sb(`comptes_dashboard?discord_id=in.(${uniq.join(',')})&select=discord_id,nom,prenom`);(emps||[]).forEach(e=>empMap[e.discord_id]=`${e.prenom} ${e.nom}`);}
  // Construire lignes
  const lignes=[];
  (cmdsD||[]).forEach(c=>{const m=c.total_apres_reduction||c.total||0;if(m>0&&!c.paye_en_points)lignes.push({date:c.created_at,type:'vente',label:'Vente caisse',detail:`${c.reduction_pct?`-${c.reduction_pct}% · `:''}${empMap[c.employe_discord_id]||'—'}`,entree:m,sortie:0});});
  (livrD||[]).forEach(l=>lignes.push({date:l.created_at,type:'livraison',label:'Livraison externe',detail:l.notes||(empMap[l.enregistre_par]||'—'),entree:l.montant||0,sortie:0}));
  (primesD||[]).filter(p=>p.verse).forEach(p=>lignes.push({date:p.updated_at||p.created_at,type:'prime',label:`Prime ${p.type||'vente'}`,detail:`${empMap[p.employe_discord]||'—'}${p.raison?` · ${p.raison}`:''}`,entree:0,sortie:p.montant||0}));
  (primesD||[]).filter(p=>!p.verse).forEach(p=>lignes.push({date:p.created_at,type:'prime_att',label:`Prime ${p.type||'vente'} (en attente)`,detail:`${empMap[p.employe_discord]||'—'}`,entree:0,sortie:0,attente:p.montant||0}));
  (depD||[]).forEach(d=>lignes.push({date:d.created_at,type:'depense',label:d.libelle||'Dépense',detail:empMap[d.employe_discord]||'—',entree:0,sortie:d.montant||0,preuve:d.preuve_url||null}));
  const caV=(cmdsD||[]).filter(c=>!c.paye_en_points).reduce((a,c)=>a+(c.total_apres_reduction||c.total||0),0);
  const caLv=(livrD||[]).reduce((a,l)=>a+(l.montant||0),0);
  const imp=Math.round(calcImpot(caV+caLv));
  if(imp>0)lignes.push({date:new Date().toISOString(),type:'impot',label:`Impôts (${tauxImpot(caV+caLv)})`,detail:`Sur CA ${fmtMoney(caV+caLv)}`,entree:0,sortie:imp});
  lignes.sort((a,b)=>new Date(b.date)-new Date(a.date));
  const totE=lignes.reduce((a,l)=>a+l.entree,0);
  const totS=lignes.reduce((a,l)=>a+l.sortie,0);
  const totAtt=lignes.reduce((a,l)=>a+(l.attente||0),0);
  const soldeD=+(coffreD?.[0]?.solde??500000);
  const benef=totE-totS;
  const soldeFin=soldeD+benef;
  const TC={
    vente:{icon:'💰',color:'var(--green)',bg:'rgba(39,174,96,.08)',label:'Vente'},
    livraison:{icon:'🚚',color:'var(--orange)',bg:'rgba(230,126,34,.08)',label:'Livraison'},
    prime:{icon:'👥',color:'var(--red)',bg:'rgba(192,57,43,.08)',label:'Prime'},
    prime_att:{icon:'⏳',color:'var(--warn)',bg:'rgba(243,156,18,.06)',label:'Prime (att.)'},
    depense:{icon:'💸',color:'var(--red)',bg:'rgba(192,57,43,.08)',label:'Dépense'},
    impot:{icon:'🏛️',color:'#e74c3c',bg:'rgba(231,76,60,.08)',label:'Impôts'},
  };
  el.innerHTML=`
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px">
    <div style="font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;color:var(--red)">📒 Registre Comptable</div>
    <select class="form-select" id="${selId}" onchange="_loadRegistreCore('${containerId}')" style="max-width:200px">
      ${semaines.map(s=>`<option value="${s}"${s===semaineFiltre?' selected':''}>${s===semaineCour?'📍 ':''}Sem. ${getLabelSemaine(s)}</option>`).join('')}
    </select>
  </div>
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:10px;margin-bottom:20px">
    <div class="stat" style="--accent:var(--blue)"><div class="stat-icon">🏦</div><div class="stat-label">Solde départ</div><div class="stat-val" style="font-size:18px">${fmtMoney(soldeD)}</div></div>
    <div class="stat" style="--accent:var(--green)"><div class="stat-icon">📈</div><div class="stat-label">Total entrées</div><div class="stat-val" style="font-size:18px;color:var(--green)">+${fmtMoney(totE)}</div></div>
    <div class="stat" style="--accent:var(--red)"><div class="stat-icon">📉</div><div class="stat-label">Total sorties</div><div class="stat-val" style="font-size:18px;color:var(--red)">-${fmtMoney(totS)}</div></div>
    ${totAtt>0?`<div class="stat" style="--accent:var(--warn)"><div class="stat-icon">⏳</div><div class="stat-label">Primes en attente</div><div class="stat-val" style="font-size:18px;color:var(--warn)">${fmtMoney(totAtt)}</div></div>`:''}
    <div class="stat" style="--accent:${benef>=0?'var(--green)':'var(--red)'}"><div class="stat-icon">${benef>=0?'🏆':'📉'}</div><div class="stat-label">Bénéfice net</div><div class="stat-val" style="font-size:18px;color:${benef>=0?'var(--green)':'var(--red)'}">${benef>=0?'+':''}${fmtMoney(benef)}</div></div>
    <div class="stat" style="--accent:var(--blue)"><div class="stat-icon">💰</div><div class="stat-label">Coffre estimé</div><div class="stat-val" style="font-size:18px;color:var(--blue)">${fmtMoney(soldeFin)}</div></div>
  </div>
  <div style="display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px">
    <button class="btn btn-outline btn-sm" onclick="filtrerReg('tous','${containerId}')" id="rfTous_${containerId}" style="border-color:var(--red);color:var(--red)">Tous (${lignes.length})</button>
    ${Object.entries(TC).map(([k,v])=>{const cnt=lignes.filter(l=>l.type===k).length;return cnt>0?`<button class="btn btn-outline btn-sm" onclick="filtrerReg('${k}','${containerId}')" id="rf${k}_${containerId}" style="border-color:${v.color};color:${v.color}">${v.icon} ${v.label} (${cnt})</button>`:''}).join('')}
  </div>
  <div class="card" style="padding:0;overflow:hidden">
    <div style="overflow-x:auto">
    <table id="regTable_${containerId}">
      <thead><tr style="background:var(--card2)"><th style="width:110px">Date</th><th style="width:110px">Type</th><th>Libellé</th><th>Détail</th><th style="text-align:right">Entrée</th><th style="text-align:right">Sortie</th><th style="text-align:right">Preuve</th></tr></thead>
      <tbody id="regBody_${containerId}">${renderLignesReg(lignes,TC)}</tbody>
    </table></div>
  </div>`;
  window[`_regLignes_${containerId}`]=lignes;window[`_regTC_${containerId}`]=TC;
}

function renderLignesReg(lignes,TC){
  if(!lignes.length)return'<tr><td colspan="7" style="text-align:center;color:var(--muted);padding:28px">Aucune opération.</td></tr>';
  return lignes.map(l=>{const cfg=TC[l.type]||{icon:'📌',color:'var(--muted)',bg:'transparent',label:'—'};const isE=l.entree>0,isS=l.sortie>0,isA=l.attente>0;
  return`<tr style="border-left:3px solid ${cfg.color}">
    <td style="font-size:10px;color:var(--muted);white-space:nowrap">${new Date(l.date).toLocaleString('fr-FR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit',timeZone:'Europe/Paris'})}</td>
    <td><span style="display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:700;background:${cfg.bg};color:${cfg.color}">${cfg.icon} ${cfg.label}</span></td>
    <td style="font-weight:700">${l.label}</td>
    <td style="font-size:11px;color:var(--muted)">${l.detail}</td>
    <td style="text-align:right;font-weight:700;color:var(--green)">${isE?'+'+fmtMoney(l.entree):'—'}</td>
    <td style="text-align:right;font-weight:700;color:${isA?'var(--warn)':'var(--red)'}">${isS?'-'+fmtMoney(l.sortie):isA?`(${fmtMoney(l.attente)})`:'—'}</td>
    <td style="text-align:right">${l.preuve?`<a href="${l.preuve}" target="_blank" class="btn btn-blue btn-sm">🖼️</a>`:'—'}</td>
  </tr>`;}).join('');
}

function filtrerReg(type,containerId){
  const lignes=window[`_regLignes_${containerId}`]||[];const TC=window[`_regTC_${containerId}`]||{};
  const filtered=type==='tous'?lignes:lignes.filter(l=>l.type===type);
  const body=document.getElementById(`regBody_${containerId}`);if(body)body.innerHTML=renderLignesReg(filtered,TC);
  document.querySelectorAll(`[id^="rf"][id$="_${containerId}"]`).forEach(b=>b.style.fontWeight='normal');
  const active=document.getElementById(type==='tous'?`rfTous_${containerId}`:`rf${type}_${containerId}`);if(active)active.style.fontWeight='900';
}

async function loadBenefices(){
  const el=document.getElementById('beneficesContent');if(!el)return;
  el.innerHTML='<div class="loading"><div class="spin"></div></div>';
  const semaine=getSemaine();
  const semaineFiltre=document.getElementById('benefSemSel')?.value||semaine;
  const[cmdsD,prodsD,livrD,depD,primesD,histoD,empsCA]=await Promise.all([
    sb(`commandes?select=*&semaine=eq.${semaineFiltre}`),
    sb('produits?select=*'),
    sb(`livraisons?select=montant&semaine=eq.${semaineFiltre}`),
    sb(`depenses?select=montant&semaine=eq.${semaineFiltre}`),
    sb(`primes?select=montant&semaine=eq.${semaineFiltre}`),
    sb('comptes_rendus?select=*&order=created_at.desc&limit=12'),
    sb(`commandes?select=employe_discord_id,total_apres_reduction,total&semaine=eq.${semaineFiltre}`)
  ]);
  const cmds=cmdsD||[],prods=prodsD||[],livr=livrD||[],dep=depD||[],primes=primesD||[],histo=histoD||[];
  // Calcul bénéfice par produit
  const pm={};
  cmds.filter(c=>!c.paye_en_points).forEach(c=>{let items=[];try{items=JSON.parse(c.items||'[]');}catch{}items.forEach(it=>{const p=prods.find(x=>x.id===it.id||x.nom===it.nom);const ca_u=+(it.prix||p?.prix||0);const cout_u=+(p?.cout_achat||0);if(!pm[it.nom])pm[it.nom]={nom:it.nom,qte:0,ca:0,cout:0,benef:0,cat:p?.categorie||'—'};pm[it.nom].qte+=it.qte;pm[it.nom].ca+=ca_u*it.qte;pm[it.nom].cout+=cout_u*it.qte;pm[it.nom].benef+=(ca_u-cout_u)*it.qte;});});
  const prodList=Object.values(pm).sort((a,b)=>b.benef-a.benef);
  const totCA=prodList.reduce((a,p)=>a+p.ca,0);
  const totCout=prodList.reduce((a,p)=>a+p.cout,0);
  const totBenefV=prodList.reduce((a,p)=>a+p.benef,0);
  const totLivr=livr.reduce((a,l)=>a+(l.montant||0),0);
  const totDep=dep.reduce((a,d)=>a+(d.montant||0),0);
  const totPrimes=primes.reduce((a,p)=>a+(p.montant||0),0);
  const imp=Math.round(calcImpot(totCA+totLivr));
  const benefNet=totBenefV+totLivr-totDep-totPrimes-imp;
  // CA par employé
  const empMap={};
  (empsCA||[]).forEach(c=>{const id=c.employe_discord_id;if(!id)return;if(!empMap[id])empMap[id]={ca:0,cmds:0};empMap[id].ca+=c.total_apres_reduction||c.total||0;empMap[id].cmds++;});
  const empIds=Object.keys(empMap);
  let empNames={};
  if(empIds.length){const emps=await sb(`comptes_dashboard?discord_id=in.(${empIds.join(',')})&select=discord_id,nom,prenom,poste`);(emps||[]).forEach(e=>empNames[e.discord_id]=e);}
  const semaines=[...new Set([semaine,...histo.map(h=>h.semaine)])].slice(0,12);

  el.innerHTML=`
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:18px;flex-wrap:wrap">
    <div style="font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;color:var(--red)">💹 Analyse des Bénéfices</div>
    <select class="form-select" id="benefSemSel" onchange="loadBenefices()" style="max-width:200px;margin-left:auto">
      ${semaines.map(s=>`<option value="${s}"${s===semaineFiltre?' selected':''}>${s===semaine?'📍 ':''}${getLabelSemaine(s)}${s===semaine?' (en cours)':''}</option>`).join('')}
    </select>
  </div>
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:20px">
    <div class="stat" style="--accent:var(--blue)"><div class="stat-icon">🧾</div><div class="stat-label">CA Brut</div><div class="stat-val" style="font-size:20px">${fmtMoney(totCA)}</div></div>
    <div class="stat" style="--accent:var(--red)"><div class="stat-icon">📦</div><div class="stat-label">Coût import</div><div class="stat-val" style="font-size:20px;color:var(--red)">${fmtMoney(totCout)}</div><div class="stat-sub">${totCA>0?Math.round(totCout/totCA*100):0}% du CA</div></div>
    <div class="stat" style="--accent:var(--green)"><div class="stat-icon">📈</div><div class="stat-label">Bénéfice brut</div><div class="stat-val" style="font-size:20px;color:var(--green)">+${fmtMoney(totBenefV)}</div><div class="stat-sub">Marge ${totCA>0?Math.round(totBenefV/totCA*100):0}%</div></div>
    <div class="stat" style="--accent:var(--orange)"><div class="stat-icon">🚚</div><div class="stat-label">Livraisons</div><div class="stat-val" style="font-size:20px;color:var(--orange)">+${fmtMoney(totLivr)}</div></div>
    <div class="stat" style="--accent:var(--warn)"><div class="stat-icon">👥</div><div class="stat-label">Primes</div><div class="stat-val" style="font-size:20px;color:var(--warn)">-${fmtMoney(totPrimes)}</div></div>
    <div class="stat" style="--accent:var(--red)"><div class="stat-icon">💸</div><div class="stat-label">Dépenses</div><div class="stat-val" style="font-size:20px;color:var(--red)">-${fmtMoney(totDep)}</div></div>
    <div class="stat" style="--accent:var(--red-d)"><div class="stat-icon">🏛️</div><div class="stat-label">Impôts (${tauxImpot(totCA+totLivr)})</div><div class="stat-val" style="font-size:20px;color:var(--red)">-${fmtMoney(imp)}</div></div>
    <div class="stat" style="--accent:${benefNet>=0?'var(--green)':'var(--red)'};border:2px solid ${benefNet>=0?'rgba(39,174,96,.35)':'rgba(192,57,43,.35)'}"><div class="stat-icon">${benefNet>=0?'🏆':'📉'}</div><div class="stat-label">Bénéfice NET</div><div class="stat-val" style="font-size:22px;color:${benefNet>=0?'var(--green)':'var(--red)'}">${benefNet>=0?'+':''}${fmtMoney(benefNet)}</div></div>
  </div>

/* ──────────────────────────────────────────
   UTILS DATES
────────────────────────────────────────── */
function ctFmtDate(d) {
  if (!d) return '';
  const dt = typeof d === 'string' ? new Date(d + 'T00:00:00') : d;
  return `${String(dt.getDate()).padStart(2,'0')}/${String(dt.getMonth()+1).padStart(2,'0')}/${dt.getFullYear()}`;
}
function ctTodayISO() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function ctAddDays(isoDate, days) {
  const d = new Date(isoDate + 'T00:00:00');
  d.setDate(d.getDate() + days);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function ctOnEmployeChange() {
  const hidden = document.getElementById('ctEmploye');

  const contrat = hidden.dataset.contrat || 'CDD';

  const embauche = hidden.dataset.embauche || ctTodayISO();

  const today = ctTodayISO();
  const [y,m,d] = today.split('-');
  document.getElementById('ctReference').value = `CT-BS-${d}-${m}-${y}`;
  document.getElementById('ctType').value = contrat;
  document.getElementById('ctPoste').value = poste;
  document.getElementById('ctDateDebut').value = embauche;
  document.getElementById('ctIdCitoyen').value = hidden.value;
  document.getElementById('ctRemuneration').value = contrat === 'CDI'
    ? '$50.000/quota+vente'
    : '$50.000/quota';

  ctOnTypeChange();
  ctRecalcDates();

  const type = document.getElementById('ctType').value;

  finGroup.style.display = type === 'CDI' ? 'none' : '';

    ? '$50.000/quota+vente'
    : '$50.000/quota';
  ctRecalcDates();
}

function ctRecalcDates() {
  const type = document.getElementById('ctType').value;

  if (!debut) return;
  if (type === 'CDD') {

function ctValidateForm() {
  if (!document.getElementById('ctEmploye').value.trim()) {
    document.getElementById('alertCT').innerHTML = '<div class="alert alert-err">⚠️ Sélectionne un employé.</div>';
    return false;
  }
  const required = ['ctReference','ctDateDebut','ctPoste','ctTemps','ctRemuneration','ctIdCitoyen'];
  for (const id of required) {
    const el = document.getElementById(id);
    if (!el.value.trim()) {
      document.getElementById('alertCT').innerHTML = `<div class="alert alert-err">⚠️ Le champ "${id}" est obligatoire.</div>`;
      el.focus();
      return false;
    }
  }
  if (document.getElementById('ctType').value === 'CDD' && !document.getElementById('ctDateFin').value) {
    document.getElementById('alertCT').innerHTML = '<div class="alert alert-err">⚠️ Date de fin obligatoire pour un CDD.</div>';
    return false;
  }
  return true;
}

let ctCanvasCtx = null, ctDrawing = false, ctHasDrawn = false;

function ctInitCanvas() {
  const canvas = document.getElementById('ctSignCanvas');
  if (!canvas) return;
  // Adapter résolution réelle au display size
  const ratio = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * ratio;
  canvas.height = rect.height * ratio;
  ctCanvasCtx = canvas.getContext('2d');
  ctCanvasCtx.scale(ratio, ratio);
  ctCanvasCtx.lineWidth = 2;
  ctCanvasCtx.lineCap = 'round';
  ctCanvasCtx.strokeStyle = '#1a1a1a';
  ctHasDrawn = false;

  const getPos = (e) => {
    const r = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return { x: clientX - r.left, y: clientY - r.top };
  };

  const start = (e) => { ctDrawing = true; ctHasDrawn = true; const p = getPos(e); ctCanvasCtx.beginPath(); ctCanvasCtx.moveTo(p.x, p.y); e.preventDefault(); };
  const move = (e) => { if (!ctDrawing) return; const p = getPos(e); ctCanvasCtx.lineTo(p.x, p.y); ctCanvasCtx.stroke(); e.preventDefault(); };
  const end = () => { ctDrawing = false; };

  canvas.onmousedown = start; canvas.onmousemove = move; canvas.onmouseup = end; canvas.onmouseleave = end;
  canvas.ontouchstart = start; canvas.ontouchmove = move; canvas.ontouchend = end;
}

function ctClearSignature() {
  const canvas = document.getElementById('ctSignCanvas');
  if (!canvas || !ctCanvasCtx) return;
  ctCanvasCtx.clearRect(0, 0, canvas.width, canvas.height);
  ctHasDrawn = false;
}

async function ctSignerContrat(contratId) {
  if (!ctHasDrawn) { alert('⚠️ Merci de signer dans la zone prévue avant de valider.'); return; }
  const canvas = document.getElementById('ctSignCanvas');
  const signatureDataURL = canvas.toDataURL('image/png');

  await sb(`contrats_travail?id=eq.${contratId}`, {
    method: 'PATCH',
    body: JSON.stringify({ statut: 'signe', signature_employe: signatureDataURL, signature_date: new Date().toISOString() })
  });

  const data = await sb(`contrats_travail?id=eq.${contratId}&select=*`);
  const c = data?.[0];

  // Marquer le règlement signé si pas déjà fait (optionnel, cohérence)
  await sb(`comptes_dashboard?discord_id=eq.${USER.id}`, {
     method: 'PATCH',
     body: JSON.stringify({ contrat: c?.type_contrat || 'CDI' })
   });

  document.getElementById('ovContratSign').style.display = 'none';
  alert('✅ Contrat signé avec succès !');

  if (c) {
    await webhook({
      username: 'Burger Shot — Contrats',
      avatar_url: CT_LOGO_BS,
      embeds: [{
        title: '✅ Contrat signé',
        color: 0x27ae60,
        fields: [
          { name: '👤 Salarié(e)', value: `${c.employe_prenom} ${c.employe_nom}`, inline: true },
          { name: '📋 Type', value: c.type_contrat, inline: true },
          { name: '📅 Référence', value: c.reference, inline: true }
        ],
        timestamp: new Date().toISOString(),
        footer: { text: 'Contrat validé par le/la salarié(e)' }
      }]
    });
  }
}

async function exporterRecapCDI() {
  const el = document.getElementById('cdiEligiblesContent');
  if (!el || el.innerHTML.includes('spin')) { alert('Charge d\'abord l\'onglet CDI éligibles.'); return; }

  const semaine = getSemaine();
  const [employes, tickets] = await Promise.all([
    sb('comptes_dashboard?select=*&actif=eq.true&contrat=eq.CDD&role=neq.gouvernement&order=nom.asc'),
    sb(`quotas_tickets?select=employe_discord_id,type,quantite&semaine=eq.${semaine}&statut=eq.valide`)
  ]);

  const quotaMap = {};
  (tickets||[]).forEach(t => {
    if (!quotaMap[t.employe_discord_id]) quotaMap[t.employe_discord_id] = { viande:0, patates:0 };
    quotaMap[t.employe_discord_id][t.type] += t.quantite;
  });

  const semaineActuelleDebut = new Date(getSemaine() + 'T00:00:00');
  const semainePasseeDebut = new Date(semaineActuelleDebut);
  semainePasseeDebut.setDate(semainePasseeDebut.getDate() - 7);
  const nowExport = new Date();
  const avertsActifs = await sb(`avertissements?actif=eq.true&select=employe_discord_id,niveau`).catch(()=>[]) || [];
  const avertsRecents = (await sb(`avertissements?actif=eq.false&cree_le=gte.${semainePasseeDebut.toISOString()}&select=employe_discord_id,niveau,expire_le`).catch(()=>[]) || [])
    .filter(a => a.expire_le && new Date(a.expire_le) <= nowExport);
  const avertMap = {};
  [...avertsActifs,...avertsRecents].forEach(a => {
    avertMap[a.employe_discord_id] = Math.max(avertMap[a.employe_discord_id]||0, a.niveau);
  });

  const rows = (employes||[]).filter(e => {
    return Math.floor((Date.now() - new Date(e.date_embauche||0).getTime()) / 86400000) >= 6;
  }).map(e => {
    let docs = []; try { docs = typeof e.documents==='string' ? JSON.parse(e.documents) : (e.documents||[]); } catch {}
    const q = quotaMap[e.discord_id] || { viande:0, patates:0 };
    return {
      nom: `${e.nom} ${e.prenom}`,
      poste: e.poste || '—',
      anc: true,
      quota: Math.round(q.viande/quotaCfg.cdd_viande*100) >= 100 && Math.round(q.patates/quotaCfg.cdd_patates*100) >= 100,
      regl: e.reglement_signe || false,
      visite: docs.some(d => d.type === 'Visite médicale'),
      permis: docs.some(d => d.type === 'Permis de conduire'),
      avert: (avertMap[e.discord_id] || 0) > 0
    };
  });

  // Canvas
  const DPR = 2;
  const ROW_H = 44, HEADER_H = 110, COL_W = 100, NAME_W = 200, PAD = 24;
  const COLS = [
    { label:'📅 Ancienneté', key:'anc' },
    { label:'🚚 Quota',      key:'quota' },
    { label:'📜 Règlement',  key:'regl' },
    { label:'🏥 Visite méd.',key:'visite' },
    { label:'🪪 Permis',     key:'permis' },
    { label:'⚠️ Avertiss.',  key:'avert', invert:true },
    { label:'🎯 Statut',     key:'statut', custom:true }
  ];
  const isElig = r => r.anc && r.quota && r.regl && r.visite && r.permis && !r.avert;
  const W = NAME_W + COLS.length * COL_W + PAD * 2;
  const H = HEADER_H + rows.length * ROW_H + 60;

  const cv = document.createElement('canvas');
  cv.width = W * DPR; cv.height = H * DPR;
  const ctx = cv.getContext('2d');
  ctx.scale(DPR, DPR);

  ctx.fillStyle = '#0d0d0d'; ctx.fillRect(0,0,W,H);
  const g = ctx.createLinearGradient(0,0,W,0);
  g.addColorStop(0,'#c0392b'); g.addColorStop(1,'#e67e22');
  ctx.fillStyle = g; ctx.fillRect(0,0,W,6);

  ctx.fillStyle = '#c0392b';
  ctx.beginPath(); ctx.arc(PAD+26,46,26,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.font = 'bold 18px Arial';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('🍔', PAD+26, 46);

  ctx.fillStyle = '#fff'; ctx.font = 'bold 20px Arial';
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.fillText('BURGER SHOT — Éligibles CDI', PAD+62, 26);
  ctx.fillStyle = '#888'; ctx.font = '13px Arial';
  ctx.fillText('Récapitulatif · ' + new Date().toLocaleDateString('fr-FR',{day:'2-digit',month:'long',year:'numeric'}), PAD+62, 52);

  const nbElig = rows.filter(isElig).length;
  ctx.fillStyle = '#27ae60'; ctx.font = 'bold 28px Arial';
  ctx.textAlign = 'right';
  ctx.fillText(`${nbElig} éligible${nbElig>1?'s':''}`, W-PAD, 26);
  ctx.fillStyle = '#666'; ctx.font = '12px Arial';
  ctx.fillText(`sur ${rows.length} CDD actifs (≥6j)`, W-PAD, 60);

  const startY = HEADER_H;
  ctx.fillStyle = '#1c1c1c'; ctx.fillRect(0,startY-10,W,36);
  ctx.fillStyle = '#c0392b'; ctx.font = 'bold 11px Arial';
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillText('EMPLOYÉ', PAD, startY+8);
  COLS.forEach((col,i) => {
    ctx.fillStyle = '#888'; ctx.font = '10px Arial'; ctx.textAlign = 'center';
    ctx.fillText(col.label, NAME_W+PAD+i*COL_W+COL_W/2, startY+8);
  });
  ctx.strokeStyle = '#c0392b'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(PAD,startY+22); ctx.lineTo(W-PAD,startY+22); ctx.stroke();

  rows.forEach((emp,ri) => {
    const y = startY+26+ri*ROW_H;
    const elig = isElig(emp);
    ctx.fillStyle = elig ? 'rgba(39,174,96,0.07)' : (ri%2===0?'#141414':'#181818');
    ctx.fillRect(0,y-4,W,ROW_H);
    ctx.fillStyle = '#f0f0f0'; ctx.font = 'bold 13px Arial';
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillText(emp.nom, PAD, y+ROW_H/2-10);
    ctx.fillStyle = '#666'; ctx.font = '11px Arial';
    ctx.fillText(emp.poste, PAD, y+ROW_H/2+6);
    COLS.forEach((col,ci) => {
      const val = col.invert ? !emp[col.key] : emp[col.key];
      const cx = NAME_W+PAD+ci*COL_W+COL_W/2, cy = y+ROW_H/2-2;
      if (!col.custom) {
        ctx.beginPath(); ctx.arc(cx,cy,13,0,Math.PI*2);
        ctx.fillStyle = val ? 'rgba(39,174,96,0.18)' : 'rgba(192,57,43,0.18)'; ctx.fill();
        ctx.fillStyle = val ? '#27ae60' : '#c0392b';
        ctx.font = '15px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(val?'✓':'✗', cx, cy);
      } else {
        if (elig) {
          ctx.fillStyle = 'rgba(39,174,96,0.2)';
          ctx.beginPath(); ctx.roundRect(cx-38, cy-11, 76, 22, 5); ctx.fill();
          ctx.fillStyle = '#27ae60'; ctx.font = 'bold 11px Arial'; ctx.textAlign = 'center';
          ctx.fillText('ÉLIGIBLE', cx, cy+1);
        } else {
          ctx.fillStyle = 'rgba(192,57,43,0.15)';
          ctx.beginPath(); ctx.roundRect(cx-38, cy-11, 76, 22, 5); ctx.fill();
          ctx.fillStyle = '#c0392b'; ctx.font = 'bold 11px Arial'; ctx.textAlign = 'center';
          ctx.fillText('EN COURS', cx, cy+1);
        }
      }
    });
    ctx.strokeStyle = 'rgba(255,255,255,0.05)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(PAD,y+ROW_H-4); ctx.lineTo(W-PAD,y+ROW_H-4); ctx.stroke();
  });

  const fy = H-30;
  ctx.fillStyle = '#333'; ctx.fillRect(0,fy-10,W,40);
  ctx.fillStyle = '#555'; ctx.font = '11px Arial'; ctx.textAlign = 'center';
  ctx.fillText('Burger Shot • RedStarRP • Dashboard interne', W/2, fy+8);

  const link = document.createElement('a');
  link.download = `recap-cdi-${getSemaine()}.png`;
  link.href = cv.toDataURL('image/png');
  link.click();
}
</script>
</body>
</html>
