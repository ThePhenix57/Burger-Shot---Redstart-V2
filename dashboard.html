<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Burger Shot — Dashboard</title>
<link rel="icon" href="https://upload.redstartrp.fr/uploads/photo-1779965966-13fd724e49fb.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════
   VARIABLES & RESET
═══════════════════════════════════════ */
:root {
  --red:#c0392b; --red-dark:#922b21; --red-light:#e74c3c;
  --orange:#e67e22; --success:#27ae60; --warning:#f39c12; --blue:#3498db;
  --bg:#0d0d0d; --card:#141414; --card2:#1c1c1c; --card3:#222;
  --text:#f1f1f1; --muted:#777; --border:rgba(255,255,255,.07);
  --shadow:0 4px 24px rgba(0,0,0,.4);
  --radius:12px;
}
[data-theme="light"] {
  --bg:#ede9e3; --card:#fff; --card2:#f5f1eb; --card3:#eee;
  --text:#111; --muted:#666; --border:rgba(0,0,0,.08);
  --shadow:0 4px 24px rgba(0,0,0,.1);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .25s,color .25s;}
a{text-decoration:none;color:inherit;}
button{font-family:'Barlow',sans-serif;}
input,select,textarea{font-family:'Barlow',sans-serif;}

/* ═══════════════════════════════════════
   TOPBAR
═══════════════════════════════════════ */
.topbar{position:sticky;top:0;z-index:200;}

/* Ligne damier */
.checker-bar{
  height:12px;
  background:repeating-linear-gradient(90deg,var(--red) 0,var(--red) 12px,#fff 12px,#fff 24px);
}

/* Barre principale */
.topbar-main{
  display:flex;align-items:center;
  background:var(--card);
  border-bottom:1px solid var(--border);
  padding:0 28px;
  height:64px;
  gap:20px;
}

/* Logo centré */
.topbar-logo{
  position:absolute;left:50%;transform:translateX(-50%);
  display:flex;flex-direction:column;align-items:center;
  pointer-events:none;
}
.topbar-logo img{height:44px;object-fit:contain;filter:drop-shadow(0 0 10px rgba(192,57,43,.4));}
.topbar-logo-sub{font-size:8px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-top:1px;}

/* Identité droite */
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:14px;position:relative;}
.topbar-user{display:flex;flex-direction:column;align-items:flex-end;}
.topbar-user-name{font-size:14px;font-weight:700;letter-spacing:.5px;}
.topbar-user-role{font-size:10px;color:var(--orange);text-transform:uppercase;letter-spacing:1.5px;margin-top:1px;}
.topbar-avatar{
  width:38px;height:38px;border-radius:50%;
  background:var(--red);
  display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:15px;
  overflow:hidden;
  border:2px solid rgba(192,57,43,.5);
  flex-shrink:0;
}
.topbar-avatar img{width:100%;height:100%;object-fit:cover;}
.topbar-actions{display:flex;flex-direction:column;align-items:center;gap:4px;}
.btn-theme{
  width:30px;height:30px;border-radius:50%;
  background:var(--card2);border:1px solid var(--border);
  color:var(--text);font-size:14px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:.2s;
}
.btn-theme:hover{border-color:var(--red);}
.btn-logout{
  padding:4px 12px;
  background:rgba(192,57,43,.15);
  border:1px solid rgba(192,57,43,.3);
  border-radius:20px;
  color:var(--red);
  font-size:10px;font-weight:700;
  letter-spacing:1px;text-transform:uppercase;
  cursor:pointer;transition:.2s;
  white-space:nowrap;
}
.btn-logout:hover{background:var(--red);color:#fff;}

/* Nav bar */
.topbar-nav{
  display:flex;align-items:center;
  background:var(--red);
  min-height:38px;
  overflow-x:auto;
  scrollbar-width:none;
  position:relative;
}
.topbar-nav::-webkit-scrollbar{display:none;}
.nav-group{display:flex;align-items:center;}
.nav-spacer{flex:1;}
.nav-logo-center{
  display:flex;align-items:center;justify-content:center;
  padding:4px 20px;pointer-events:none;
}
.nav-logo-center img{height:22px;filter:brightness(0) invert(1);opacity:.85;}
.nav-item{
  padding:9px 16px;
  font-size:11px;font-weight:700;
  letter-spacing:1.5px;text-transform:uppercase;
  color:rgba(255,255,255,.75);
  cursor:pointer;white-space:nowrap;
  border-bottom:3px solid transparent;
  transition:.15s;flex-shrink:0;
  display:flex;align-items:center;gap:6px;
}
.nav-item:hover{color:#fff;background:rgba(0,0,0,.15);}
.nav-item.active{color:#fff;background:rgba(0,0,0,.2);border-bottom-color:#fff;}

/* ═══════════════════════════════════════
   LAYOUT
═══════════════════════════════════════ */
.content{padding:28px;width:100%;max-width:1400px;margin:0 auto;}
.page{display:none;}
.page.active{display:block;}

/* ═══════════════════════════════════════
   COMPOSANTS RÉUTILISABLES
═══════════════════════════════════════ */
.red-line{height:3px;background:linear-gradient(90deg,var(--red),var(--orange));border-radius:2px;margin-bottom:24px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;}
.card-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;color:var(--red);margin-bottom:16px;}

/* Grilles */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}

/* Stats */
.stat-card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:20px;position:relative;overflow:hidden;
}
.stat-card::before{content:'';position:absolute;top:0;left:0;bottom:0;width:3px;background:var(--accent,var(--red));}
.stat-icon{
  width:38px;height:38px;border-radius:9px;
  display:flex;align-items:center;justify-content:center;font-size:17px;
  background:var(--accent-bg,rgba(192,57,43,.12));
  border:1px solid var(--accent-border,rgba(192,57,43,.25));
  margin-bottom:12px;
}
.stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:2px;margin-bottom:5px;}
.stat-value{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:1px;color:var(--accent,var(--red));line-height:1;}
.stat-sub{font-size:12px;color:var(--muted);margin-top:5px;}

/* Formulaires */
.form-group{margin-bottom:16px;}
.form-label{display:block;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.form-input,.form-select{
  width:100%;padding:10px 14px;
  background:var(--card2);border:1px solid var(--border);
  border-radius:8px;color:var(--text);font-size:14px;
  transition:border-color .2s;
}
.form-input:focus,.form-select:focus{outline:none;border-color:var(--red);}
.form-select option{background:var(--card2);}
textarea.form-input{resize:vertical;min-height:80px;}

/* Boutons */
.btn{padding:10px 20px;border-radius:8px;border:none;font-size:13px;font-weight:700;cursor:pointer;transition:.2s;letter-spacing:.5px;display:inline-flex;align-items:center;gap:7px;}
.btn-primary{background:var(--red);color:#fff;}
.btn-primary:hover{background:var(--red-dark);transform:translateY(-1px);}
.btn-success{background:var(--success);color:#fff;}
.btn-success:hover{opacity:.9;}
.btn-danger{background:var(--red);color:#fff;}
.btn-outline{background:transparent;color:var(--text);border:1px solid var(--border);}
.btn-outline:hover{border-color:var(--red);color:var(--red);}
.btn-sm{padding:6px 12px;font-size:11px;}
.btn-orange{background:var(--orange);color:#fff;}
.btn-orange:hover{opacity:.9;}

/* Badges */
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.5px;}
.badge-red{background:rgba(192,57,43,.2);color:var(--red);}
.badge-green{background:rgba(39,174,96,.2);color:var(--success);}
.badge-orange{background:rgba(230,126,34,.2);color:var(--orange);}
.badge-blue{background:rgba(52,152,219,.2);color:var(--blue);}
.badge-gold{background:rgba(241,196,15,.2);color:#f1c40f;}
.badge-purple{background:rgba(155,89,182,.2);color:#9b59b6;}

/* Tableaux */
table{width:100%;border-collapse:collapse;}
th{text-align:left;padding:10px 12px;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);}
td{padding:11px 12px;font-size:13px;border-bottom:1px solid var(--border);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--card2);}

/* Alertes */
.alert{padding:12px 16px;border-radius:8px;font-size:13px;margin-bottom:14px;}
.alert-ok{background:rgba(39,174,96,.1);border:1px solid rgba(39,174,96,.3);color:var(--success);}
.alert-err{background:rgba(192,57,43,.1);border:1px solid rgba(192,57,43,.3);color:var(--red);}
.alert-warn{background:rgba(230,126,34,.1);border:1px solid rgba(230,126,34,.3);color:var(--orange);}

/* Popups */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:9999;backdrop-filter:blur(2px);}
.popup{width:520px;max-width:96vw;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px;max-height:90vh;overflow-y:auto;}
.popup-title{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:1px;color:var(--red);margin-bottom:18px;}

/* Loading */
.loading{display:flex;align-items:center;justify-content:center;padding:48px;color:var(--muted);gap:10px;font-size:14px;}
.spin{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ═══════════════════════════════════════
   ACCUEIL — HERO
═══════════════════════════════════════ */
.hero{
  background:var(--card);border:1px solid var(--border);border-radius:16px;
  padding:28px 32px;display:flex;align-items:center;gap:24px;
  margin-bottom:24px;position:relative;overflow:hidden;
}
.hero::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--red),var(--orange),var(--red));}
.hero::after{
  content:'BURGER SHOT';position:absolute;right:20px;top:50%;transform:translateY(-50%);
  font-family:'Bebas Neue',sans-serif;font-size:110px;letter-spacing:6px;
  color:rgba(192,57,43,.04);pointer-events:none;white-space:nowrap;line-height:1;
}
.hero-avatar{
  width:68px;height:68px;border-radius:50%;background:var(--red);
  display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:800;
  overflow:hidden;border:3px solid rgba(192,57,43,.4);
  box-shadow:0 0 24px rgba(192,57,43,.3);flex-shrink:0;
}
.hero-avatar img{width:100%;height:100%;object-fit:cover;}
.hero-name{font-family:'Bebas Neue',sans-serif;font-size:44px;letter-spacing:2px;line-height:1;}
.hero-name span{color:var(--red);}
.hero-sub{font-size:12px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;margin-bottom:6px;}
.hero-tags{display:flex;align-items:center;gap:8px;margin-top:8px;flex-wrap:wrap;}

/* ═══════════════════════════════════════
   CAISSE
═══════════════════════════════════════ */
.caisse-layout{display:grid;grid-template-columns:1fr 340px;gap:24px;align-items:start;}
.caisse-cat{margin-bottom:24px;}
.caisse-cat-title{
  font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:3px;color:var(--red);
  margin-bottom:10px;padding-bottom:8px;border-bottom:2px solid var(--red);
  display:flex;align-items:center;gap:7px;
}
.caisse-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;}
.prod-card{
  background:var(--card2);border:2px solid var(--border);border-radius:10px;
  cursor:pointer;transition:.2s;overflow:hidden;display:flex;flex-direction:column;
  position:relative;
}
.prod-card:hover{transform:translateY(-3px);border-color:var(--red);box-shadow:0 8px 24px rgba(192,57,43,.2);}
.prod-card:active{transform:scale(.97);}
.prod-img{width:100%;aspect-ratio:1;background:var(--card);display:flex;align-items:center;justify-content:center;overflow:hidden;border-bottom:1px solid var(--border);}
.prod-img img{width:100%;height:100%;object-fit:contain;padding:8px;transition:.2s;}
.prod-card:hover .prod-img img{transform:scale(1.08);}
.prod-emoji{font-size:48px;line-height:1;}
.prod-info{padding:9px 10px 11px;}
.prod-name{font-size:12px;font-weight:700;margin-bottom:4px;line-height:1.2;}
.prod-bottom{display:flex;justify-content:space-between;align-items:center;margin-top:3px;}
.prod-price{font-family:'Bebas Neue',sans-serif;font-size:15px;color:var(--red);letter-spacing:1px;}
.prod-pts{font-size:10px;color:var(--muted);}
.prod-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--red);transform:scaleX(0);transition:.2s;}
.prod-card:hover::after{transform:scaleX(1);}

/* Ticket */
.ticket-wrap{position:sticky;top:114px;}
.ticket{
  background:#f7f2e8;color:#111;border-radius:12px;padding:22px;
  font-family:'Courier New',monospace;
  box-shadow:0 10px 40px rgba(0,0,0,.5);
}
.ticket-head{text-align:center;margin-bottom:14px;}
.ticket-logo-txt{font-size:20px;font-weight:900;letter-spacing:2px;}
.ticket-addr{font-size:11px;color:#555;margin-top:3px;}
.t-sep{border:none;border-top:1px dashed #aaa;margin:10px 0;}
.ticket-lines{min-height:50px;}
.t-line{display:flex;justify-content:space-between;margin-bottom:5px;font-size:13px;}
.t-empty{text-align:center;color:#999;font-size:13px;padding:18px 0;}
.ticket-totals{}
.t-total{font-size:17px;font-weight:900;text-align:right;}
.t-reduc{font-size:12px;color:#c0392b;text-align:right;margin-top:3px;}
.t-pts{font-size:11px;color:#555;text-align:right;margin-top:3px;}
.ticket-footer{margin-top:10px;font-size:11px;color:#666;}
.ticket-btns{display:flex;gap:8px;margin-top:16px;}
.ticket-btns .btn{flex:1;justify-content:center;}

/* ═══════════════════════════════════════
   QUOTA EMPLOYÉ
═══════════════════════════════════════ */
.quota-card{
  background:linear-gradient(135deg,rgba(192,57,43,.1),rgba(230,126,34,.08));
  border:1px solid rgba(192,57,43,.25);border-radius:14px;padding:24px;
}
.quota-progress-wrap{margin:16px 0;}
.quota-bar-bg{height:12px;background:var(--card3);border-radius:6px;overflow:hidden;}
.quota-bar-fill{height:100%;background:linear-gradient(90deg,var(--red),var(--orange));border-radius:6px;transition:width .5s ease;}
.quota-pct{font-family:'Bebas Neue',sans-serif;font-size:48px;color:var(--red);line-height:1;margin-top:6px;}

/* ═══════════════════════════════════════
   CALENDRIER
═══════════════════════════════════════ */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:12px;}
.cal-day-name{text-align:center;font-size:10px;color:var(--muted);font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:6px 0;}
.cal-day{
  min-height:70px;background:var(--card2);border:1px solid var(--border);border-radius:8px;
  padding:6px;cursor:pointer;transition:.2s;position:relative;
}
.cal-day:hover{border-color:var(--red);}
.cal-day.today{border-color:var(--red);background:rgba(192,57,43,.08);}
.cal-day.other-month{opacity:.35;}
.cal-day-num{font-size:12px;font-weight:700;margin-bottom:4px;}
.cal-event{
  font-size:9px;background:var(--red);color:#fff;
  border-radius:3px;padding:2px 4px;margin-bottom:2px;
  overflow:hidden;white-space:nowrap;text-overflow:ellipsis;
}

/* ═══════════════════════════════════════
   STATS — Heatmap
═══════════════════════════════════════ */
.heatmap-grid{display:grid;grid-template-columns:60px repeat(7,1fr);gap:2px;margin-top:10px;}
.heatmap-cell{
  height:36px;border-radius:4px;display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;transition:.2s;
}
.heatmap-label{font-size:10px;color:var(--muted);display:flex;align-items:center;}

/* ═══════════════════════════════════════
   GESTION PRODUITS (direction)
═══════════════════════════════════════ */
.menu-prod-card{
  background:var(--card2);border:1px solid var(--border);border-radius:10px;
  padding:12px;text-align:center;position:relative;
}
.menu-prod-card img{width:56px;height:56px;object-fit:contain;margin-bottom:6px;}
.menu-prod-actions{position:absolute;top:6px;right:6px;display:flex;gap:3px;}
.menu-prod-actions button{background:none;border:none;cursor:pointer;font-size:14px;padding:2px;}
</style>
</head>
<body>

<!-- ═══ TOPBAR ═══ -->
<div class="topbar">
  <div class="checker-bar"></div>
  <div class="topbar-main" style="position:relative;">
    <div class="topbar-logo">
      <img src="https://upload.redstartrp.fr/uploads/photo-1779920811-a57e8bd11bf7.png" alt="Burger Shot" onerror="this.style.display='none'">
    </div>
    <div class="topbar-right">
      <div class="topbar-user">
        <div class="topbar-user-name" id="topName">—</div>
        <div class="topbar-user-role" id="topRole">—</div>
      </div>
      <div class="topbar-avatar" id="topAvatar"></div>
      <div class="topbar-actions">
        <button class="btn-theme" onclick="toggleTheme()" id="themeBtn">☀️</button>
        <button class="btn-logout" onclick="logout()">Déco</button>
      </div>
    </div>
  </div>
  <nav class="topbar-nav" id="topNav"></nav>
</div>

<!-- ═══ CONTENU ═══ -->
<div class="content" id="mainContent"></div>

<!-- ══════════════════════════════════════════
     POPUPS
══════════════════════════════════════════ -->
<!-- Validation commande -->
<div id="ovValidation" class="overlay" style="display:none;">
  <div class="popup">
    <div class="popup-title">✅ Valider la commande</div>
    <div id="validationRecap"></div>
    <div style="display:flex;gap:10px;margin-top:20px;">
      <button class="btn btn-outline" onclick="closeOverlay('ovValidation')">❌ Annuler</button>
      <button class="btn btn-success" onclick="confirmerCommande()">✅ Confirmer & Encaisser</button>
    </div>
  </div>
</div>

<!-- Pass client -->
<div id="ovPass" class="overlay" style="display:none;">
  <div class="popup">
    <div class="popup-title">🪪 Attribuer un Pass</div>
    <div class="form-group">
      <label class="form-label">Recherche client</label>
      <input class="form-input" id="passSearch" placeholder="Nom du client...">
    </div>
    <div id="passResults" style="margin-bottom:12px;"></div>
    <div id="passClientInfo" style="display:none;margin-bottom:12px;padding:10px;background:var(--card2);border-radius:8px;font-size:14px;"></div>
    <div class="form-group">
      <label class="form-label">Type de pass</label>
      <select class="form-select" id="passTypeSelect"></select>
    </div>
    <div id="passTypeInfo" style="font-size:12px;color:var(--muted);margin-bottom:16px;"></div>
    <div style="display:flex;gap:10px;">
      <button class="btn btn-outline" onclick="closeOverlay('ovPass')">Annuler</button>
      <button class="btn btn-primary" onclick="confirmerPass()">✅ Attribuer</button>
    </div>
  </div>
</div>

<!-- Quota ticket -->
<div id="ovQuota" class="overlay" style="display:none;">
  <div class="popup">
    <div class="popup-title">🚚 Déclarer un remplissage camion</div>
    <div class="form-group">
      <label class="form-label">Plaque du camion</label>
      <input class="form-input" id="quotaPlaque" placeholder="AB-123-CD">
    </div>
    <div class="form-group">
      <label class="form-label">Quantité livrée</label>
      <input class="form-input" id="quotaQte" type="number" placeholder="Ex: 150">
    </div>
    <div class="form-group">
      <label class="form-label">Notes (optionnel)</label>
      <textarea class="form-input" id="quotaNotes" placeholder="Détails..."></textarea>
    </div>
    <div style="display:flex;gap:10px;">
      <button class="btn btn-outline" onclick="closeOverlay('ovQuota')">Annuler</button>
      <button class="btn btn-primary" onclick="soumettreQuota()">📤 Soumettre</button>
    </div>
  </div>
</div>

<!-- Nouveau client -->
<div id="ovNewClient" class="overlay" style="display:none;">
  <div class="popup">
    <div class="popup-title">➕ Nouveau Client</div>
    <div id="alertNewClient"></div>
    <div class="g2">
      <div class="form-group"><label class="form-label">Nom</label><input class="form-input" id="ncNom" placeholder="Dupont"></div>

/* ══════════════════════════════════════════
   UTILS
══════════════════════════════════════════ */
function getSemaine() {
  const d = new Date(), utc = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const day = utc.getUTCDay() || 7;
  utc.setUTCDate(utc.getUTCDate() + 4 - day);
  const ys = new Date(Date.UTC(utc.getUTCFullYear(), 0, 1));
  const wk = Math.ceil((((utc - ys) / 86400000) + 1) / 7);
  return `${utc.getUTCFullYear()}-W${String(wk).padStart(2,'0')}`;
}

function calcImpot(m) {
  if (m < 200000) return 0; if (m < 400000) return m*.05;
  if (m < 600000) return m*.08; if (m < 800000) return m*.11;
  if (m < 1000000) return m*.14; if (m < 2500000) return m*.17;
  return m*.19;
}
function tauxLabel(m) {
  if (m < 200000) return '0%'; if (m < 400000) return '5%';
  if (m < 600000) return '8%'; if (m < 800000) return '11%';
  if (m < 1000000) return '14%'; if (m < 2500000) return '17%';
  return '19%';
}

function fmtPhone(input) {
  const d = input.value.replace(/\D/g,'').slice(0,10);
  if (!d.length) { input.value=''; return; }
  if (d.length <= 3) input.value = `(${d}`;
  else if (d.length <= 6) input.value = `(${d.slice(0,3)}) ${d.slice(3)}`;
  else input.value = `(${d.slice(0,3)}) ${d.slice(3,6)}-${d.slice(6)}`;
}
function fmtPhoneDisplay(v) {
  if (!v) return '—';
  const d = v.replace(/\D/g,'').slice(0,10);
  if (d.length <= 3) return d;
  if (d.length <= 6) return `(${d.slice(0,3)}) ${d.slice(3)}`;
  return `(${d.slice(0,3)}) ${d.slice(3,6)}-${d.slice(6)}`;
}

  const [prods, contrats] = await Promise.all([

    sb('contrats_reduction?select=*&actif=eq.true')

  const sel = document.getElementById('caisseContrat');
  if (sel) sel.innerHTML = '<option value="">— Aucun contrat —</option>' +
    (Array.isArray(contrats)?contrats:[]).map(c =>
      `<option value="${c.id}" data-pct="${c.pourcentage}">${c.nom} (-${c.pourcentage}%)</option>`
    ).join('');

  const el = document.getElementById('caisseProduits');
  if (!produits.length) { el.innerHTML='<p style="color:var(--muted)">Aucun produit disponible.</p>'; return; }

  const cats = [...new Set(produits.map(p => p.categorie))];
  el.innerHTML = cats.map(cat => `
    <div class="caisse-cat">
      <div class="caisse-cat-title"><span>${getEmoji(cat)}</span> ${cat}</div>
      <div class="caisse-grid">
        ${produits.filter(p => p.categorie===cat).map(p => `
          <div class="prod-card" onclick="addToTicket('${p.id}')">
            <div class="prod-img">
              ${p.image_url
                ? `<img src="${p.image_url}" alt="${p.nom}" onerror="this.parentElement.innerHTML='<span class=&quot;prod-emoji&quot;>${getEmoji(p.categorie)}</span>'">`
                : `<span class="prod-emoji">${getEmoji(p.categorie)}</span>`}
            </div>
            <div class="prod-info">
              <div class="prod-name">${p.nom}</div>
              <div class="prod-bottom">
                <div class="prod-price">${p.prix}$</div>
                <div class="prod-pts">🎯${p.points}pts</div>
              </div>
            </div>
          </div>`).join('')}
      </div>
    </div>`).join('');

  genTicket();
}

function updateContrat() {
  const sel = document.getElementById('caisseContrat');
  const opt = sel.options[sel.selectedIndex];
  contratActif = sel.value ? {id:sel.value, pct:parseFloat(opt.dataset.pct), nom:opt.text} : null;
  renderTicket();
}

function addToTicket(id) {
  const p = produits.find(x => x.id===id); if (!p) return;
  const e = commande.find(x => x.id===id);
  e ? e.qte++ : commande.push({...p, qte:1});
  renderTicket();
}

function calcCmd() {
  const brut = commande.reduce((a,b) => a+(b.prix*b.qte), 0);
  let r = 0;
  if (clientActif?.pass) {
    const pt = passTypes.find(p => p.nom===clientActif.pass);
    if (pt?.reduction > 0) r = Math.max(r, parseFloat(pt.reduction));
  }
  if (contratActif) r = Math.max(r, contratActif.pct);
  const montantR = Math.round(brut * r / 100);
  return {brut, r, montantR, net: brut - montantR};
}

function calcPts() {
  if (!clientActif?.pass) return 0;
  const pt = passTypes.find(p => p.nom===clientActif.pass);
  const mult = pt ? parseFloat(pt.multiplicateur) : 0;
  return Math.round(commande.reduce((a,b) => a+(b.points*b.qte), 0) * mult);
}

function renderTicket() {
  const linesEl = document.getElementById('tktLines');
  if (!commande.length) {
    linesEl.innerHTML = '<div class="t-empty">Aucun article</div>';
  } else {
    linesEl.innerHTML = commande.map(p =>
      `<div class="t-line"><div>${p.nom} ×${p.qte} <span style="font-size:10px;color:#888;">🎯${p.points*p.qte}pts</span></div><div>${p.prix*p.qte}$</div></div>`
    ).join('');
  }
  const c = calcCmd(); const pts = calcPts();
  document.getElementById('tktTotal').textContent = `${c.brut}$`;
  const rEl = document.getElementById('tktReduc');
  if (c.r>0) { rEl.style.display='block'; rEl.textContent=`Réduction -${c.r}% : -${c.montantR}$ → ${c.net}$`; }
  else rEl.style.display='none';
  const pEl = document.getElementById('tktPts');
  pEl.textContent = pts>0 ? `🎯 +${pts} points` : '';
  document.getElementById('tktClient').textContent = clientActif ? `${clientActif.prenom} ${clientActif.nom}` : 'Inconnu';
  const piEl = document.getElementById('tktPassInfo');
  if (clientActif?.pass) {
    const pt = passTypes.find(p => p.nom===clientActif.pass);
    piEl.textContent = `${clientActif.pass} • ×${pt?.multiplicateur||1} pts${pt?.reduction>0?` • -${pt.reduction}%`:''}`;
  } else piEl.textContent='';
  document.getElementById('tktEmploye').textContent = USER?.displayName||USER?.username||'—';
}

function genTicket() {
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  document.getElementById('tktId').textContent = `BS-${pad(now.getDate())}${pad(now.getMonth()+1)}${now.getFullYear()}-${pad(now.getHours())}${pad(now.getMinutes())}`;
  document.getElementById('tktDate').textContent = now.toLocaleString('fr-FR');
  renderTicket();
}

function annulerCommande() {
  if (!confirm('Annuler la commande ?')) return;
  commande=[]; clientActif=null; contratActif=null;
  document.getElementById('caisseClientSearch').value='';
  document.getElementById('caisseClientResults').innerHTML='';
  const cc = document.getElementById('caisseContrat');
  if(cc) cc.value='';
  renderTicket();
}

function ouvrirValidation() {
  if (!commande.length) { alert('Commande vide.'); return; }
  const c = calcCmd(); const pts = calcPts();
  document.getElementById('validationRecap').innerHTML =
    commande.map(p => `<div class="t-line" style="display:flex;justify-content:space-between;margin-bottom:6px;font-size:14px;"><div>${p.nom} ×${p.qte}</div><div>${p.prix*p.qte}$</div></div>`).join('') +
    `<hr style="border:none;border-top:1px dashed #666;margin:12px 0;">
    <div style="text-align:right;font-size:14px;">Brut : ${c.brut}$</div>
    ${c.r>0?`<div style="text-align:right;font-size:13px;color:var(--red);">Réduction -${c.r}% : -${c.montantR}$</div>`:''}
    <div style="text-align:right;font-size:18px;font-weight:900;margin-top:6px;">TOTAL : ${c.net}$</div>
    ${pts>0?`<div style="text-align:right;font-size:13px;color:var(--success);margin-top:4px;">🎯 +${pts} pts pour ${clientActif?.prenom||'le client'}</div>`:''}`;
  openOverlay('ovValidation');
}

async function confirmerCommande() {
  const c = calcCmd(); const pts = calcPts(); const semaine = getSemaine();

  // Sauvegarde commande
  await sb('commandes', {method:'POST', body:JSON.stringify({
    client_id: clientActif?.id||null,
    employe_discord_id: USER.id,
    items: JSON.stringify(commande),
    total: c.brut,
    reduction_pct: c.r,
    total_apres_reduction: c.net,
    points_gagnes: pts,
    contrat_id: contratActif?.id||null,
    semaine,
    tva: Math.round(c.net * 0.20)
  })});

  // Points client
  if (clientActif && pts > 0) {
    await sb(`clients?id=eq.${clientActif.id}`, {method:'PATCH', body:JSON.stringify({points:(clientActif.points||0)+pts})});
  }

  // Transaction
  await sb('transactions', {method:'POST', body:JSON.stringify({
    montant: c.net, type:'vente',
    employe_discord: USER.id,
    client_id: clientActif?.id||null,
    semaine
  })});

  // CA
  const caData = await sb('parametres?cle=eq.ca_semaine');
  const caActuel = parseFloat(caData?.[0]?.valeur||0)||0;
  if (caData?.[0]) {
    await sb('parametres?cle=eq.ca_semaine', {method:'PATCH', body:JSON.stringify({valeur:String(caActuel+c.net)})});
  } else {
    await sb('parametres', {method:'POST', body:JSON.stringify({cle:'ca_semaine',valeur:String(c.net)})});
  }

  // PDF commande
  genPDFCommande(c, pts);

  closeOverlay('ovValidation');
  commande=[]; clientActif=null; contratActif=null;
  document.getElementById('caisseClientSearch').value='';
  document.getElementById('caisseClientResults').innerHTML='';
  const cc = document.getElementById('caisseContrat');
  if(cc) cc.value='';
  genTicket();
  alert('✅ Commande validée !');
}

async function searchCaisseClient(val) {
  const el = document.getElementById('caisseClientResults');
  if (val.length < 2) { el.innerHTML=''; return; }
  const data = await sb(`clients?select=*&or=(nom.ilike.*${val}*,prenom.ilike.*${val}*)`);
  el.innerHTML = (Array.isArray(data)?data:[]).map(c => {
    const pts = c.points||0;
    return `<div onclick='selectCaisseClient(${JSON.stringify(c).replace(/'/g,"&#39;")})' 
      style="padding:10px;background:var(--card2);border:1px solid var(--border);margin-bottom:6px;border-radius:8px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:space-between;">
      <div><strong>${c.prenom} ${c.nom}</strong>${c.pass?`<span class="badge badge-gold" style="margin-left:6px;">${c.pass}</span>`:''}</div>
      <div style="display:flex;align-items:center;gap:8px;">
        <span style="font-size:11px;color:var(--muted);">🎯 ${pts} pts</span>
        ${pts > 0 ? `<button class="btn btn-outline btn-sm" onclick="event.stopPropagation();payerPoints('${c.id}',${pts})">💳 Payer pts</button>` : ''}
      </div>
    </div>`;
  }).join('');
}

function selectCaisseClient(c) {
  if (typeof c==='string') try{c=JSON.parse(c);}catch{return;}
  clientActif = c;
  document.getElementById('caisseClientSearch').value = `${c.prenom} ${c.nom}`;
  document.getElementById('caisseClientResults').innerHTML='';
  renderTicket();
}

async function payerPoints(clientId, ptsDispos) {
  // Calcul coût total en points
  const coutTotal = commande.reduce((a,b) => a+(b.points*b.qte), 0);
  if (!coutTotal) { alert('Aucun article sélectionné.'); return; }
  if (ptsDispos < coutTotal) { alert(`Points insuffisants : ${ptsDispos} pts disponibles, ${coutTotal} pts nécessaires.`); return; }
  if (!confirm(`Payer ${coutTotal} points sur ${ptsDispos} disponibles ?`)) return;
  // Déduit les points
  await sb(`clients?id=eq.${clientId}`, {method:'PATCH', body:JSON.stringify({points:ptsDispos-coutTotal})});
  alert(`✅ Paiement par points effectué ! Reste : ${ptsDispos-coutTotal} pts.`);
  commande=[]; clientActif=null; renderTicket();
}

async function loadCalendrier() {
  const now = new Date();
  calYear = now.getFullYear(); calMonth = now.getMonth();
  await renderCal();
}

async function renderCal() {
  const months = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  document.getElementById('calTitle').textContent = `${months[calMonth]} ${calYear}`;
  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const start = firstDay === 0 ? 6 : firstDay - 1;
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const daysInPrev = new Date(calYear, calMonth, 0).getDate();

  // Fetch events
  const from = `${calYear}-${String(calMonth+1).padStart(2,'0')}-01`;
  const to = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(daysInMonth).padStart(2,'0')}`;
  const events = await sb(`reservations?select=*&date_debut=gte.${from}T00:00:00&date_debut=lte.${to}T23:59:59&order=date_debut.asc`) || [];

  const today = new Date();
  const dayNames = ['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];

  let html = dayNames.map(d=>`<div class="cal-day-name">${d}</div>`).join('');

  // Prev month days
  for (let i=start-1; i>=0; i--) {
    html += `<div class="cal-day other-month"><div class="cal-day-num">${daysInPrev-i}</div></div>`;
  }
  // Current month
  for (let d=1; d<=daysInMonth; d++) {
    const isToday = today.getDate()===d && today.getMonth()===calMonth && today.getFullYear()===calYear;
    const dayEvents = events.filter(e => new Date(e.date_debut).getDate()===d);
    html += `<div class="cal-day${isToday?' today':''}" ${ROLE==='direction'?`onclick="prefillResa(${calYear},${calMonth+1},${d})"`:''}> 
      <div class="cal-day-num">${d}</div>
      ${dayEvents.map(e=>`<div class="cal-event">${e.titre||e.type}</div>`).join('')}
    </div>`;
  }
  // Next month
  const total = start + daysInMonth;
  const remaining = total%7===0?0:7-(total%7);
  for (let i=1; i<=remaining; i++) {
    html += `<div class="cal-day other-month"><div class="cal-day-num">${i}</div></div>`;
  }

  document.getElementById('calContainer').innerHTML = `<div class="cal-grid">${html}</div>`;

  // Liste events
  const listeEl = document.getElementById('calListe');
  if (!events.length) { listeEl.innerHTML='<p style="color:var(--muted)">Aucun événement ce mois.</p>'; return; }
  const typeColors = {reservation:'badge-blue',evenement:'badge-orange',reunion:'badge-purple'};
  listeEl.innerHTML = events.map(e => `
    <div style="display:flex;align-items:center;gap:12px;padding:12px;background:var(--card2);border-radius:8px;margin-bottom:8px;">
      <div style="flex:1;">
        <div style="font-weight:700;font-size:14px;">${e.titre||'Sans titre'}</div>
        <div style="font-size:12px;color:var(--muted);margin-top:2px;">${new Date(e.date_debut).toLocaleString('fr-FR')}${e.date_fin?` → ${new Date(e.date_fin).toLocaleString('fr-FR')}`:''}</div>
        ${e.notes?`<div style="font-size:12px;color:var(--muted);margin-top:3px;">${e.notes}</div>`:''}
      </div>
      <span class="badge ${typeColors[e.type]||'badge-blue'}">${e.type||'événement'}</span>
      ${ROLE==='direction'?`<button class="btn btn-outline btn-sm" onclick="deleteResa('${e.id}')">🗑️</button>`:''}
    </div>`).join('');
}

function renderHeatmap(cmds) {
  const days = ['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
  const hours = ['8h','10h','12h','14h','16h','18h','20h'];

  // Compte commandes par jour/heure
  const grid = Array.from({length:7},()=>Array(7).fill(0));
  (cmds||[]).forEach(c => {
    const d = new Date(c.created_at||Date.now());
    const dayIdx = (d.getDay()+6)%7;
    const hourIdx = Math.min(6, Math.max(0, Math.floor((d.getHours()-8)/2)));
    grid[dayIdx][hourIdx]++;
  });

  const maxVal = Math.max(1, ...grid.flat());
  let html = `<div style="display:grid;grid-template-columns:50px repeat(7,1fr);gap:3px;margin-top:10px;">
    <div></div>
    ${hours.map(h=>`<div style="text-align:center;font-size:10px;color:var(--muted);padding-bottom:4px;">${h}</div>`).join('')}
    ${days.map((day,di) => `
      <div style="font-size:10px;color:var(--muted);display:flex;align-items:center;">${day}</div>
      ${grid[di].map(v => {
        const pct = v/maxVal;
        const alpha = 0.05 + pct*0.85;
        return `<div style="height:32px;border-radius:4px;background:rgba(192,57,43,${alpha.toFixed(2)});display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:${pct>0.4?'#fff':'var(--muted)'};">${v||''}</div>`;
      }).join('')}
    `).join('')}
  </div>`;
  document.getElementById('statsHeatmap').innerHTML = html;
}

/* ══════════════════════════════════════════
   GESTION / COFFRE
══════════════════════════════════════════ */
async function loadGestion() {
  // Config quotas
  const configs = await sb('parametres?cle=in.(quota_cdd,quota_cdi)');
  (configs||[]).forEach(c => {
    if (c.cle==='quota_cdd') document.getElementById('gQuotaCDD').value=c.valeur;
    if (c.cle==='quota_cdi') document.getElementById('gQuotaCDI').value=c.valeur;
  });

  // Tickets quota
  await loadQuotaTickets();
  await loadCoffre();
}

async function loadQuotaTickets() {
  const el = document.getElementById('quotaTickets');
  const data = await sb(`quotas_tickets?select=*,employes(nom,prenom)&statut=eq.en_attente&order=created_at.desc`);
  if (!Array.isArray(data)||!data.length) { el.innerHTML='<p style="color:var(--muted)">Aucun ticket en attente.</p>'; return; }
  el.innerHTML = data.map(t => {
    const emp = t.employes||{};
    return `<div style="padding:14px;background:var(--card2);border-radius:10px;margin-bottom:10px;border-left:3px solid var(--orange);">
      <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:8px;">
        <div>
          <strong>${emp.prenom||'?'} ${emp.nom||''}</strong>
          <div style="font-size:12px;color:var(--muted);">🚚 ${t.plaque} · ${t.quantite} unités</div>
          ${t.notes?`<div style="font-size:12px;color:var(--muted);margin-top:2px;">${t.notes}</div>`:''}
        </div>
        <div style="font-size:11px;color:var(--muted);">${new Date(t.created_at).toLocaleString('fr-FR')}</div>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-success btn-sm" onclick="validerQuota('${t.id}','${t.employe_discord_id||''}',${t.quantite})">✅ Valider</button>
        <button class="btn btn-danger btn-sm" onclick="refuserQuota('${t.id}')">❌ Refuser</button>
      </div>
    </div>`;
  }).join('');
}

async function validerQuota(ticketId, discordId, quantite) {
  await sb(`quotas_tickets?id=eq.${ticketId}`,{method:'PATCH',body:JSON.stringify({statut:'valide'})});
  if (discordId) {
    const empData = await sb(`employes?discord_id=eq.${discordId}&select=id,quota_validee`);
    if (empData?.[0]) {
      const newVal = (empData[0].quota_validee||0) + quantite;
      await sb(`employes?id=eq.${empData[0].id}`,{method:'PATCH',body:JSON.stringify({quota_validee:newVal})});
    }
  }
  // Prime automatique
  const primeAuto = quantite * 10; // 10$ par unité — configurable
  if (discordId && primeAuto > 0) {
    await sb('primes',{method:'POST',body:JSON.stringify({
      employe_discord:discordId,montant:primeAuto,semaine:getSemaine(),verse:false,type:'quota'
    })});
  }
  alert(`✅ Quota validé ! Prime de ${primeAuto}$ attribuée.`);
  loadQuotaTickets();
}

async function refuserQuota(id) {
  await sb(`quotas_tickets?id=eq.${id}`,{method:'PATCH',body:JSON.stringify({statut:'refuse'})});
  loadQuotaTickets();
}

async function saveQuotaConfig() {
  const cdd=document.getElementById('gQuotaCDD').value;
  const cdi=document.getElementById('gQuotaCDI').value;
  for (const [cle,val] of [['quota_cdd',cdd],['quota_cdi',cdi]]) {
    const existing = await sb(`parametres?cle=eq.${cle}`);
    if (existing?.[0]) await sb(`parametres?cle=eq.${cle}`,{method:'PATCH',body:JSON.stringify({valeur:val})});
    else await sb('parametres',{method:'POST',body:JSON.stringify({cle,valeur:val})});
  }
  alert('✅ Configuration sauvegardée !');
}

async function loadCoffre() {
  const [caData, primesData] = await Promise.all([
    sb('parametres?cle=eq.ca_semaine'),
    sb(`primes?select=montant,verse&semaine=eq.${getSemaine()}`),
  ]);
  const ca = parseFloat(caData?.[0]?.valeur||0)||0;
  const totalPrimes = (primesData||[]).reduce((a,p)=>a+p.montant,0);
  const impots = Math.round(calcImpot(ca));
  const net = ca - totalPrimes - impots;

  const statsId = ROLE==='gouvernement'?'gouv-coffreStats':'coffreStats';
  const histoId = ROLE==='gouvernement'?'gouv-coffreHisto':'coffreHisto';

  const statsEl = document.getElementById(statsId);
  if (statsEl) statsEl.innerHTML = [
    {label:'CA brut semaine',value:`${ca.toLocaleString('fr-FR')}$`,accent:'var(--blue)'},
    {label:'Primes totales',value:`${totalPrimes.toLocaleString('fr-FR')}$`,accent:'var(--warning)'},
    {label:`Impôts (${tauxLabel(ca)})`,value:`${impots.toLocaleString('fr-FR')}$`,accent:'var(--red)'},
    {label:'Net coffre estimé',value:`${net.toLocaleString('fr-FR')}$`,accent:'var(--success)'},
  ].map(s => `
    <div class="stat-card" style="--accent:${s.accent};">
      <div class="stat-label">${s.label}</div>
      <div class="stat-value" style="font-size:26px;">${s.value}</div>
    </div>`).join('');

  const hist = await sb('caisse?select=*&order=created_at.desc&limit=10');
  const histoEl = document.getElementById(histoId);
  if (histoEl) {
    if (!Array.isArray(hist)||!hist.length) { histoEl.innerHTML='<p style="color:var(--muted)">Aucun historique.</p>'; return; }
    histoEl.innerHTML = `<table><thead><tr><th>Semaine</th><th>CA Brut</th><th>Salaires</th><th>Impôts</th><th>Coffre net</th></tr></thead><tbody>` +
      hist.map(h => `<tr>
        <td>${h.semaine}</td>
        <td>${(h.ca_brut||0).toLocaleString('fr-FR')}$</td>
        <td style="color:var(--warning);">${(h.salaires||0).toLocaleString('fr-FR')}$</td>
        <td style="color:var(--red);">${(h.impots||0).toLocaleString('fr-FR')}$</td>
        <td><strong style="color:var(--success);">${(h.coffre_net||0).toLocaleString('fr-FR')}$</strong></td>
      </tr>`).join('') + '</tbody></table>';
  }
}

/* ══════════════════════════════════════════
   PRIMES & CLÔTURE
══════════════════════════════════════════ */
async function calculerPrimes() {
  const semaine = getSemaine();
  const [employes, caData] = await Promise.all([
    sb('employes?select=*&actif=eq.true'),
    sb('parametres?cle=eq.ca_semaine'),
  ]);
  const ca = parseFloat(caData?.[0]?.valeur||0)||0;
  if (!ca) { alert('CA semaine = 0$. Pas de primes.'); return; }

  const tauxPoste = {Patron:.4,'Co-Patron':.4,Manager:.3,"Chef d'équipe":.3};
  const tauxContrat = {CDI:.2,CDD:.1};

  for (const emp of (employes||[])) {
    const t = tauxPoste[emp.poste] ?? tauxContrat[emp.contrat] ?? .1;
    const montant = Math.round(ca * t);
    if (!montant) continue;
    const exist = await sb(`primes?employe_id=eq.${emp.id}&semaine=eq.${semaine}&type=eq.vente`);
    if (!exist?.length) {
      await sb('primes',{method:'POST',body:JSON.stringify({
        employe_id:emp.id,employe_discord:emp.discord_id,montant,semaine,verse:false,type:'vente'
      })});
    }
  }
  alert('✅ Primes calculées !');
  await loadPrimesTable();
}

async function loadPrimesTable() {
  const data = await sb(`primes?select=*,employes(nom,prenom,poste,contrat,date_embauche)&semaine=eq.${getSemaine()}&order=created_at.desc`);
  lastPrimes = Array.isArray(data)?data:[];
  const el = document.getElementById('primesTable');
  if (!el) return;
  if (!lastPrimes.length) { el.innerHTML='<p style="color:var(--muted)">Aucune prime. Cliquez sur Calculer.</p>'; return; }
  el.innerHTML = `<table><thead><tr><th>Employé</th><th>Poste</th><th>Type</th><th>Montant</th><th>Statut</th><th>Action</th></tr></thead><tbody>` +
    lastPrimes.map(p => {
      const emp=p.employes||{};
      return `<tr>
        <td><strong>${emp.prenom||'—'} ${emp.nom||''}</strong></td>
        <td>${emp.poste||'—'}</td>
        <td><span class="badge badge-blue">${p.type||'vente'}</span></td>
        <td><strong style="color:var(--success);">${p.montant.toLocaleString('fr-FR')}$</strong></td>
        <td><span class="badge ${p.verse?'badge-green':'badge-orange'}">${p.verse?'✅ Versée':'En attente'}</span></td>
        <td>${!p.verse?`<button class="btn btn-success btn-sm" onclick="verserPrime('${p.id}')">Verser</button>`:''}</td>
      </tr>`;
    }).join('') + '</tbody></table>';
}

async function verserPrime(id) { await sb(`primes?id=eq.${id}`,{method:'PATCH',body:JSON.stringify({verse:true})}); loadPrimesTable(); }

async function cloturerSemaine() {
  if (!confirm('⚠️ Clôturer la semaine ? Cette action est irréversible.')) return;
  const semaine = getSemaine();
  const [caData, primesData, employes] = await Promise.all([
    sb('parametres?cle=eq.ca_semaine'),
    sb(`primes?select=*,employes(nom,prenom,poste,contrat,date_embauche)&semaine=eq.${semaine}`),
    sb('employes?select=*&actif=eq.true'),
  ]);
  const ca = parseFloat(caData?.[0]?.valeur||0)||0;
  const totalPrimes = (primesData||[]).reduce((a,p)=>a+p.montant,0);
  const impots = Math.round(calcImpot(ca));
  const net = ca - totalPrimes - impots;

  // Enregistre dans caisse
  await sb('caisse',{method:'POST',body:JSON.stringify({semaine,ca_brut:ca,salaires:totalPrimes,impots,coffre_net:net})});

  // Reset CA
  await sb('parametres?cle=eq.ca_semaine',{method:'PATCH',body:JSON.stringify({valeur:'0'})});

  // Reset quota employés
  for (const emp of (employes||[])) {
    await sb(`employes?id=eq.${emp.id}`,{method:'PATCH',body:JSON.stringify({quota_validee:0})});
  }

  // Génère PDF
  genPDFCloture(semaine, ca, totalPrimes, impots, net, primesData||[]);

  alert('✅ Semaine clôturée !');
  loadGestion();
}
