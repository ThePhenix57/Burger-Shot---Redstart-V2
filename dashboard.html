      --red: #c0392b; --red-dark: #922b21; --orange: #e67e22;
      --bg: #0d0d0d; --bg-card: #111111; --bg-card2: #1a1a1a;
      --text: #f0f0f0; --text-muted: #888; --border: rgba(255,255,255,0.08);
      --success: #27ae60; --warning: #f39c12;
    }
    [data-theme="light"] {
      --bg: #f0ece6; --bg-card: #ffffff; --bg-card2: #f5f0ea;
      --text: #1a1a1a; --text-muted: #666; --border: rgba(0,0,0,0.1);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Barlow',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; transition:background .3s,color .3s; }

    /* ═══ TOPBAR ═══ */
    .topbar { position:sticky; top:0; z-index:100; border-bottom:3px solid var(--red); overflow:hidden; }
    .topbar-checker { height:14px; background-color:var(--red); background-image:repeating-linear-gradient(90deg,transparent 0px,transparent 14px,rgba(255,255,255,0.9) 14px,rgba(255,255,255,0.9) 28px); }
    .topbar-main { display:flex; align-items:center; justify-content:space-between; padding:0 20px; background:var(--bg); height:58px; gap:16px; }
    .topbar-brand { display:flex; align-items:center; gap:10px; flex-shrink:0; }
    .topbar-brand-img { height:36px; width:auto; object-fit:contain; }
    .topbar-brand-sub { font-size:9px; color:var(--text-muted); letter-spacing:1px; text-transform:uppercase; margin-top:1px; }
    .topbar-center { flex:1; display:flex; align-items:center; justify-content:center; }
    .page-title { font-family:'Bebas Neue',sans-serif; font-size:26px; letter-spacing:3px; color:var(--red); }
    .topbar-right { display:flex; align-items:center; gap:10px; flex-shrink:0; }
    .user-avatar-top { width:32px; height:32px; border-radius:50%; background:var(--red); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:13px; overflow:hidden; border:2px solid rgba(192,57,43,0.5); }
    .user-avatar-top img { width:100%; height:100%; object-fit:cover; }
    .user-name-top { font-size:13px; font-weight:600; }
    .user-role-top { font-size:10px; color:var(--orange); text-transform:uppercase; letter-spacing:1px; margin-top:2px; }
    .theme-btn { background:var(--bg-card2); border:1px solid var(--border); color:var(--text); width:34px; height:34px; border-radius:50%; cursor:pointer; font-size:15px; display:flex; align-items:center; justify-content:center; transition:all .2s; }
    .theme-btn:hover { border-color:var(--red); transform:scale(1.1); }
    .logout-btn-top { padding:7px 14px; background:var(--red); color:#fff; border:none; border-radius:7px; font-family:'Barlow',sans-serif; font-size:12px; font-weight:700; letter-spacing:1px; text-transform:uppercase; cursor:pointer; transition:background .2s; white-space:nowrap; }
    .logout-btn-top:hover { background:var(--red-dark); }

    /* ═══ TOPBAR NAV ═══ */
    .topbar-nav {
      display:flex; align-items:center; background:var(--red);
      padding:0; overflow-x:auto; scrollbar-width:none;
      position:relative; min-height:36px;
    }
    .topbar-nav::-webkit-scrollbar { display:none; }
    .topbar-nav-item {
      padding:8px 14px; font-size:11px; font-weight:700; letter-spacing:1.5px;
      text-transform:uppercase; color:rgba(255,255,255,0.75); cursor:pointer;
      white-space:nowrap; border-bottom:3px solid transparent; transition:all .2s;
      flex-shrink:0;
    }
    .topbar-nav-item:hover { color:#fff; background:rgba(0,0,0,0.15); }
    .topbar-nav-item.active { color:#fff; background:rgba(0,0,0,0.2); border-bottom-color:#fff; }
    /* Centre logo in nav */
    .topbar-nav-logo {
      flex:1; display:flex; align-items:center; justify-content:center;
      pointer-events:none; padding:4px 0;
    }
    .topbar-nav-logo img { height:26px; width:auto; object-fit:contain; filter:brightness(0) invert(1); opacity:0.9; }

    /* ═══ LAYOUT ═══ */
    .main { min-height:100vh; display:flex; flex-direction:column; }
    .content { flex:1; padding:28px; width:100%; }
    .page { display:none; width:100%; }
    .page.active { display:block; }

    /* ═══ COMPOSANTS ═══ */
    .card { background:var(--bg-card); border:1px solid var(--border); border-radius:12px; padding:24px; }
    .card-title { font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:1px; margin-bottom:16px; color:var(--red); }
    .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    .grid-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:16px; }
    .grid-4 { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; }
    .stat-card { background:var(--bg-card); border:1px solid var(--border); border-radius:12px; padding:20px; text-align:center; }
    .stat-value { font-family:'Bebas Neue',sans-serif; font-size:36px; color:var(--red); }
    .stat-label { font-size:12px; color:var(--text-muted); letter-spacing:1px; text-transform:uppercase; margin-top:4px; }
    .form-group { margin-bottom:16px; }
    .form-label { display:block; font-size:12px; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:var(--text-muted); margin-bottom:6px; }
    .form-input,.form-select { width:100%; padding:10px 14px; background:var(--bg-card2); border:1px solid var(--border); border-radius:8px; color:var(--text); font-family:'Barlow',sans-serif; font-size:14px; transition:border-color .2s; }
    .form-input:focus,.form-select:focus { outline:none; border-color:var(--red); }
    .form-select option { background:var(--bg-card2); }
    .btn { padding:10px 20px; border-radius:8px; border:none; font-family:'Barlow',sans-serif; font-size:14px; font-weight:700; cursor:pointer; transition:all .2s; letter-spacing:.5px; }
    .btn-primary { background:var(--red); color:#fff; }
    .btn-primary:hover { background:var(--red-dark); transform:translateY(-1px); }
    .btn-success { background:var(--success); color:#fff; }
    .btn-success:hover { opacity:.9; }
    .btn-danger { background:var(--red); color:#fff; }
    .btn-danger:hover { background:var(--red-dark); }
    .btn-outline { background:transparent; color:var(--text); border:1px solid var(--border); }
    .btn-outline:hover { border-color:var(--red); color:var(--red); }
    table { width:100%; border-collapse:collapse; }
    th { text-align:left; padding:10px 12px; font-size:11px; letter-spacing:1px; text-transform:uppercase; color:var(--text-muted); border-bottom:1px solid var(--border); }
    td { padding:12px; font-size:14px; border-bottom:1px solid var(--border); }
    tr:last-child td { border-bottom:none; }
    tr:hover td { background:var(--bg-card2); }
    .badge { display:inline-block; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:700; letter-spacing:.5px; }
    .badge-red { background:rgba(192,57,43,.2); color:var(--red); }
    .badge-orange { background:rgba(230,126,34,.2); color:var(--orange); }
    .badge-green { background:rgba(39,174,96,.2); color:var(--success); }
    .badge-blue { background:rgba(52,152,219,.2); color:#3498db; }
    .badge-gold { background:rgba(241,196,15,.2); color:#f1c40f; }
    .alert { padding:12px 16px; border-radius:8px; font-size:14px; margin-bottom:16px; }
    .alert-success { background:rgba(39,174,96,.1); border:1px solid rgba(39,174,96,.3); color:var(--success); }
    .alert-error { background:rgba(192,57,43,.1); border:1px solid rgba(192,57,43,.3); color:var(--red); }
    .red-line { height:3px; background:linear-gradient(90deg,var(--red),var(--orange)); border-radius:2px; margin-bottom:24px; }

    /* ═══ ACCUEIL HERO ═══ */
    .accueil-hero {
      background:var(--bg-card); border:1px solid var(--border); border-radius:14px;
      padding:28px 32px; display:flex; align-items:center; justify-content:space-between;
      margin-bottom:24px; position:relative; overflow:hidden;
    }
    .accueil-hero::before { content:\'\'; position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg,var(--red),var(--orange),var(--red)); }
    .accueil-hero::after { content:\'BURGER SHOT\'; position:absolute; right:32px; top:50%; transform:translateY(-50%); font-family:\'Bebas Neue\',sans-serif; font-size:120px; letter-spacing:8px; color:rgba(192,57,43,0.04); pointer-events:none; line-height:1; white-space:nowrap; }
    .hero-left { display:flex; align-items:center; gap:20px; position:relative; z-index:1; }
    .hero-avatar { width:64px; height:64px; border-radius:50%; background:var(--red); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:24px; overflow:hidden; border:3px solid rgba(192,57,43,0.4); box-shadow:0 0 20px rgba(192,57,43,0.3); flex-shrink:0; }
    .hero-avatar img { width:100%; height:100%; object-fit:cover; }
    .hero-greeting { line-height:1.2; }
    .hero-greeting-top { font-size:13px; color:var(--text-muted); text-transform:uppercase; letter-spacing:2px; margin-bottom:4px; }
    .hero-name { font-family:\'Bebas Neue\',sans-serif; font-size:42px; letter-spacing:3px; line-height:1; }
    .hero-name span { color:var(--red); }
    .hero-meta { display:flex; align-items:center; gap:12px; margin-top:8px; font-size:13px; color:var(--text-muted); }
    .hero-role-badge { padding:3px 10px; background:rgba(192,57,43,0.15); border:1px solid rgba(192,57,43,0.3); border-radius:20px; color:var(--red); font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase; }

    /* 3 grandes stat cards */
    .accueil-stats-top { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-bottom:24px; }
    .big-stat-card { background:var(--bg-card); border:1px solid var(--border); border-radius:12px; padding:24px; position:relative; overflow:hidden; }
    .big-stat-card::before { content:\'\'; position:absolute; top:0; left:0; bottom:0; width:3px; background:var(--accent-color, var(--red)); }
    .big-stat-icon { width:40px; height:40px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; margin-bottom:14px; background:var(--accent-bg, rgba(192,57,43,0.15)); border:1px solid var(--accent-border, rgba(192,57,43,0.3)); }
    .big-stat-label { font-size:11px; color:var(--text-muted); text-transform:uppercase; letter-spacing:2px; margin-bottom:6px; }
    .big-stat-value { font-family:\'Bebas Neue\',sans-serif; font-size:40px; letter-spacing:2px; line-height:1; color:var(--accent-color, var(--red)); }
    .big-stat-sub { font-size:12px; color:var(--text-muted); margin-top:6px; }

    /* Layout accueil bas */
    .accueil-bottom { display:grid; grid-template-columns:200px 40px 1fr 40px 200px; gap:0; align-items:start; }
    .accueil-col { display:flex; flex-direction:column; gap:6px; padding:0 24px; }
    .accueil-col-title { font-size:9px; letter-spacing:2px; text-transform:uppercase; color:var(--text-muted); margin-bottom:8px; padding-bottom:6px; border-bottom:1px solid var(--border); }
    .col-item { display:flex; align-items:center; gap:8px; font-size:12px; color:var(--text-muted); padding:3px 0; }
    .col-item-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
    .col-item-dot.red { background:var(--red); }
    .col-item-dot.green { background:var(--success); }
    .col-item-dot.orange { background:var(--orange); }
    .col-item-dot.blue { background:#3498db; }
    .col-item-dot.gold { background:#f1c40f; }
    .accueil-divider { display:flex; flex-direction:column; align-items:center; padding:0; }
    .accueil-divider-line { width:1px; height:100%; background:repeating-linear-gradient(to bottom,var(--border) 0px,var(--border) 6px,transparent 6px,transparent 12px); min-height:200px; }
    .accueil-center { padding:0 16px; }
    .accueil-center-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
    .accueil-center-title { font-family:\'Bebas Neue\',sans-serif; font-size:16px; letter-spacing:2px; color:var(--text-muted); }
    .commande-row { display:flex; align-items:center; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--border); font-size:13px; }
    .commande-row:last-child { border-bottom:none; }
    .commande-left { display:flex; align-items:center; gap:10px; }
    .commande-icon { font-size:18px; width:28px; text-align:center; }
    .commande-name { font-weight:600; }
    .commande-sub { font-size:11px; color:var(--text-muted); margin-top:1px; }
    .commande-price { font-family:\'Bebas Neue\',sans-serif; font-size:16px; color:var(--red); letter-spacing:1px; }

    /* ═══ CAISSE ═══ */
    .caisse-layout { display:grid; grid-template-columns:1fr 360px; gap:24px; align-items:start; }
    .caisse-categorie { margin-bottom:28px; }
    .caisse-categorie-title { font-family:\'Bebas Neue\',sans-serif; font-size:16px; letter-spacing:3px; text-transform:uppercase; color:var(--red); margin-bottom:12px; padding-bottom:8px; border-bottom:2px solid var(--red); display:flex; align-items:center; gap:8px; }
    .caisse-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:12px; }
    .caisse-produit { background:var(--bg-card2); border:2px solid var(--border); border-radius:12px; cursor:pointer; transition:all .2s; overflow:hidden; position:relative; display:flex; flex-direction:column; }
    .caisse-produit:hover { transform:translateY(-3px); border-color:var(--red); box-shadow:0 8px 24px rgba(192,57,43,.25); }
    .caisse-produit:active { transform:scale(0.97); }
    .caisse-produit-img-zone { width:100%; aspect-ratio:1/1; background-color:var(--bg-card); display:flex; align-items:center; justify-content:center; overflow:hidden; border-bottom:1px solid var(--border); }
    .caisse-produit-img-zone img { width:100%; height:100%; object-fit:contain; padding:10px; transition:transform .2s; }
    .caisse-produit:hover .caisse-produit-img-zone img { transform:scale(1.08); }
    .caisse-produit-emoji { font-size:52px; line-height:1; }
    .caisse-produit-info { padding:10px 10px 12px; }
    .caisse-produit-nom { font-size:13px; font-weight:700; margin-bottom:4px; line-height:1.2; }
    .caisse-produit-bottom { display:flex; justify-content:space-between; align-items:center; margin-top:4px; }
    .caisse-produit-prix { font-size:15px; color:var(--red); font-weight:700; font-family:\'Bebas Neue\',sans-serif; letter-spacing:1px; }
    .caisse-produit-pts { font-size:10px; color:var(--text-muted); background:var(--bg-card); padding:2px 6px; border-radius:10px; }
    .caisse-produit::after { content:\'\'; position:absolute; bottom:0; left:0; right:0; height:3px; background:var(--red); transform:scaleX(0); transition:transform .2s; }
    .caisse-produit:hover::after { transform:scaleX(1); }

    /* TICKET */
    .ticket-wrapper { position:sticky; top:90px; }
    .ticket-thermal { width:100%; background:#f5f1e8; color:#111; border-radius:12px; padding:24px; font-family:\'Courier New\',monospace; box-shadow:0 10px 30px rgba(0,0,0,.4); }
    .ticket-logo { text-align:center; font-size:22px; font-weight:bold; margin-bottom:14px; letter-spacing:2px; }
    .ticket-info { font-size:12px; margin-bottom:10px; color:#444; }
    .ticket-separator { border:none; border-top:1px dashed #999; margin:12px 0; }
    .ticket-articles { min-height:60px; }
    .ticket-line { display:flex; justify-content:space-between; margin-bottom:6px; font-size:13px; }
    .ticket-empty { text-align:center; color:#999; font-size:13px; padding:20px 0; }
    .ticket-total-block { margin-top:10px; }
    .ticket-total { font-size:18px; font-weight:bold; text-align:right; }
    .ticket-reduc { font-size:13px; color:#c0392b; text-align:right; margin-top:4px; }
    .ticket-points-info { font-size:12px; color:#444; text-align:right; margin-top:4px; }
    .ticket-meta { margin-top:10px; font-size:12px; color:#555; }
    .ticket-buttons { display:flex; gap:10px; margin-top:18px; }
    .ticket-buttons .btn { flex:1; }
    .client-results { margin-bottom:12px; }

    /* PRODUIT CARDS */
    .produit-card { background:var(--bg-card2); border:1px solid var(--border); border-radius:10px; padding:12px; text-align:center; position:relative; }
    .produit-card img { width:56px; height:56px; object-fit:contain; margin-bottom:8px; }
    .produit-card-nom { font-size:13px; font-weight:600; margin-bottom:4px; }
    .produit-card-prix { font-size:12px; color:var(--red); }
    .produit-card-pts { font-size:11px; color:var(--text-muted); }
    .produit-card-actions { position:absolute; top:6px; right:6px; display:flex; gap:4px; }
    .produit-card-actions button { background:none; border:none; cursor:pointer; font-size:14px; padding:2px; }
    .coffre-card { background:linear-gradient(135deg,rgba(192,57,43,.15),rgba(230,126,34,.1)); border:1px solid rgba(192,57,43,.3); border-radius:12px; padding:24px; }
    .popup-overlay { position:fixed; inset:0; background:rgba(0,0,0,.7); display:flex; align-items:center; justify-content:center; z-index:9999; }
    .popup-box { width:500px; max-width:95vw; background:var(--bg-card); border:1px solid var(--border); border-radius:14px; padding:24px; max-height:90vh; overflow-y:auto; }
    .popup-title { font-family:\'Bebas Neue\',sans-serif; font-size:22px; letter-spacing:1px; color:var(--red); margin-bottom:16px; }

    /* ═══ PRIMES PDF LINK ═══ */
    .pdf-link-card {
      background:linear-gradient(135deg,rgba(192,57,43,0.1),rgba(230,126,34,0.08));
      border:1px solid rgba(192,57,43,0.3); border-radius:10px;
      padding:16px 20px; display:flex; align-items:center; gap:14px;
      text-decoration:none; color:var(--text); transition:all .2s; cursor:pointer;
      margin-top:16px;
    }
    .pdf-link-card:hover { border-color:var(--red); transform:translateY(-2px); box-shadow:0 6px 20px rgba(192,57,43,0.2); }
    .pdf-link-icon { font-size:28px; flex-shrink:0; }
    .pdf-link-title { font-weight:700; font-size:15px; }
    .pdf-link-sub { font-size:12px; color:var(--text-muted); margin-top:2px; }
  </style>
</head>

function formatPhone(val) {
  if (!val) return \'—\';
  const d = val.replace(/\\D/g,\'\').slice(0,10);
  if (d.length === 0) return val;
  if (d.length <= 3) return `(${d}`;
  if (d.length <= 6) return `(${d.slice(0,3)}) ${d.slice(3)}`;
  return `(${d.slice(0,3)}) ${d.slice(3,6)}-${d.slice(6)}`;
}
function formatPhoneInput(input) {
  const d = input.value.replace(/\\D/g,\'\').slice(0,10);
  if (d.length === 0) { input.value = \'\'; return; }
  if (d.length <= 3) { input.value = `(${d}`; return; }
  if (d.length <= 6) { input.value = `(${d.slice(0,3)}) ${d.slice(3)}`; return; }
  input.value = `(${d.slice(0,3)}) ${d.slice(3,6)}-${d.slice(6)}`;
}

function showPage(name) {
  document.querySelectorAll(\'.page\').forEach(p=>p.classList.remove(\'active\'));
  document.querySelectorAll(\'.topbar-nav-item\').forEach(n=>n.classList.remove(\'active\'));
  const page = document.getElementById(\'page-\'+name);
  if (page) page.classList.add(\'active\');
  const topEl = document.getElementById(\'topnav-\'+name);
  if (topEl) topEl.classList.add(\'active\');
  const titles = {accueil:\'Accueil\',caisse:\'Caisse\',clients:\'Clients\',\'enregistrer-client\':\'Nouveau Client\',employes:\'Employés\',\'ajouter-employe\':\'Ajouter un Employé\',menu:\'Gestion du Menu\',stats:\'Statistiques\',coffre:\'Coffre\',contrats:\'Contrats\',primes:\'Primes\'};
  document.getElementById(\'pageTitle\').textContent = titles[name]||name;
  if (name===\'clients\') loadClients();
  if (name===\'employes\') loadEmployes();
  if (name===\'menu\') loadProduits();
  if (name===\'caisse\') loadCaisseProduits();
  if (name===\'stats\') loadStats();
  if (name===\'coffre\') loadCoffre();
  if (name===\'contrats\') loadContrats();
  if (name===\'primes\') loadPrimes();
  if (name===\'accueil\') loadAccueil();
}

// ── SUPABASE ──
async function supabaseFetch(endpoint, options={}) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${endpoint}`, {
    headers:{\'apikey\':SUPABASE_KEY,\'Authorization\':`Bearer ${SUPABASE_KEY}`,\'Content-Type\':\'application/json\',\'Prefer\':\'return=representation\',...options.headers},...options
  });
  try { return await res.json(); } catch(e){ return []; }
}

function getSemaine() {
  const now=new Date(); const d=new Date(Date.UTC(now.getFullYear(),now.getMonth(),now.getDate()));
  const dayNum=d.getUTCDay()||7; d.setUTCDate(d.getUTCDate()+4-dayNum);
  const yearStart=new Date(Date.UTC(d.getUTCFullYear(),0,1));
  const weekNo=Math.ceil((((d-yearStart)/86400000)+1)/7);
  return `${d.getUTCFullYear()}-W${String(weekNo).padStart(2,\'0\')}`;
}
function calcImpot(m){if(m<200000)return 0;if(m<400000)return m*.05;if(m<600000)return m*.08;if(m<800000)return m*.11;if(m<1000000)return m*.14;if(m<2500000)return m*.17;return m*.19;}
function tauxImpot(m){if(m<200000)return\'0%\';if(m<400000)return\'5%\';if(m<600000)return\'8%\';if(m<800000)return\'11%\';if(m<1000000)return\'14%\';if(m<2500000)return\'17%\';return\'19%\';}
function toggleTheme(){const h=document.documentElement,b=document.getElementById(\'themeBtn\');h.dataset.theme=h.dataset.theme===\'dark\'?(b.textContent=\'🌙\',\'light\'):(b.textContent=\'☀️\',\'dark\');}

function updateContrat(){const sel=document.getElementById(\'caisseContrat\');const opt=sel.options[sel.selectedIndex];commandeContrat=sel.value?{id:sel.value,pct:parseFloat(opt.dataset.pct),nom:opt.text}:null;renderTicket();}
function ajouterAuTicket(id){const p=produitsCaisse.find(p=>p.id===id);if(!p)return;const e=commande.find(c=>c.id===id);if(e)e.quantite++;else commande.push({...p,quantite:1});renderTicket();}
function calcTotalCommande(){const brut=commande.reduce((a,b)=>a+(b.prix*b.quantite),0);let r=0;if(selectedClient?.pass){const pt=passTypes.find(p=>p.nom===selectedClient.pass);if(pt&&pt.reduction>0)r=Math.max(r,parseFloat(pt.reduction));}if(commandeContrat)r=Math.max(r,commandeContrat.pct);const m=Math.round(brut*r/100);return{brut,reduction:r,montantReduc:m,net:brut-m};}
function calcPoints(){if(!selectedClient||!selectedClient.pass)return 0;const pt=passTypes.find(p=>p.nom===selectedClient.pass);const mult=pt?parseFloat(pt.multiplicateur):0;return Math.round(commande.reduce((a,b)=>a+(b.points*b.quantite),0)*mult);}

  const {brut,reduction,montantReduc,net}=calcTotalCommande();const pts=calcPoints();

  // Afficher lien PDF si données présentes

async function calculerPrimes(){
  const semaine=getSemaine();
  const [employes,caData]=await Promise.all([supabaseFetch(\'employes?select=*&actif=eq.true\'),supabaseFetch(\'parametres?cle=eq.ca_semaine\')]);
  const ca=parseFloat(Array.isArray(caData)&&caData[0]?caData[0].valeur:0)||0;
  if(ca===0){alert(\'CA de la semaine = 0$. Pas de primes.\');return;}
  const taux={\'Patron\':.4,\'Co-Patron\':.4,\'Manager\':.3,"Chef d\'équipe":.3,\'Employé\':.0};
  const tauxC={\'CDI\':.2,\'CDD\':.1};
  for(const emp of(Array.isArray(employes)?employes:[])){
    const t=(emp.poste===\'Employé\')?(tauxC[emp.contrat]||.1):(taux[emp.poste]||.1);
    const montant=Math.round(ca*t);
    if(montant>0){const exist=await supabaseFetch(`primes?employe_id=eq.${emp.id}&semaine=eq.${semaine}`);if(!Array.isArray(exist)||!exist.length)await supabaseFetch(\'primes\',{method:\'POST\',body:JSON.stringify({employe_id:emp.id,employe_discord:emp.discord_id,montant,semaine,verse:false})});}
  }
  alert(\'✅ Primes calculées !\');
  await loadPrimes();
}

async function verserPrime(id){await supabaseFetch(`primes?id=eq.${id}`,{method:\'PATCH\',body:JSON.stringify({verse:true})});loadPrimes();}

// ── STATS ──
async function loadStats(){const semaine=getSemaine();const [commandes,clients,employes,caData]=await Promise.all([supabaseFetch(`commandes?select=*&semaine=eq.${semaine}`),supabaseFetch(\'clients?select=id\'),supabaseFetch(\'employes?select=id&actif=eq.true\'),supabaseFetch(\'parametres?cle=eq.ca_semaine\')]);const ca=parseFloat(Array.isArray(caData)&&caData[0]?caData[0].valeur:0)||0;const nbCmd=Array.isArray(commandes)?commandes.length:0;const impots=Math.round(calcImpot(ca));document.getElementById(\'statsCards\').innerHTML=`<div class="stat-card"><div class="stat-value">${nbCmd}</div><div class="stat-label">Commandes semaine</div></div><div class="stat-card"><div class="stat-value">${ca.toLocaleString(\'fr-FR\')}$</div><div class="stat-label">CA semaine</div></div><div class="stat-card"><div class="stat-value">${Array.isArray(clients)?clients.length:0}</div><div class="stat-label">Clients total</div></div><div class="stat-card"><div class="stat-value">${Array.isArray(employes)?employes.length:0}</div><div class="stat-label">Employés actifs</div></div>`;const recentEl=document.getElementById(\'statsCommandes\');if(!Array.isArray(commandes)||!commandes.length){recentEl.innerHTML=\'<p style="color:var(--text-muted)">Aucune commande cette semaine.</p>\';}else{recentEl.innerHTML=`<table><thead><tr><th>Heure</th><th>Total</th><th>Pts</th></tr></thead><tbody>${commandes.slice(0,8).map(c=>`<tr><td>${new Date(c.created_at||Date.now()).toLocaleTimeString(\'fr-FR\',{hour:\'2-digit\',minute:\'2-digit\'})}</td><td><strong>${(c.total_apres_reduction||c.total||0)}$</strong></td><td>${c.points_gagnes||0} pts</td></tr>`).join(\'\')}</tbody></table>`;}document.getElementById(\'statsFinances\').innerHTML=`<div style="display:flex;flex-direction:column;gap:12px;"><div style="display:flex;justify-content:space-between;padding:12px;background:var(--bg-card2);border-radius:8px;"><span>CA brut semaine</span><strong>${ca.toLocaleString(\'fr-FR\')}$</strong></div><div style="display:flex;justify-content:space-between;padding:12px;background:var(--bg-card2);border-radius:8px;"><span>Taux d\'imposition</span><strong style="color:var(--red);">${tauxImpot(ca)}</strong></div><div style="display:flex;justify-content:space-between;padding:12px;background:rgba(192,57,43,.1);border-radius:8px;border:1px solid rgba(192,57,43,.2);"><span>Impôts estimés</span><strong style="color:var(--red);">${impots.toLocaleString(\'fr-FR\')}$</strong></div></div>`;const paliers=[{min:0,max:199999,taux:\'0%\'},{min:200000,max:399999,taux:\'5%\'},{min:400000,max:599999,taux:\'8%\'},{min:600000,max:799999,taux:\'11%\'},{min:800000,max:999999,taux:\'14%\'},{min:1000000,max:2499999,taux:\'17%\'},{min:2500000,max:Infinity,taux:\'19%\'}];document.getElementById(\'statsImpots\').innerHTML=`<table><thead><tr><th>Tranche</th><th>Taux</th><th>Statut</th></tr></thead><tbody>${paliers.map(p=>`<tr><td>${p.min.toLocaleString(\'fr-FR\')}$ — ${p.max===Infinity?\'+∞\':p.max.toLocaleString(\'fr-FR\')+ \'$\'}</td><td><span class="badge badge-blue">${p.taux}</span></td><td>${ca>=p.min&&ca<=(p.max===Infinity?Infinity:p.max)?\'<span class=\"badge badge-orange\">📍 Votre tranche</span>\':\'\'}</td></tr>`).join(\'\')}</tbody></table>`;}

function fermerPopup(id){document.getElementById(id).style.display=\'none\';}
function logout(){window.location.href=\'/ \';}
</script>
</body>
</html>
