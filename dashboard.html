<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Burger Shot</title>
<link rel="icon" href="https://upload.redstartrp.fr/uploads/photo-1780754200-4124687fb57f.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════
   TOKENS
══════════════════════════════════════════ */
:root {
  --red:#c0392b; --red-d:#922b21; --red-l:#e74c3c;
  --orange:#e67e22; --green:#27ae60; --warn:#f39c12; --blue:#3498db;
  --bg:#0d0d0d; --card:#141414; --card2:#1c1c1c; --card3:#242424;
  --text:#f0f0f0; --muted:#666; --border:rgba(255,255,255,.07);
  --radius:10px; --shadow:0 4px 20px rgba(0,0,0,.4);
}
[data-theme="light"] {
  --bg:#f4f1ec; --card:#fdfbf8; --card2:#f0ece4; --card3:#e6e0d6;
  --text:#2b2823; --muted:#8a8275; --border:rgba(40,35,25,.1);
  --red:#b8392b; --red-d:#8f2c20; --red-l:#d4503e;
  --orange:#d4750f; --green:#1f8a4c; --warn:#d18d0a; --blue:#2980b9;
}
*{margin:0;padding:0;box-sizing:border-box;}
html {font-size: 20px;zoom: 1.25;}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
a{text-decoration:none;color:inherit;}
button,input,select,textarea{font-family:'Barlow',sans-serif;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-thumb{background:var(--red);border-radius:3px;}

/* ══════════════════════════════════════════
   TOPBAR
══════════════════════════════════════════ */
.checker{height:22px;background:repeating-conic-gradient(var(--red) 0% 25%,#fff 0% 50%);background-size:22px 22px;}
.topbar{position:sticky;top:0;z-index:300;background:var(--card);border-bottom:1px solid var(--border);}
.topbar-inner{display:flex;align-items:center;padding:0 24px;height:64px;gap:16px;position:relative;}
.topbar-logo{position:absolute;left:50%;transform:translateX(-50%);}
.topbar-logo img{height:56px;object-fit:contain;filter:drop-shadow(0 0 8px rgba(192,57,43,.35));margin-top:6px;}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:12px;}
.coffre-badge{font-size:11px;font-weight:700;letter-spacing:.5px;background:rgba(39,174,96,.1);border:1px solid rgba(39,174,96,.25);border-radius:20px;padding:3px 10px;color:var(--green);white-space:nowrap;}
.coffre-badge.neg{background:rgba(192,57,43,.1);border-color:rgba(192,57,43,.25);color:var(--red);}
.user-name{font-size:13px;font-weight:700;}
.user-role{font-size:10px;color:var(--orange);text-transform:uppercase;letter-spacing:1.5px;}
.avatar{width:34px;height:34px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;overflow:hidden;border:2px solid rgba(192,57,43,.4);flex-shrink:0;}
.avatar img{width:100%;height:100%;object-fit:cover;}
.btn-icon{width:28px;height:28px;border-radius:50%;background:var(--card2);border:1px solid var(--border);color:var(--text);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s;}
.btn-icon:hover{border-color:var(--red);}
.btn-logout{padding:4px 12px;background:rgba(192,57,43,.12);border:1px solid rgba(192,57,43,.28);border-radius:20px;color:var(--red);font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:.15s;}
.btn-logout:hover{background:var(--red);color:#fff;}
#clock{font-family:'Barlow',sans-serif;font-size:16px;font-weight:700;letter-spacing:2px;color:rgba(255,255,255,.8);}

/* ══════════════════════════════════════════
   NAV
══════════════════════════════════════════ */
.nav{background:var(--red);min-height:36px;display:flex;align-items:center;justify-content:center;flex-wrap:wrap;position:relative;z-index:200;}
.nav-item{padding:8px 14px;font-size:11px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:rgba(255,255,255,.8);cursor:pointer;white-space:nowrap;border-bottom:3px solid transparent;transition:.12s;display:flex;align-items:center;gap:5px;}
.nav-item:hover{color:#fff;background:rgba(0,0,0,.15);}
.nav-item.active{color:#fff;background:rgba(0,0,0,.2);border-bottom-color:#fff;}
.nav-badge{background:rgba(255,255,255,.25);color:#fff;font-size:9px;padding:1px 5px;border-radius:10px;font-weight:800;}
/* Dropdown */
.nav-drop{position:relative;}
.nav-drop>.nav-item::after{content:' ▾';font-size:9px;opacity:.7;}
.nav-drop-menu{display:none;position:absolute;top:100%;left:0;background:#a52d22;border:1px solid rgba(0,0,0,.25);border-top:none;border-radius:0 0 8px 8px;min-width:170px;z-index:400;box-shadow:0 8px 20px rgba(0,0,0,.5);padding:3px 0;}
.nav-drop-menu.open{display:block;}
.nav-drop-menu .nav-item{padding:8px 16px;border-bottom:1px solid rgba(0,0,0,.12);display:block;}
.nav-drop-menu .nav-item:last-child{border-bottom:none;}

/* ══════════════════════════════════════════
   LAYOUT
══════════════════════════════════════════ */
.content{padding:22px;max-width:1440px;margin:0 auto;}
.page{display:none;}
.page.active{display:block;}
.page-title{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;color:var(--red);margin-bottom:18px;}
.red-line{height:3px;background:linear-gradient(90deg,var(--red),var(--orange));border-radius:2px;margin-bottom:20px;}

/* ══════════════════════════════════════════
   GRILLES
══════════════════════════════════════════ */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
.g5{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;}
@media(max-width:1200px){.g5{grid-template-columns:repeat(4,1fr);}}
@media(max-width:900px){.g4,.g5{grid-template-columns:repeat(3,1fr);}.g3{grid-template-columns:repeat(2,1fr);}}
@media(max-width:600px){.g2,.g3,.g4,.g5{grid-template-columns:1fr;}}

/* ══════════════════════════════════════════
   COMPOSANTS DE BASE
══════════════════════════════════════════ */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;}
.card-title{font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:1px;color:var(--red);margin-bottom:14px;}

/* Stat card */
.stat{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;position:relative;overflow:hidden;}
.stat::before{content:'';position:absolute;top:0;left:0;bottom:0;width:3px;background:var(--accent,var(--red));}
.stat-icon{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;background:var(--accent-bg,rgba(192,57,43,.12));border:1px solid var(--accent-bd,rgba(192,57,43,.25));margin-bottom:10px;}
.stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:3px;}
.stat-val{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:1px;color:var(--accent,var(--red));line-height:1;}
.stat-sub{font-size:11px;color:var(--muted);margin-top:4px;}

/* Boutons */
.btn{padding:8px 16px;border-radius:7px;border:none;font-size:12px;font-weight:700;cursor:pointer;transition:.15s;letter-spacing:.4px;display:inline-flex;align-items:center;gap:6px;}
.btn:disabled{opacity:.45;cursor:not-allowed;}
.btn-primary{background:var(--red);color:#fff;}
.btn-primary:hover:not(:disabled){background:var(--red-d);}
.btn-success{background:var(--green);color:#fff;}
.btn-success:hover:not(:disabled){opacity:.9;}
.btn-danger{background:var(--red);color:#fff;}
.btn-outline{background:transparent;color:var(--text);border:1px solid var(--border);}
.btn-outline:hover:not(:disabled){border-color:var(--red);color:var(--red);}
.btn-orange{background:var(--orange);color:#fff;}
.btn-blue{background:var(--blue);color:#fff;}
.btn-warn{background:var(--warn);color:#fff;}
.btn-sm{padding:5px 10px;font-size:11px;}

/* Badges */
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;}
.badge-red{background:rgba(192,57,43,.18);color:var(--red);}
.badge-green{background:rgba(39,174,96,.18);color:var(--green);}
.badge-orange{background:rgba(230,126,34,.18);color:var(--orange);}
.badge-blue{background:rgba(52,152,219,.18);color:var(--blue);}
.badge-gold{background:rgba(241,196,15,.18);color:#f1c40f;}
.badge-purple{background:rgba(155,89,182,.18);color:#9b59b6;}
.badge-grey{background:rgba(120,120,120,.18);color:#aaa;}
.badge-black{background:rgba(0,0,0,.6);color:#ff4444;border:1px solid #ff4444;}

/* Formulaires */
.form-group{margin-bottom:13px;}
.form-label{display:block;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
.form-input,.form-select{width:100%;padding:8px 12px;background:var(--card2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:13px;transition:border-color .15s;}
.form-input:focus,.form-select:focus{outline:none;border-color:var(--red);}
.form-select option{background:var(--card2);}
textarea.form-input{resize:vertical;min-height:75px;}

/* Tableaux */
table{width:100%;border-collapse:collapse;}
th{text-align:left;padding:9px 11px;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);}
td{padding:9px 11px;font-size:12px;border-bottom:1px solid var(--border);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--card2);}

/* Alertes */
.alert{padding:10px 14px;border-radius:7px;font-size:12px;margin-bottom:12px;}
.alert-ok{background:rgba(39,174,96,.1);border:1px solid rgba(39,174,96,.3);color:var(--green);}
.alert-err{background:rgba(192,57,43,.1);border:1px solid rgba(192,57,43,.3);color:var(--red);}
.alert-warn{background:rgba(230,126,34,.1);border:1px solid rgba(230,126,34,.3);color:var(--orange);}

/* Loading */
.loading{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--muted);gap:8px;font-size:13px;}
.spin{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--red);border-radius:50%;animation:spin .6s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg);}}

/* Overlay / Popup */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:9000;backdrop-filter:blur(3px);}
.popup{width:540px;max-width:95vw;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px;max-height:92vh;overflow-y:auto;}
.popup-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;color:var(--red);margin-bottom:16px;}

/* ══════════════════════════════════════════
   HERO ACCUEIL
══════════════════════════════════════════ */
.hero{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:22px 26px;display:flex;align-items:center;justify-content:space-between;gap:18px;margin-bottom:20px;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--red),var(--orange),var(--red));}
.hero::after{content:'BURGER SHOT';position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-family:'Bebas Neue',sans-serif;font-size:80px;color:rgba(192,57,43,.04);pointer-events:none;letter-spacing:4px;white-space:nowrap;z-index:0;}
.hero-avatar{width:56px;height:56px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;overflow:hidden;border:3px solid rgba(192,57,43,.35);flex-shrink:0;}
.hero-avatar img{width:100%;height:100%;object-fit:cover;}
.hero-name{font-family:'Bebas Neue',sans-serif;font-size:34px;letter-spacing:2px;line-height:1;}
.hero-sub{font-size:10px;color:var(--muted);letter-spacing:2.5px;text-transform:uppercase;margin-bottom:4px;}

/* ══════════════════════════════════════════
   CAISSE
══════════════════════════════════════════ */
.caisse-layout{display:grid;grid-template-columns:1fr 300px;gap:18px;align-items:start;}
.caisse-cat-title{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:2.5px;color:var(--red);margin-bottom:9px;padding-bottom:6px;border-bottom:2px solid var(--red);}
.prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;margin-bottom:18px;}
.prod-card{background:var(--card2);border:2px solid var(--border);border-radius:9px;cursor:pointer;transition:.15s;overflow:hidden;display:flex;flex-direction:column;}
.prod-card:hover{border-color:var(--red);transform:translateY(-2px);box-shadow:0 5px 16px rgba(192,57,43,.18);}
.prod-img{width:100%;aspect-ratio:1;background:var(--card3);display:flex;align-items:center;justify-content:center;overflow:hidden;border-bottom:1px solid var(--border);}
.prod-img img{width:100%;height:100%;object-fit:contain;padding:6px;transition:.15s;}
.prod-card:hover .prod-img img{transform:scale(1.07);}
.prod-emoji{font-size:36px;}
.prod-info{padding:7px 8px 9px;}
.prod-name{font-size:11px;font-weight:700;margin-bottom:3px;line-height:1.2;}
.prod-bottom{display:flex;justify-content:space-between;align-items:center;}
.prod-price{font-family:'Bebas Neue',sans-serif;font-size:13px;color:var(--red);}
.prod-pts{font-size:9px;color:var(--muted);}
.prod-qty-row{display:flex;align-items:center;justify-content:center;gap:5px;padding:5px 6px;background:var(--card);border-top:1px solid var(--border);}
.qty-btn{width:20px;height:20px;border-radius:50%;background:var(--red);border:none;color:#fff;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:900;transition:.12s;}
.qty-btn:hover{background:var(--red-d);}
.qty-input{width:30px;text-align:center;background:var(--card2);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:12px;font-weight:700;padding:2px 3px;}
/* Ticket */
.ticket-wrap{position:sticky;top:112px;}
.ticket{background:#f6f0e4;color:#111;border-radius:11px;padding:16px;font-family:'Courier New',monospace;box-shadow:0 6px 28px rgba(0,0,0,.5);}
.ticket-head{text-align:center;margin-bottom:10px;}
.ticket-logo{height:44px;object-fit:contain;margin-bottom:3px;}
.ticket-addr{font-size:10px;color:#666;margin-top:2px;}
.t-sep{border:none;border-top:1px dashed #aaa;margin:8px 0;}
.t-line{display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px;font-weight:700;}
.t-del{cursor:pointer;color:var(--red);font-size:10px;margin-left:4px;}
.t-empty{text-align:center;color:#999;font-size:12px;padding:12px 0;}
.t-total{font-size:14px;font-weight:900;text-align:right;}
.t-sub{font-size:10px;color:#666;text-align:right;margin-top:2px;}
.ticket-btns{display:flex;gap:7px;margin-top:12px;}
.ticket-btns .btn{flex:1;justify-content:center;font-size:11px;}

/* ══════════════════════════════════════════
   EMPLOYÉS
══════════════════════════════════════════ */
.emp-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;}
@media(max-width:1400px){.emp-grid{grid-template-columns:repeat(4,1fr);}}
@media(max-width:1100px){.emp-grid{grid-template-columns:repeat(3,1fr);}}
@media(max-width:768px){.emp-grid{grid-template-columns:repeat(2,1fr);}}
.emp-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:.15s;}
.emp-card:hover{border-color:rgba(192,57,43,.35);box-shadow:0 5px 24px rgba(0,0,0,.25);}
.emp-head{padding:14px 16px;display:flex;align-items:center;gap:11px;border-bottom:1px solid var(--border);position:relative;}
.emp-head-bg{position:absolute;inset:0;background:linear-gradient(135deg,rgba(192,57,43,.13),rgba(230,126,34,.06));}
.emp-av{width:44px;height:44px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:#fff;flex-shrink:0;border:2px solid rgba(192,57,43,.35);overflow:hidden;z-index:1;}
.emp-av img{width:100%;height:100%;object-fit:cover;}
.emp-nm{font-size:13px;font-weight:800;z-index:1;}
.emp-disc{font-size:10px;color:var(--muted);z-index:1;}
.emp-body{padding:12px 16px;}
.emp-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin-bottom:10px;}
.emp-stat{text-align:center;background:var(--card2);border-radius:6px;padding:6px 3px;}
.emp-stat-v{font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--red);}
.emp-stat-l{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;margin-top:1px;}
.emp-prime-row{display:flex;align-items:center;justify-content:space-between;background:rgba(39,174,96,.07);border:1px solid rgba(39,174,96,.18);border-radius:7px;padding:6px 10px;margin-bottom:9px;}
.emp-prime-val{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--green);}
.quota-bar-bg{height:5px;background:var(--card3);border-radius:3px;overflow:hidden;margin-top:3px;}
.quota-bar-fill{height:100%;background:linear-gradient(90deg,var(--red),var(--orange));border-radius:3px;transition:width .5s;}
.status-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:4px;}
.dot-actif{background:var(--green);}
.dot-absent{background:var(--warn);}
.dot-inactif{background:#555;}
.btn-info{width:24px;height:24px;border-radius:50%;background:rgba(52,152,219,.13);border:1px solid rgba(52,152,219,.28);color:var(--blue);font-size:11px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:.12s;}
.btn-info:hover{background:var(--blue);color:#fff;}

/* ══════════════════════════════════════════
   QUOTA
══════════════════════════════════════════ */
.quota-hero{background:linear-gradient(135deg,rgba(192,57,43,.1),rgba(230,126,34,.06));border:1px solid rgba(192,57,43,.22);border-radius:12px;padding:22px;margin-bottom:18px;}
.quota-ticket{background:var(--card2);border:1px solid var(--border);border-radius:9px;padding:14px;margin-bottom:9px;border-left:3px solid var(--orange);}
.quota-ticket.valide{border-left-color:var(--green);opacity:.65;}
.quota-ticket.refuse{border-left-color:var(--red);opacity:.5;}
.quota-ticket.pending{border-left-color:var(--warn);}

/* ══════════════════════════════════════════
   STOCK
══════════════════════════════════════════ */
.stock-bar-bg{height:6px;background:var(--card3);border-radius:3px;overflow:hidden;margin-top:5px;}
.stock-bar-fill{height:100%;border-radius:3px;transition:width .4s;}

/* ══════════════════════════════════════════
   VÉHICULES
══════════════════════════════════════════ */
.veh-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px;}
.veh-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:.15s;}
.veh-card:hover{border-color:rgba(192,57,43,.35);}
.veh-img{width:100%;height:140px;background:var(--card2);display:flex;align-items:center;justify-content:center;overflow:hidden;border-bottom:1px solid var(--border);}
.veh-img img{width:100%;height:100%;object-fit:cover;}
.veh-plaque{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2.5px;color:var(--red);}

/* ══════════════════════════════════════════
   CALENDRIER
══════════════════════════════════════════ */
.cal-table{width:100%;border-collapse:separate;border-spacing:3px;}
.cal-th{text-align:center;padding:7px;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);}
.cal-cell{min-height:76px;background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:6px;cursor:pointer;transition:.15s;position:relative;vertical-align:top;}
.cal-cell:hover{border-color:var(--red);background:rgba(192,57,43,.05);}
.cal-cell.today{border-color:var(--red);background:rgba(192,57,43,.09);}
.cal-cell.today .cal-num{color:var(--red);font-weight:900;}
.cal-cell.other{opacity:.3;}
.cal-num{font-size:12px;font-weight:700;margin-bottom:3px;}
.cal-pill{font-size:9px;background:var(--red);color:#fff;border-radius:3px;padding:1px 4px;margin-bottom:2px;display:block;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.cal-pill.resa{background:var(--blue);}
.cal-pill.reunion{background:#9b59b6;}

/* ══════════════════════════════════════════
   GESTION / COFFRE
══════════════════════════════════════════ */

async function sb(endpoint, opts = {}) {
  const method = opts.method || 'GET';
  const isWrite = ['POST','PATCH','DELETE','PUT'].includes(method);
  try {
    const r = await fetch(`${SB_URL}/rest/v1/${endpoint}`, {
      headers: {
        apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}`,
        'Content-Type': 'application/json',
        Prefer: isWrite ? 'return=minimal' : 'return=representation',
        ...(opts.headers || {})
      },
      method, body: opts.body
    });
    if (!r.ok) { console.error(`SB ${method} ${endpoint}:`, r.status, await r.text()); return null; }
    const txt = await r.text();
    if (!txt || txt.trim() === '') return true;
    try { return JSON.parse(txt); } catch { return true; }
  } catch(e) { console.error('SB error:', e); return null; }
}

/* ══════════════════════════════════════════
   UTILS CALCULS
══════════════════════════════════════════ */
function getSemaine() {
  const d = new Date();
  const day = d.getDay(); // 0=dim, 1=lun... 6=sam
  const sam = new Date(d);
  // Reculer jusqu'au samedi précédent (ou aujourd'hui si samedi)
  sam.setDate(d.getDate() - (day === 6 ? 0 : day + 1));
  sam.setHours(0,0,0,0);
  const y = sam.getFullYear();
  const m = String(sam.getMonth()+1).padStart(2,'0');
  const j = String(sam.getDate()).padStart(2,'0');
  return `${y}-${m}-${j}`;
}

function getLabelSemaine(cle) {
  if (!cle) cle = getSemaine();
  if (cle.includes('-W')) {
    const sam = new Date(cle.replace('-W','W') + '-6');
    cle = `${sam.getFullYear()}-${String(sam.getMonth()+1).padStart(2,'0')}-${String(sam.getDate()).padStart(2,'0')}`;
  }
  const sam = new Date(cle + 'T00:00:00');
  const ven = new Date(sam);
  ven.setDate(sam.getDate() + 6);
  const M = ['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];
  const fj = dt => String(dt.getDate()).padStart(2,'0');
  const fm = dt => M[dt.getMonth()];
  // Même année : "13 Jun → 19 Jun 2026"
  // Années différentes : "30 Déc 2025 → 05 Jan 2026"
  if (sam.getFullYear() === ven.getFullYear()) {
    return `${fj(sam)} ${fm(sam)} → ${fj(ven)} ${fm(ven)} ${ven.getFullYear()}`;
  } else {
    return `${fj(sam)} ${fm(sam)} ${sam.getFullYear()} → ${fj(ven)} ${fm(ven)} ${ven.getFullYear()}`;
  }
}

function calcImpot(ca) {
  if (ca < 200000) return 0;
  if (ca < 400000) return ca * .05;
  if (ca < 600000) return ca * .08;
  if (ca < 800000) return ca * .11;
  if (ca < 1000000) return ca * .14;
  if (ca < 2500000) return ca * .17;
  return ca * .19;
}

function tauxImpot(ca) {
  if (ca < 200000) return '0%'; if (ca < 400000) return '5%';
  if (ca < 600000) return '8%'; if (ca < 800000) return '11%';
  if (ca < 1000000) return '14%'; if (ca < 2500000) return '17%';
  return '19%';
}

function fmtMoney(n) { return Math.round(n).toLocaleString('fr-FR') + '$'; }
function fmtTel(input) {
  const d = input.value.replace(/\D/g,'').slice(0,10);
  if (!d.length) { input.value=''; return; }
  if (d.length<=3) input.value=`(${d}`;
  else if (d.length<=6) input.value=`(${d.slice(0,3)}) ${d.slice(3)}`;
  else input.value=`(${d.slice(0,3)}) ${d.slice(3,6)}-${d.slice(6)}`;
}
function fmtTelDisplay(v) {
  if (!v) return '—';
  const d = v.replace(/\D/g,'').slice(0,10);
  if (d.length<=3) return d;
  if (d.length<=6) return `(${d.slice(0,3)}) ${d.slice(3)}`;
  return `(${d.slice(0,3)}) ${d.slice(3,6)}-${d.slice(6)}`;
}
function cap(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : s; }
function isMercredi() { return new Date().getDay() === 3; }
function getEmoji(cat) {
  return {'Burger':'🍔','Menu':'🍱','Boisson':'🥤','Dessert':'🍦','Nugget':'🍗','Accompagnement':'🍟','Autre':'🛒'}[cat]||'🍽️';
}

/* ══════════════════════════════════════════
   COFFRE TEMPS RÉEL
   = solde_départ + CA + livraisons - dépenses
   (impôts non inclus en temps réel)
══════════════════════════════════════════ */
async function getCoffreTempsReel() {
  const [coffreData, caData, livrData, depData] = await Promise.all([
    sb('coffre_solde?limit=1'),
    sb('parametres?cle=eq.ca_semaine'),
    sb(`livraisons?select=montant&semaine=eq.${getSemaine()}`),
    sb(`depenses?select=montant&semaine=eq.${getSemaine()}`)
  ]);
  const soldeDepart = parseFloat(coffreData?.[0]?.solde ?? 500000);
  const ca = parseFloat(caData?.[0]?.valeur ?? 0);
  const livr = (livrData||[]).reduce((a,l)=>a+(l.montant||0),0);
  const dep = (depData||[]).reduce((a,d)=>a+(d.montant||0),0);
  return { soldeDepart, ca, livr, dep, total: soldeDepart + ca + livr - dep };
}

async function updateTopCoffre() {

  if (!el) return;
  el.style.display = 'block';
  const { soldeDepart, total } = await getCoffreTempsReel();
  el.textContent = `💰 ${fmtMoney(total)}`;
  el.className = 'coffre-badge' + (total >= soldeDepart ? '' : ' neg');
}

/* ══════════════════════════════════════════
   THÈME AUTO (clair le jour, sombre dès 21h)
   Respecte le choix manuel de l'utilisateur si déjà fait
══════════════════════════════════════════ */
function appliquerThemeAuto() {
  const choixManuel = localStorage.getItem('bs_theme_manuel');
  if (choixManuel) {
    document.documentElement.dataset.theme = choixManuel;
    const btn = document.getElementById('themeBtn');
    if (btn) btn.textContent = choixManuel === 'dark' ? '☀️' : '🌙';
    return;
  }
  const heure = new Date().getHours();
  const sombre = heure >= 21 || heure < 7;
  const theme = sombre ? 'dark' : 'light';
  document.documentElement.dataset.theme = theme;
  const btn = document.getElementById('themeBtn');
  if (btn) btn.textContent = theme === 'dark' ? '☀️' : '🌙';
}

/* ══════════════════════════════════════════
   MERCREDI DES ZOUZOUS
══════════════════════════════════════════ */
function lancerZouzous() {
  if (!isMercredi()) return;
  if (document.getElementById('zouzousBanner')) return;
  const b = document.createElement('div');
  b.id = 'zouzousBanner';
  b.style.cssText = 'position:fixed;top:108px;right:16px;z-index:150;pointer-events:none;animation:pulse 2s ease-in-out infinite;';
  b.innerHTML = `<img src="https://upload.redstartrp.fr/uploads/photo-1781005432-e026a2279949.png" style="height:80px;object-fit:contain;filter:drop-shadow(0 4px 14px rgba(0,0,0,.6));" alt="">`;
  document.body.appendChild(b);
  // Confettis
  const colors = ['#e74c3c','#e67e22','#f1c40f','#27ae60','#3498db','#fff'];
  for (let i = 0; i < 50; i++) {
    const el = document.createElement('div');
    el.style.cssText = `position:fixed;left:${Math.random()*100}vw;top:-10px;width:${6+Math.random()*7}px;height:${6+Math.random()*7}px;background:${colors[Math.floor(Math.random()*colors.length)]};border-radius:${Math.random()>.5?'50%':'2px'};z-index:8999;pointer-events:none;animation:confetti ${2+Math.random()*3}s ${Math.random()*2}s linear forwards;`;
    document.body.appendChild(el);
    el.addEventListener('animationend', () => el.remove());
  }
}

/* ══════════════════════════════════════════
   INIT
══════════════════════════════════════════ */
window.addEventListener('DOMContentLoaded', async () => {
  startClock();
  appliquerThemeAuto();
  setInterval(appliquerThemeAuto, 60000);
  lancerZouzous();

  const raw = localStorage.getItem('bs_user');
  if (!raw) { location.href = '/'; return; }
  let userData;
  try { userData = JSON.parse(raw); } catch { location.href = '/'; return; }

  const { id, username, avatar } = userData;
  if (!id) { location.href = '/'; return; }

  // Déterminer le rôle
  if (DIR_IDS.includes(id)) ROLE = 'direction';

  if (ROLE === 'employe') {
    const empData = await sb(`comptes_dashboard?discord_id=eq.${id}&select=poste,actif,contrat,role`);
    if (!empData?.[0] || !empData[0].actif) {
      localStorage.removeItem('bs_user'); location.href = '/'; return;
    }
    if (empData[0].role === 'gouvernement') ROLE = 'gouvernement';
    if (['Patron','Co-Patron'].includes(empData[0].poste)) ROLE = 'direction';
    USER_NIVEAU = NIVEAU[empData[0].poste] || 0;
    USER_CONTRAT = empData[0].contrat || 'CDD';
  }

  // Infos affichage
  const empRP = await sb(`comptes_dashboard?discord_id=eq.${id}&select=nom,prenom,photo_url`);
  const e = empRP?.[0];
  const displayName = (e?.prenom && e?.nom) ? `${e.prenom} ${e.nom}` : (userData.prenom && userData.nom) ? `${userData.prenom} ${userData.nom}` : username || '—';
  USER = { id, username, displayName, avatar, photoUrl: e?.photo_url || null };

  // Avatar topbar
  const av = document.getElementById('topAvatar');
  const photoUrl = e?.photo_url;
  if (photoUrl) {
    const img = document.createElement('img');
    img.src = photoUrl;
    img.onerror = () => { av.textContent = displayName.charAt(0).toUpperCase(); };
    av.appendChild(img);
  } else if (avatar) {
    const img = document.createElement('img');
    img.src = `https://cdn.discordapp.com/avatars/${id}/${avatar}.png`;
    img.onerror = () => { av.textContent = displayName.charAt(0).toUpperCase(); };
    av.appendChild(img);
  } else {
    av.textContent = displayName.charAt(0).toUpperCase();
  }

  document.getElementById('topName').textContent = displayName;
  document.getElementById('topRole').textContent =
    ROLE === 'direction' ? '⭐ Direction' :
    ROLE === 'gouvernement' ? '🏛️ Gouvernement' : '🧾 Employé';

  // Charger configs
  await loadQuotaCfg();
  passTypes = await sb('pass_types?select=*') || [];

  buildNav();
  buildPages();
  updateTopCoffre();

  const lastPage = localStorage.getItem('bs_last_page');
  const defaultPage = ROLE === 'gouvernement' ? 'stats' : 'accueil';
  showPage(lastPage || defaultPage);

  if (ROLE === 'employe') trackActivity();

  // Auto-refresh toutes les 60s
  refreshTimer = setInterval(autoRefresh, 60000);

  // Dropdown nav
  document.addEventListener('click', e => {
    const drop = e.target.closest('.nav-drop');
    document.querySelectorAll('.nav-drop-menu').forEach(m => m.classList.remove('open'));
    if (drop && e.target.closest('.nav-drop > .nav-item')) {
      const menu = drop.querySelector('.nav-drop-menu');
      if (menu) menu.classList.add('open');
    }
  });

  // Inputs avec debounce
  document.addEventListener('input', e => {
    if (e.target.id === 'caisseClientSearch') { clearTimeout(window._t1); window._t1 = setTimeout(() => searchCaisseClient(e.target.value), 280); }
    if (e.target.id === 'passSearch') { clearTimeout(window._t2); window._t2 = setTimeout(() => searchPassClient(e.target.value), 280); }
    if (e.target.id === 'mImg') updateImgPreview(e.target.value);
  });

  verifierClotureVendredi();
  enregistrerEvolutionJour();
  ctVerifierContratsEnAttente();
  verifierExpirationAvertissements();
   verifierExpirationPass();
});

async function loadQuotaCfg() {
  const data = await sb('parametres?cle=in.(quota_cdd_viande,quota_cdd_patates,quota_cdi_viande,quota_cdi_patates,prime_quota_cdd,prime_quota_cdi,quota_cdd_viande_actif,quota_cdd_patates_actif,quota_cdi_viande_actif,quota_cdi_patates_actif)') || [];
  const map = {};
  data.forEach(c => { map[c.cle] = c.valeur; });
  if (map.quota_cdd_viande) quotaCfg.cdd_viande = +map.quota_cdd_viande;
  if (map.quota_cdd_patates) quotaCfg.cdd_patates = +map.quota_cdd_patates;
  if (map.quota_cdi_viande) quotaCfg.cdi_viande = +map.quota_cdi_viande;
  if (map.quota_cdi_patates) quotaCfg.cdi_patates = +map.quota_cdi_patates;
  if (map.prime_quota_cdd) quotaCfg.cdd_prime = +map.prime_quota_cdd;
  if (map.prime_quota_cdi) quotaCfg.cdi_prime = +map.prime_quota_cdi;
  quotaCfg.cdd_viande_actif = map.quota_cdd_viande_actif !== 'false';
  quotaCfg.cdd_patates_actif = map.quota_cdd_patates_actif !== 'false';
  quotaCfg.cdi_viande_actif = map.quota_cdi_viande_actif !== 'false';
  quotaCfg.cdi_patates_actif = map.quota_cdi_patates_actif !== 'false';
}

async function trackActivity() {
  if (!USER?.id) return;
  await sb(`comptes_dashboard?discord_id=eq.${USER.id}`, { method:'PATCH', body: JSON.stringify({ derniere_activite: new Date().toISOString() }) });
}

async function autoRefresh() {
  if (ROLE === 'direction' || USER_NIVEAU >= 1) {
    const t = await sb('quotas_tickets?select=id&statut=eq.en_attente');
    pendingQuota = t?.length || 0;
    const b = document.getElementById('quota-badge');
    if (b) b.textContent = pendingQuota || '';
    document.title = pendingQuota > 0 ? `(${pendingQuota}) Burger Shot` : 'Burger Shot';
  }
  updateTopCoffre();
  const activePage = document.querySelector('.page.active');
  if (!activePage) return;
  const id = activePage.id.replace('page-','');
  const loaders = { accueil: loadAccueil, stats: loadStats, gestion: loadGestion };
  if (loaders[id]) loaders[id]();
}

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const page = document.getElementById(`page-${id}`);
  if (page) page.classList.add('active');
  const ni = document.getElementById(`nav-${id}`);
  if (ni) ni.classList.add('active');
  const loaders = {
    'accueil': loadAccueil,
    'caisse': loadCaisse,
    'clients': loadClients,
    'quota': loadQuotaPage,
    'stock': loadStock,
    'stock_ro': loadStockRO,
    'calendrier': loadCalendrier,
    'stats': loadStats,
    'stats_ro': loadStatsRO,
    'employes': loadEmployes,
    'employes_ro': loadEmployesRO,
    'menu': loadMenu,
    'vehicules': loadVehicules,
    'vehicules_ro': loadVehiculesRO,
    'contrats': loadContrats,
    'contrats_travail': loadContratsTravail,
    'gestion': loadGestion,
    'gouvernement': loadGouvernement,
    'depenses': loadDepenses,
    'benefices': loadBenefices,
    'registre': loadRegistre,
    'registre_ro': loadRegistreRO,
    'comptes': loadComptes,
  };
  if (loaders[id]) loaders[id]();
  localStorage.setItem('bs_last_page', id);
}

   PAGE ACCUEIL
══════════════════════════════════════════ */
async function loadAccueil() {
  const el = document.getElementById('accueilContent');
  if (!el.innerHTML.trim()) el.innerHTML = '<div class="loading"><div class="spin"></div></div>';
  const semaine = getSemaine();
  const today = new Date().toISOString().split('T')[0];
  const [clients, employes, cmdSem, cmdJour, cmdPerso, livrSem] = await Promise.all([
    sb('clients?select=id'),
    sb('comptes_dashboard?select=id&actif=eq.true&role=neq.gouvernement'),
    sb(`commandes?select=total,total_apres_reduction&semaine=eq.${semaine}`),
    sb(`commandes?select=total,total_apres_reduction&created_at=gte.${today}T00:00:00`),
    sb(`commandes?select=total,total_apres_reduction&semaine=eq.${semaine}&employe_discord_id=eq.${USER.id}`),
    sb(`livraisons?select=montant&semaine=eq.${semaine}`)
  ]);

  // Message quota personnalisé avec véhicule attribué — intégré dans le hero
  let quotaInlineHtml = '';
  if (ROLE !== 'gouvernement') {
    const [empQ, vehData] = await Promise.all([
      sb(`comptes_dashboard?discord_id=eq.${USER.id}&select=contrat,quota_viande_validee,quota_patates_validee,prenom`),
      sb(`vehicules?employe_discord_id=eq.${USER.id}&select=plaque&limit=1`)
    ]);
    const empQd = empQ?.[0];
    if (empQd) {
      const maxV = empQd.contrat==='CDI' ? quotaCfg.cdi_viande : quotaCfg.cdd_viande;
      const maxP = empQd.contrat==='CDI' ? quotaCfg.cdi_patates : quotaCfg.cdd_patates;
      const vActif = empQd.contrat==='CDI' ? quotaCfg.cdi_viande_actif : quotaCfg.cdd_viande_actif;
      const pActif = empQd.contrat==='CDI' ? quotaCfg.cdi_patates_actif : quotaCfg.cdd_patates_actif;
      const qV = +empQd.quota_viande_validee||0, qP = +empQd.quota_patates_validee||0;
      const restV = Math.max(0, maxV - qV), restP = Math.max(0, maxP - qP);
      const pV = maxV>0 ? Math.min(100, Math.round(qV/maxV*100)) : 100;
      const pP = maxP>0 ? Math.min(100, Math.round(qP/maxP*100)) : 100;
      const okV = !vActif || restV <= 0;
      const okP = !pActif || restP <= 0;
      const plaque = vehData?.[0]?.plaque || null;
      const prenomMsg = empQd.prenom || USER.displayName.split(' ')[0];

      let phrase;
      if (okV && okP) {
        phrase = `Tu n'as plus de quota à faire, tu peux livrer ta production ! 🎉`;
      } else {
        const parties = [];
        if (vActif && restV > 0) parties.push(`<strong style="color:var(--red)">${restV}</strong> de viande`);
        if (pActif && restP > 0) parties.push(`<strong style="color:var(--orange)">${restP}</strong> de patates`);
        const partieTxt = parties.join(' et ');
        const vehTxt = plaque ? ` avec le Speedo immatriculé <strong>${plaque}</strong>` : '';
        phrase = `Il te reste ${partieTxt} dans ton quota${vehTxt} !`;
      }

      quotaInlineHtml = `<div style="min-width:220px;max-width:280px;padding:12px 14px;background:rgba(0,0,0,.25);border-radius:10px;border-left:3px solid ${okV&&okP?'var(--green)':'var(--orange)'};position:relative;z-index:1">
        <div style="font-size:11px;line-height:1.5;margin-bottom:${!(okV&&okP)?'8px':'0'}">${phrase}</div>
        ${!(okV&&okP) ? `
        <div style="display:flex;flex-direction:column;gap:6px">
          ${vActif ? `<div>
            <div style="display:flex;justify-content:space-between;font-size:9px;color:var(--muted);margin-bottom:2px"><span>🥩 Viande</span><span>${pV}%</span></div>
            <div class="quota-bar-bg"><div class="quota-bar-fill" style="width:${pV}%"></div></div>
          </div>` : ''}
          ${pActif ? `<div>
            <div style="display:flex;justify-content:space-between;font-size:9px;color:var(--muted);margin-bottom:2px"><span>🥔 Patates</span><span>${pP}%</span></div>
            <div class="quota-bar-bg"><div class="quota-bar-fill" style="width:${pP}%;background:linear-gradient(90deg,var(--orange),var(--warn))"></div></div>
          </div>` : ''}
        </div>` : ''}
      </div>`;
    }
  }
  // Météo Los Santos (basée sur Paris) — compacte + prévision 7j
  let meteoHtml = '';
  try {
    const meteoRes = await fetch('https://api.open-meteo.com/v1/forecast?latitude=48.8566&longitude=2.3522&current=temperature_2m,weather_code&daily=temperature_2m_max,weather_code&timezone=Europe/Paris&forecast_days=7');
    const meteoData = await meteoRes.json();
    const temp = Math.round(meteoData?.current?.temperature_2m);
    const codeNow = meteoData?.current?.weather_code;
    const WMOICON = {
      0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',48:'🌫️',
      51:'🌦️',53:'🌦️',55:'🌦️',61:'🌧️',63:'🌧️',65:'🌧️',
      71:'🌨️',73:'🌨️',75:'🌨️',80:'🌦️',81:'🌧️',82:'⛈️',
      95:'⛈️',96:'⛈️',99:'⛈️'
    };
    const iconNow = WMOICON[codeNow] || '🌡️';

    const jours = meteoData?.daily?.time || [];
    const tmax = meteoData?.daily?.temperature_2m_max || [];
    const codes = meteoData?.daily?.weather_code || [];
    const JOURS_COURT = ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];

    const previsionHtml = jours.map((d, i) => {
      const dt = new Date(d + 'T12:00:00');
      const j = JOURS_COURT[dt.getDay()];
      const t = Math.round(tmax[i]);
      const ic = WMOICON[codes[i]] || '🌡️';
      const chaud = t >= 30;
      return `<div style="text-align:center;flex:1;min-width:38px">
        <div style="font-size:9px;color:var(--muted);text-transform:uppercase">${i===0?"Auj.":j}</div>
        <div style="font-size:16px;margin:2px 0">${ic}</div>
        <div style="font-size:11px;font-weight:700;color:${chaud?'var(--red)':'var(--text)'}">${isNaN(t)?'—':t+'°'}</div>
      </div>`;
    }).join('');

    const orageSemaine = codes.some(c => [95,96,99].includes(c));
    const caniculeSemaine = tmax.some(t => t >= 32);
    const caniculeAuj = temp >= 30;

    let alerteHtml = '';
    if (caniculeSemaine) {
      alerteHtml = `<div class="alert alert-err" style="margin-top:10px;margin-bottom:0">🥵 <strong>Alerte canicule cette semaine !</strong> Pense à bien t'hydrater et à porter une casquette pendant ton service.</div>`;

      alerteHtml = `<div class="alert alert-err" style="margin-top:10px;margin-bottom:0">🥵 <strong>Forte chaleur aujourd'hui !</strong> Hydrate-toi et pense à ta casquette.</div>`;

      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">

  } catch(e) { console.warn('Météo error:', e); }
  const caLiv = (livrSem||[]).reduce((a,l)=>a+(l.montant||0),0);
  const caSem = (cmdSem||[]).reduce((a,c)=>a+(c.total_apres_reduction||c.total||0),0);
  const caJour = (cmdJour||[]).reduce((a,c)=>a+(c.total_apres_reduction||c.total||0),0);
  const caPerso = (cmdPerso||[]).reduce((a,c)=>a+(c.total_apres_reduction||c.total||0),0);

  const first = (USER.displayName||'').split(' ')[0]||'';
  const last = (USER.displayName||'').split(' ').slice(1).join(' ')||'';
  const dateStr = new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});
  const avHtml = USER.photoUrl ? `<img src="${USER.photoUrl}">` : USER.avatar ? `<img src="https://cdn.discordapp.com/avatars/${USER.id}/${USER.avatar}.png">` : first.charAt(0).toUpperCase();

  // Alertes pass expirants
  let passAlerts = '';
  if (ROLE === 'direction' || USER_NIVEAU >= 2) {
    const inWeek = new Date(); inWeek.setDate(inWeek.getDate()+7);
    const exp = await sb(`clients?select=nom,prenom&pass=not.is.null&pass_expiry=lte.${inWeek.toISOString()}&pass_expiry=gte.${new Date().toISOString()}`);
    if (exp?.length) passAlerts = `<div class="alert alert-warn" style="margin-bottom:16px">⏰ <strong>${exp.length} pass</strong> expirent dans 7 jours : ${exp.map(c=>`${c.prenom} ${c.nom}`).join(', ')}</div>`;

  // Quota employé
  let quotaHtml = '';
  if (ROLE === 'employe') {
    const empD = await sb(`comptes_dashboard?discord_id=eq.${USER.id}&select=contrat,quota_viande_validee,quota_patates_validee`);
    const emp = empD?.[0];
    if (emp) {
      const maxV = emp.contrat==='CDI' ? quotaCfg.cdi_viande : quotaCfg.cdd_viande;
      const maxP = emp.contrat==='CDI' ? quotaCfg.cdi_patates : quotaCfg.cdd_patates;

      const primeMax = emp.contrat==='CDI' ? quotaCfg.cdi_prime : quotaCfg.cdd_prime;
      quotaHtml = `<div class="quota-hero" style="margin-top:18px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:7px">
          <div style="font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;color:var(--red)">🚚 QUOTA ${emp.contrat} — SEMAINE EN COURS</div>
          <button class="btn btn-outline btn-sm" onclick="showPage('quota')">Voir détail</button>
        </div>
        <div class="g2">
          <div>
            <div style="font-size:11px;color:var(--muted);margin-bottom:3px">🥩 Viande — ${pV}%</div>
            <div class="quota-bar-bg"><div class="quota-bar-fill" style="width:${pV}%"></div></div>
            <div style="font-size:10px;color:var(--muted);margin-top:3px">${qV}/${maxV} unités</div>
          </div>
          <div>
            <div style="font-size:11px;color:var(--muted);margin-bottom:3px">🥔 Patates — ${pP}%</div>
            <div class="quota-bar-bg"><div class="quota-bar-fill" style="width:${pP}%;background:linear-gradient(90deg,var(--orange),var(--warn))"></div></div>
            <div style="font-size:10px;color:var(--muted);margin-top:3px">${qP}/${maxP} unités</div>
          </div>

        <div style="margin-top:10px;text-align:right;font-size:11px;font-weight:700;color:${pV>=100&&pP>=100?'var(--green)':'var(--muted)'}">

  }

  el.innerHTML = `${passAlerts}${meteoHtml}
  <div class="hero">
    <div class="hero-avatar">${avHtml}</div>
    <div style="flex:1">
      <div class="hero-sub">Bonjour,</div>
      <div class="hero-name">${first.toUpperCase()}${last?`, <span style="color:var(--red)">${last.toUpperCase()}</span>`:''}</div>
      <div style="display:flex;gap:7px;margin-top:7px;flex-wrap:wrap">
        <span class="badge badge-red">${ROLE==='direction'?'⭐ Direction':ROLE==='gouvernement'?'🏛️ Gouvernement':'🧾 Employé'}</span>
        <span style="font-size:11px;color:var(--muted)">${dateStr}</span>
        ${isMercredi()?'<span class="badge badge-orange">🎉 Mercredi des Zouzous -10%</span>':''}
      </div>
    </div>
    ${quotaInlineHtml}
  </div>
  <div class="g3" style="margin-bottom:18px">
    <div class="stat" style="--accent:var(--warn)"><div class="stat-icon">🏆</div><div class="stat-label">Employés actifs</div><div class="stat-val">${(employes||[]).length}</div></div>
    <div class="stat" style="--accent:var(--blue)"><div class="stat-icon">📈</div><div class="stat-label">CA Semaine</div><div class="stat-val">${fmtMoney(caSem+caLiv)}</div><div class="stat-sub">${(cmdSem||[]).length} commandes + livraisons</div></div>
    <div class="stat" style="--accent:var(--green)"><div class="stat-icon">☀️</div><div class="stat-label">CA Aujourd'hui</div><div class="stat-val">${fmtMoney(caJour)}</div><div class="stat-sub">${(cmdJour||[]).length} commandes</div></div>
  </div>
  ${ROLE === 'employe' ? `<div class="g2" style="margin-bottom:18px">
    <div class="stat" style="--accent:var(--orange)"><div class="stat-icon">🧾</div><div class="stat-label">Mes commandes sem.</div><div class="stat-val">${(cmdPerso||[]).length}</div><div class="stat-sub">${fmtMoney(caPerso)} encaissés</div></div>
    <div class="stat"><div class="stat-icon">👥</div><div class="stat-label">Clients enregistrés</div><div class="stat-val">${(clients||[]).length}</div></div>

async function loadCaisse() {
  const [prods, contrats] = await Promise.all([
    sb('produits?select=*&actif=eq.true&order=categorie.asc,nom.asc'),
    sb('contrats_reduction?select=*&actif=eq.true')
  ]);
  produits = Array.isArray(prods) ? prods : [];
  const sel = document.getElementById('caisseContrat');
  if (sel) {
    // Option spéciale direction : annule le mercredi des zouzous
  const optionZouzous = ROLE === 'direction' 
    ? `<option value="__zouzous__" data-pct="-10" data-pa="false">🎉 Annuler Mercredi Zouzous (+10%)</option>`
    : '';

  sel.innerHTML = '<option value="">— Aucun contrat —</option>' +
    optionZouzous +
    (Array.isArray(contrats)?contrats:[])
      .filter(c => !c.prix_achat || ROLE === 'direction')
      .map(c => `<option value="${c.id}" data-pct="${c.pourcentage}" data-pa="${c.prix_achat||false}">${c.nom}${c.prix_achat?' (Prix achat)':` (-${c.pourcentage}%)`}</option>`)
      .join('');
  }
  const el = document.getElementById('caisseProduits');
  if (!el) return;
  if (!produits.length) { el.innerHTML='<div class="card"><p style="color:var(--muted);text-align:center;padding:20px">Aucun produit.</p></div>'; return; }
  const CAT_ORDER = ['Burger','Menu','Nugget','Boisson','Dessert','Accompagnement','Autre'];
  const cats = [...CAT_ORDER.filter(c=>produits.some(p=>p.categorie===c)), ...[...new Set(produits.map(p=>p.categorie))].filter(c=>!CAT_ORDER.includes(c))];
  el.innerHTML = cats.map(cat => {
    const items = produits.filter(p=>p.categorie===cat).sort((a,b)=>a.prix-b.prix);
    if (!items.length) return '';
    return `<div class="caisse-cat-title">${getEmoji(cat)} ${cat}</div>
    <div class="prod-grid">${items.map(p=>`
    <div class="prod-card">
      <div class="prod-img" onclick="addToTicket('${p.id}')">
        ${p.image_url?`<img src="${p.image_url}" alt="${p.nom}" onerror="this.parentElement.innerHTML='<span class=prod-emoji>${getEmoji(p.categorie)}</span>'">`:`<span class="prod-emoji">${getEmoji(p.categorie)}</span>`}
      </div>
      <div class="prod-info">
        <div class="prod-name">${p.nom}</div>
        <div class="prod-bottom"><span class="prod-price">${p.prix}$</span><span class="prod-pts">🎯${p.points||0}pts</span></div>
      </div>
      <div class="prod-qty-row">
        <button class="qty-btn" onclick="changeQty('qti-${p.id}',-1)">−</button>
        <input class="qty-input" id="qti-${p.id}" value="1" min="1" max="99" type="number">
        <button class="qty-btn" onclick="changeQty('qti-${p.id}',1)">+</button>
        <button class="qty-btn" onclick="addToTicket('${p.id}')" style="border-radius:5px;width:auto;padding:0 7px;font-size:10px">+</button>
      </div>
    </div>`).join('')}</div>`;
  }).join('');
  genTicket();
  if (ROLE === 'employe') trackActivity();
}

function changeQty(id, d) { const el=document.getElementById(id); if(el) el.value=Math.max(1,Math.min(99,(+el.value||1)+d)); }
function addToTicket(id) {
  const p = produits.find(x=>x.id===id); if(!p) return;
  const inp = document.getElementById(`qti-${id}`);
  const qty = Math.max(1,+(inp?.value||1));
  const ex = commande.find(x=>x.id===id);
  if (ex) ex.qte += qty; else commande.push({...p, qte:qty});
  if (inp) inp.value = 1;
  renderTicket();
}
function removeFromTicket(id) { commande = commande.filter(x=>x.id!==id); renderTicket(); }

function updateContrat() {
  const sel = document.getElementById('caisseContrat'); if(!sel) return;
  const opt = sel.options[sel.selectedIndex];
  if (sel.value === '__zouzous__') {
    contratActif = { id: '__zouzous__', pct: -10, nom: 'Annuler Zouzous', prixAchat: false };
  } else {
    contratActif = sel.value ? {id:sel.value, pct:+opt.dataset.pct, nom:opt.text, prixAchat:opt.dataset.pa==='true'} : null;
  }
  renderTicket();
}

function calcCmd() {
  const brut = commande.reduce((a,b)=>a+(b.prix*b.qte),0);
  if (contratActif?.prixAchat) {
    const net = commande.reduce((a,b)=>a+((b.cout_achat||0)*b.qte),0);
    const montantR = brut-net;
    return { brut, r:brut>0?Math.round(montantR/brut*100):0, montantR, net, tvx:Math.round(net*TVX) };
  }
  let r = 0;
  if (isMercredi()) r = Math.max(r,10);
  if (clientActif?.pass) { const pt=passTypes.find(p=>p.nom===clientActif.pass); if(pt?.reduction>0) r=Math.max(r,+pt.reduction); }
  if (contratActif) {
    if (contratActif.id === '__zouzous__') {
      r = Math.max(0, r - 10); // annule le -10% mercredi
    } else {
      r = Math.max(r, contratActif.pct);
    }
  }
  const montantR = Math.round(brut*r/100);
  const net = brut-montantR;
  return { brut, r, montantR, net, tvx:Math.round(net*TVX) };
}

function calcPts() {
  if (!clientActif?.pass) return 0;
  const pt = passTypes.find(p=>p.nom===clientActif.pass);
  return Math.floor(commande.reduce((a,b)=>a+(b.points*b.qte),0) * (pt?+pt.multiplicateur:0));
}

function renderTicket() {
  const linesEl = document.getElementById('tktLines'); if(!linesEl) return;
  linesEl.innerHTML = !commande.length ? '<div class="t-empty">Aucun article</div>' :
    commande.map(p => {
      let compHtml = '';
      if (p.composition) {
        let comp = [];
        try { comp = typeof p.composition === 'string' ? JSON.parse(p.composition) : (p.composition || []); } catch {}
        if (comp.length) {
          compHtml = `<div style="margin-left:6px;margin-top:2px;margin-bottom:4px">
            ${comp.map(c => `<div style="font-size:10px;color:#888;margin-bottom:1px">┊ ${c.qty * p.qte} ${c.nom}</div>`).join('')}
          </div>`;
        }
      }
      return `<div style="margin-bottom:3px">
        <div class="t-line"><div>${p.nom} ×${p.qte}</div><div style="display:flex;align-items:center;gap:5px"><span>${p.prix*p.qte}$</span><span class="t-del" onclick="removeFromTicket('${p.id}')">✕</span></div></div>
        ${compHtml}
      </div>`;
    }).join('');
  const c=calcCmd(), pts=calcPts();
  document.getElementById('tktTotal').textContent=`${c.brut}$`;
  document.getElementById('tktTVX').textContent=`TVX (10%) : ${c.tvx}$`;
  const rEl=document.getElementById('tktReduc');
  if(c.r>0){rEl.style.display='block';rEl.textContent=`Réduction -${c.r}% : -${c.montantR}$ → ${c.net}$`;}else rEl.style.display='none';
  document.getElementById('tktNet').textContent=`${c.net}$`;
  document.getElementById('tktPts').textContent=pts>0?`🎯 +${pts} points`:'';
  document.getElementById('tktClient').textContent=clientActif?`${clientActif.prenom} ${clientActif.nom}`:'Inconnu';
  const piEl=document.getElementById('tktPassInfo');
  if(clientActif?.pass){const pt=passTypes.find(p=>p.nom===clientActif.pass);piEl.textContent=`${clientActif.pass} • ×${pt?.multiplicateur||1}pts${pt?.reduction>0?` • -${pt.reduction}%`:''}`;}
  else piEl.textContent='';
  document.getElementById('tktEmploye').textContent=USER?.displayName||'—';
  // Paiement par points
  const ptsBox = document.getElementById('tktPointsBox');
  if (clientActif?.pass && (clientActif.points||0) > 0 && pts > 0) {
    document.getElementById('tktPtsDispo').textContent=(clientActif.points||0).toLocaleString('fr-FR');
    document.getElementById('tktCoutPts').textContent=pts.toLocaleString('fr-FR');
    document.getElementById('tktBtnPts').disabled = (clientActif.points||0) < pts;
    if(ptsBox) ptsBox.style.display='block';
  } else { if(ptsBox) ptsBox.style.display='none'; }
}

function genTicket() {
  const now=new Date(), p=v=>String(v).padStart(2,'0');
  document.getElementById('tktId').textContent=`BS-${p(now.getDate())}${p(now.getMonth()+1)}${now.getFullYear()}-${p(now.getHours())}${p(now.getMinutes())}`;
  document.getElementById('tktDate').textContent=now.toLocaleString('fr-FR');
  renderTicket();
}

function annulerCommande() {
  if(!confirm('Annuler la commande ?')) return;
  commande=[]; clientActif=null; contratActif=null;
  const s=document.getElementById('caisseClientSearch'); if(s) s.value='';
  const r=document.getElementById('caisseClientResults'); if(r) r.innerHTML='';
  const cc=document.getElementById('caisseContrat'); if(cc) cc.value='';
  renderTicket();
}

function ouvrirValidation() {
  if(!commande.length){alert('Commande vide.');return;}
  const c=calcCmd(),pts=calcPts();
  document.getElementById('validationRecap').innerHTML=
    commande.map(p=>`<div style="display:flex;justify-content:space-between;font-size:13px;font-weight:700;margin-bottom:3px"><div>${p.nom} ×${p.qte}</div><div>${p.prix*p.qte}$</div></div>`).join('')+
    `<hr style="border:none;border-top:1px dashed var(--border);margin:10px 0">
    <div style="text-align:right;font-size:12px">Brut : ${c.brut}$</div>
    <div style="text-align:right;font-size:12px;color:var(--muted)">TVX : ${c.tvx}$</div>
    ${c.r>0?`<div style="text-align:right;font-size:12px;color:var(--red)">Réduction -${c.r}% : -${c.montantR}$</div>`:''}
    <div style="text-align:right;font-size:16px;font-weight:900;margin-top:5px">TOTAL NET : ${c.net}$</div>
    ${pts>0?`<div style="text-align:right;font-size:12px;color:var(--green);margin-top:3px">🎯 +${pts} pts</div>`:''}`;
  openOv('ovValidation');
}

async function confirmerCommande(avecFacture=false) {
  const c=calcCmd(),pts=calcPts(),semaine=getSemaine();
  const snap=[...commande];
  await sb('commandes',{method:'POST',body:JSON.stringify({
    client_id:clientActif?.id||null, employe_discord_id:USER.id,
    items:JSON.stringify(commande), total:c.brut, reduction_pct:c.r,
    total_apres_reduction:c.net, points_gagnes:pts,
    contrat_id:(contratActif?.id && contratActif.id !== '__zouzous__') ? contratActif.id : null, semaine, tva:c.tvx
  })});
  if(clientActif&&pts>0) await sb(`clients?id=eq.${clientActif.id}`,{method:'PATCH',body:JSON.stringify({points:(clientActif.points||0)+pts})});
  await decrementStock();
  // Prime de vente
  await enregistrerPrimeVente(USER.id, c.net, semaine);

/* ══════════════════════════════════════════
   PRIMES DE VENTE
   Logique : % du CA de l'employé, avec plafond hebdo
══════════════════════════════════════════ */
async function enregistrerPrimeVente(discordId, montantCA, semaine) {
  const empData = await sb(`comptes_dashboard?discord_id=eq.${discordId}&select=poste,contrat`);
  const emp = empData?.[0];
  if (!emp) return;
  const taux = TAUX_PRIME[emp.poste] ?? 0.10;
  const plafond = PLAFOND_PRIME[emp.poste] ?? 50000;
  // Cumul primes vente semaine actuelle
  const primesExist = await sb(`primes?employe_discord=eq.${discordId}&semaine=eq.${semaine}&type=eq.vente`);
  const cumul = (primesExist||[]).reduce((a,p)=>a+p.montant,0);
  const restePlafond = Math.max(0, plafond - cumul);
  const primeBrute = Math.round(montantCA * taux);
  const prime = Math.min(primeBrute, restePlafond);
  if (prime > 0) {
    await sb('primes',{method:'POST',body:JSON.stringify({employe_discord:discordId, montant:prime, semaine, verse:false, type:'vente'})});
  }
}

/* ══════════════════════════════════════════
   PAIEMENT PAR POINTS
══════════════════════════════════════════ */
async function payerParPoints() {
  if (!clientActif) { alert('Aucun client sélectionné.'); return; }
  const pts = calcPts();
  const dispo = clientActif.points||0;
  if (dispo < pts) { alert(`Points insuffisants : ${dispo} pts disponibles, ${pts} requis.`); return; }
  if (!confirm(`Payer avec ${pts} points ? Reste : ${dispo-pts} pts.`)) return;
  const semaine = getSemaine();
  await sb('commandes',{method:'POST',body:JSON.stringify({
    client_id:clientActif.id, employe_discord_id:USER.id, items:JSON.stringify(commande),
    total:calcCmd().brut, reduction_pct:100, total_apres_reduction:0,
    points_gagnes:0, semaine, tva:0, paye_en_points:true
  })});
  await sb(`clients?id=eq.${clientActif.id}`,{method:'PATCH',body:JSON.stringify({points:dispo-pts})});
  clientActif.points = dispo-pts;
  await decrementStock();
  alert(`✅ Payé ! ${dispo-pts} points restants.`);
  commande=[]; clientActif=null; contratActif=null;
  const s=document.getElementById('caisseClientSearch');if(s)s.value='';
  const r=document.getElementById('caisseClientResults');if(r)r.innerHTML='';
  genTicket();
}

async function decrementStock() {
  for (const item of commande) {
    if (!item.composition) continue;
    let comp; try{comp=typeof item.composition==='string'?JSON.parse(item.composition):item.composition;}catch{continue;}
    for (const c of(comp||[])) {
      if (!c.stock_id) continue;
      const sd=await sb(`produits_stock?id=eq.${c.stock_id}&select=id,quantite`);
      const s=sd?.[0];
      if(s) await sb(`produits_stock?id=eq.${s.id}`,{method:'PATCH',body:JSON.stringify({quantite:Math.max(0,s.quantite-c.qty*item.qte)})});
    }
  }
}

    <div>Contrat : <strong>${contrat}</strong></div>

async function validerQuota(ticketId,discordId,quantite,type){
  await sb(`quotas_tickets?id=eq.${ticketId}`,{method:'PATCH',body:JSON.stringify({statut:'valide'})});
  if(discordId){
    const empD=await sb(`comptes_dashboard?discord_id=eq.${discordId}&select=id,quota_viande_validee,quota_patates_validee,contrat,poste`);
    const emp=empD?.[0];
    if(emp){
      const isV=type==='viande'||!type;
      const field=isV?'quota_viande_validee':'quota_patates_validee';
      const current=+(isV?emp.quota_viande_validee:emp.quota_patates_validee)||0;
      await sb(`comptes_dashboard?id=eq.${emp.id}`,{method:'PATCH',body:JSON.stringify({[field]:current+quantite})});
      // Vérifier si les 2 quotas sont à 100% → attribuer prime quota
      const updated=await sb(`comptes_dashboard?id=eq.${emp.id}&select=quota_viande_validee,quota_patates_validee,contrat`);
      const u=updated?.[0];
      if(u){
        const maxV=u.contrat==='CDI'?quotaCfg.cdi_viande:quotaCfg.cdd_viande;
        const maxP=u.contrat==='CDI'?quotaCfg.cdi_patates:quotaCfg.cdd_patates;
        // Lire depuis les tickets validés cette semaine (source fiable)
        const qSemCheck = await getQuotaSemaine(discordId, getSemaine());
        const pV = maxV > 0 ? Math.min(100, Math.round(qSemCheck.viande/maxV*100)) : 0;
        const pP = maxP > 0 ? Math.min(100, Math.round(qSemCheck.patates/maxP*100)) : 0;
        if(pV>=100&&pP>=100){
        const primeMax=u.contrat==='CDI'?quotaCfg.cdi_prime:quotaCfg.cdd_prime;
        // Supprimer l'ancienne prime quota non versée si elle existe
        // et en recréer une propre pour CETTE semaine
        await sb(`primes?employe_discord=eq.${discordId}&semaine=eq.${getSemaine()}&type=eq.quota&verse=eq.false`,{method:'DELETE'});
        // Calculer plafond
        const plafond=PLAFOND_PRIME[emp.poste]??50000;
        const primesVente=await sb(`primes?employe_discord=eq.${discordId}&semaine=eq.${getSemaine()}&type=eq.vente`);
        const cumulVente=(primesVente||[]).reduce((a,p)=>a+p.montant,0);
        const primeQuota=Math.min(primeMax,Math.max(0,plafond-cumulVente));
        if(primeQuota>0){
          await sb('primes',{method:'POST',body:JSON.stringify({
            employe_discord:discordId,
            montant:primeQuota,
            semaine:getSemaine(),
            verse:false,
            type:'quota'
          })});
          alert(`✅ Quota validé ! Prime quota de ${fmtMoney(primeQuota)} attribuée.`);
          loadQuotaPage();
          return;
         }
       }
      }
    }
  }
  const el=document.getElementById(`qt-${ticketId}`);if(el)el.remove();
  alert('✅ Quota validé.');
  loadQuotaPage();
}

async function refuserQuota(id){await sb(`quotas_tickets?id=eq.${id}`,{method:'PATCH',body:JSON.stringify({statut:'refuse'})});const el=document.getElementById(`qt-${id}`);if(el)el.remove();loadQuotaPage();}
async function attribuerPrimesQuota() {
  const semaine = getSemaine();
  const employes = await sb('comptes_dashboard?select=*&actif=eq.true&role=neq.gouvernement');
  if (!employes?.length) { alert('Aucun employé actif.'); return; }
  let count = 0;
  for (const emp of employes) {
    if (!emp.discord_id) continue;
    const maxV = emp.contrat==='CDI' ? quotaCfg.cdi_viande  : quotaCfg.cdd_viande;
    const maxP = emp.contrat==='CDI' ? quotaCfg.cdi_patates : quotaCfg.cdd_patates;
    const primeMax = emp.contrat==='CDI' ? quotaCfg.cdi_prime : quotaCfg.cdd_prime;
    const qSem = await getQuotaSemaine(emp.discord_id, semaine);
    const pV = maxV > 0 ? Math.min(100, Math.round(qSem.viande/maxV*100))  : 0;
    const pP = maxP > 0 ? Math.min(100, Math.round(qSem.patates/maxP*100)) : 0;
    if (pV < 100 || pP < 100) continue;
    const plafond = PLAFOND_PRIME[emp.poste] ?? 50000;
    const primesVente = await sb(`primes?employe_discord=eq.${emp.discord_id}&semaine=eq.${semaine}&type=eq.vente`);
    const cumulVente = (primesVente||[]).reduce((a,p) => a+p.montant, 0);
    const primeQuota = Math.min(primeMax, Math.max(0, plafond - cumulVente));
    if (primeQuota <= 0) continue;
    await sb(`primes?employe_discord=eq.${emp.discord_id}&semaine=eq.${semaine}&type=eq.quota&verse=eq.false`, { method:'DELETE' });
    await sb('primes', { method:'POST', body: JSON.stringify({
      employe_discord: emp.discord_id, montant: primeQuota,
      semaine, verse: false, type: 'quota'
    })});
    count++;
  }
  alert(`✅ Primes quota attribuées pour ${count} employé(s) !`);
  await loadPrimesTable();
}

  await sb(`produits_stock?id=eq.${id}`,{method:'PATCH',body:JSON.stringify({quantite:newQ})});

    const upd=await sb(`produits_stock?id=eq.${id}&select=nom,quantite,seuil_alerte`);

  }
  await sb('stock_mouvements',{method:'POST',body:JSON.stringify({produit_stock_id:id,type,quantite:qte,employe_discord:USER.id,notes:document.getElementById('mvtNotes')?.value||null})});

}

async function loadCalendrier(){const now=new Date();calYear=now.getFullYear();calMonth=now.getMonth();await renderCal();}
async function renderCal(){
  const MONTHS=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  const DAYS=['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
  const tEl=document.getElementById('calTitle');if(tEl)tEl.textContent=`${MONTHS[calMonth]} ${calYear}`;
  const first=new Date(calYear,calMonth,1).getDay();
  const start=first===0?6:first-1;
  const days=new Date(calYear,calMonth+1,0).getDate();
  const prev=new Date(calYear,calMonth,0).getDate();
  const from=`${calYear}-${String(calMonth+1).padStart(2,'0')}-01`;
  const to=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(days).padStart(2,'0')}`;
  const events=await sb(`reservations?select=*&date_debut=gte.${from}T00:00:00&date_debut=lte.${to}T23:59:59&order=date_debut.asc`)||[];
  window._calEvents=events;
  const today=new Date();
  const canAdd=ROLE==='direction'||USER_NIVEAU>=2;
  let html=`<table class="cal-table"><thead><tr>${DAYS.map(d=>`<th class="cal-th">${d}</th>`).join('')}</tr></thead><tbody>`;
  const rows=Math.ceil((start+days)/7);
  for(let r=0;r<rows;r++){html+='<tr>';
    for(let col=0;col<7;col++){
      const idx=r*7+col;let day,cur=true;
      if(idx<start){day=prev-(start-1-idx);cur=false;}
      else if(idx>=start+days){day=idx-(start+days)+1;cur=false;}
      else day=idx-start+1;
      const isToday=cur&&today.getDate()===day&&today.getMonth()===calMonth&&today.getFullYear()===calYear;
      const dayEvents=cur?events.filter(e=>new Date(e.date_debut).getDate()===day):[];
      const clickFn=cur?(canAdd?`onclick="detailJour(${calYear},${calMonth+1},${day})"`:`onclick="detailJour(${calYear},${calMonth+1},${day})"`):'';
      html+=`<td><div class="cal-cell${isToday?' today':''}${!cur?' other':''}" ${clickFn}>
        <div class="cal-num">${day}</div>
        ${dayEvents.slice(0,3).map(e=>`<span class="cal-pill ${e.type||''}" onclick="event.stopPropagation();detailEvent('${e.id}')">${e.titre||e.type}</span>`).join('')}
        ${dayEvents.length>3?`<span style="font-size:9px;color:var(--muted)">+${dayEvents.length-3}</span>`:''}
      </div></td>`;
    }
    html+='</tr>';
  }
  html+='</tbody></table>';
  const cEl=document.getElementById('calContainer');if(cEl)cEl.innerHTML=html;
}
function calNav(d){calMonth+=d;if(calMonth>11){calMonth=0;calYear++;}else if(calMonth<0){calMonth=11;calYear--;}renderCal();}
function detailJour(y,m,d){
  const events=(window._calEvents||[]).filter(e=>{const dd=new Date(e.date_debut);return dd.getFullYear()===y&&(dd.getMonth()+1)===m&&dd.getDate()===d;});
  const canAdd=ROLE==='direction'||USER_NIVEAU>=2;
  const pad=n=>String(n).padStart(2,'0');
  if(!events.length&&canAdd){prefillResa(y,m,d);return;}
  const html=events.map(e=>{const icon=e.type==='reservation'?'🍽️':e.type==='reunion'?'📋':'🎉';const debut=new Date(e.date_debut).toLocaleString('fr-FR',{weekday:'long',day:'numeric',month:'long',hour:'2-digit',minute:'2-digit'});return`<div style="padding:12px;background:var(--card2);border-radius:8px;margin-bottom:8px;border-left:3px solid ${e.type==='reunion'?'#9b59b6':e.type==='reservation'?'var(--blue)':'var(--red)'}"><div style="font-weight:800;font-size:13px;margin-bottom:3px">${icon} ${e.titre||e.type}</div><div style="font-size:11px;color:var(--muted)">🗓️ ${debut}</div>${e.notes?`<div style="font-size:12px;margin-top:6px">${e.notes}</div>`:''} ${canAdd?`<button class="btn btn-danger btn-sm" style="margin-top:8px" onclick="delEvent('${e.id}')">🗑️</button>`:''}</div>`;}).join('');
  document.getElementById('ovDocsTitle').textContent=`📅 ${pad(d)}/${pad(m)}/${y}`;
  document.getElementById('ovDocsContent').innerHTML=html+(canAdd?`<button class="btn btn-primary btn-sm" style="margin-top:8px" onclick="closeOv('ovDocs');prefillResa(${y},${m},${d})">➕ Ajouter</button>`:'');
  openOv('ovDocs');
}
function detailEvent(id){const e=(window._calEvents||[]).find(x=>x.id===id);if(!e)return;const icon=e.type==='reservation'?'🍽️':e.type==='reunion'?'📋':'🎉';const debut=new Date(e.date_debut).toLocaleString('fr-FR',{weekday:'long',day:'numeric',month:'long',hour:'2-digit',minute:'2-digit'});document.getElementById('ovDocsTitle').textContent=`${icon} ${e.titre||e.type}`;document.getElementById('ovDocsContent').innerHTML=`<div style="padding:14px;background:var(--card2);border-radius:8px"><div style="font-size:12px;color:var(--muted);margin-bottom:6px">🗓️ ${debut}</div>${e.notes?`<div style="font-size:13px">${e.notes}</div>`:''}</div>${(ROLE==='direction'||USER_NIVEAU>=2)?`<button class="btn btn-danger btn-sm" style="margin-top:12px" onclick="delEvent('${e.id}')">🗑️ Supprimer</button>`:''}`;openOv('ovDocs');}
async function delEvent(id){if(!confirm('Supprimer ?'))return;await sb(`reservations?id=eq.${id}`,{method:'DELETE'});closeOv('ovDocs');renderCal();}
function prefillResa(y,m,d){const pad=n=>String(n).padStart(2,'0');document.getElementById('resaDebut').value=`${y}-${pad(m)}-${pad(d)}T12:00`;document.getElementById('resaFin').value=`${y}-${pad(m)}-${pad(d)}T14:00`;openOv('ovResa');}
async function saveResa(){const titre=document.getElementById('resaTitre').value.trim(),debut=document.getElementById('resaDebut').value;if(!titre||!debut){alert('Titre et date obligatoires.');return;}await sb('reservations',{method:'POST',body:JSON.stringify({titre,date_debut:debut,date_fin:document.getElementById('resaFin').value||null,type:document.getElementById('resaType').value,notes:document.getElementById('resaNotes').value.trim()||null})});closeOv('ovResa');renderCal();}

async function _loadStatsCore(cardsId,cmdsId,finId,heatId,paliersId){
  const semaine=getSemaine();
  const [cmds, clients, employes, caData, livr] = await Promise.all([
    sb(`commandes?select=*&semaine=eq.${semaine}`),
    sb('clients?select=id'),
    sb('comptes_dashboard?select=id&actif=eq.true&role=neq.gouvernement'),
    sb('parametres?cle=eq.ca_semaine'),
    sb(`livraisons?select=montant&semaine=eq.${semaine}`)
  ]);
  const ca=+(caData?.[0]?.valeur||0);
  const caLiv=(livr||[]).reduce((a,l)=>a+(l.montant||0),0);
  const imp=Math.round(calcImpot(ca+caLiv));
  const cardsEl=document.getElementById(cardsId);
  if(cardsEl)cardsEl.innerHTML=[
    {label:'Commandes',val:(cmds||[]).length,icon:'📦',accent:'var(--blue)'},
    {label:'CA Semaine',val:fmtMoney(ca),icon:'💰',accent:'var(--green)'},
    {label:'Livraisons',val:fmtMoney(caLiv),icon:'🚚',accent:'var(--orange)'},
    {label:'Employés actifs',val:(employes||[]).length,icon:'👤',accent:'var(--red)'}
  ].map(s=>`<div class="stat" style="--accent:${s.accent}"><div class="stat-icon">${s.icon}</div><div class="stat-label">${s.label}</div><div class="stat-val">${s.val}</div></div>`).join('');
  const cmdsEl=document.getElementById(cmdsId);
  if(cmdsEl){if(!(cmds||[]).length)cmdsEl.innerHTML='<p style="color:var(--muted)">Aucune commande.</p>';
  else cmdsEl.innerHTML=`<table><thead><tr><th>Heure</th><th>Total</th><th>Réduction</th></tr></thead><tbody>`+(cmds||[]).slice(0,10).map(c=>`<tr><td>${new Date(c.created_at||Date.now()).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit',timeZone:'Europe/Paris'})}</td><td><strong>${fmtMoney(c.total_apres_reduction||c.total||0)}</strong></td><td>${c.reduction_pct?`<span class="badge badge-orange">-${c.reduction_pct}%</span>`:'—'}</td></tr>`).join('')+'</tbody></table>';}
  const finEl=document.getElementById(finId);
  if(finEl)finEl.innerHTML=`<div style="display:flex;flex-direction:column;gap:8px">
    <div style="display:flex;justify-content:space-between;padding:10px;background:var(--card2);border-radius:7px"><span>CA brut</span><strong>${fmtMoney(ca)}</strong></div>
    <div style="display:flex;justify-content:space-between;padding:10px;background:var(--card2);border-radius:7px"><span>Livraisons</span><strong style="color:var(--orange)">+${fmtMoney(caLiv)}</strong></div>
    <div style="display:flex;justify-content:space-between;padding:10px;background:var(--card2);border-radius:7px"><span>Taux impôt</span><strong style="color:var(--red)">${tauxImpot(ca+caLiv)}</strong></div>
    <div style="display:flex;justify-content:space-between;padding:10px;background:rgba(192,57,43,.07);border-radius:7px;border:1px solid rgba(192,57,43,.18)"><span>Impôts estimés</span><strong style="color:var(--red)">${fmtMoney(imp)}</strong></div>
  </div>`;
  if(heatId){const hEl=document.getElementById(heatId);if(hEl)renderHeatmap(cmds,hEl);}
  if(paliersId){
    const pEl=document.getElementById(paliersId);
    const paliers=[{min:0,max:199999,t:'0%'},{min:200000,max:399999,t:'5%'},{min:400000,max:599999,t:'8%'},{min:600000,max:799999,t:'11%'},{min:800000,max:999999,t:'14%'},{min:1000000,max:2499999,t:'17%'},{min:2500000,max:Infinity,t:'19%'}];
    if(pEl)pEl.innerHTML=`<table><thead><tr><th>Tranche</th><th>Taux</th><th></th></tr></thead><tbody>`+paliers.map(p=>`<tr><td>${p.min.toLocaleString('fr-FR')}$ — ${p.max===Infinity?'+∞':p.max.toLocaleString('fr-FR')+'$'}</td><td><span class="badge badge-blue">${p.t}</span></td><td>${(ca+caLiv)>=p.min&&(ca+caLiv)<=(p.max===Infinity?Infinity:p.max)?'<span class="badge badge-orange">📍 Votre tranche</span>':''}</td></tr>`).join('')+'</tbody></table>';
  }
}

function renderHeatmap(cmds,el){
  const days=['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'],hours=Array.from({length:24},(_,i)=>String(i).padStart(2,'0')+'h');
  const grid=Array.from({length:7},()=>Array(24).fill(0));
  (cmds||[]).forEach(c=>{const d=new Date(c.created_at||Date.now());grid[(d.getDay()+6)%7][d.getHours()]++;});
  const mx=Math.max(1,...grid.flat());
  el.innerHTML=`<div style="overflow-x:auto"><div style="display:grid;grid-template-columns:44px repeat(24,1fr);gap:2px;min-width:640px;margin-top:8px"><div></div>${hours.map(h=>`<div style="text-align:center;font-size:9px;color:var(--muted);padding-bottom:3px">${h}</div>`).join('')}${days.map((day,di)=>`<div style="font-size:10px;color:var(--muted);display:flex;align-items:center">${day}</div>${grid[di].map(v=>`<div style="height:24px;border-radius:3px;background:rgba(192,57,43,${v===0?0.04:0.1+v/mx*0.85})" title="${v}"></div>`).join('')}`).join('')}</div></div>`;
}
