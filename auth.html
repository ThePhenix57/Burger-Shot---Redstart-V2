<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Burger Shot — Chargement</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#0d0d0d;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:16px;}
  .spin{width:36px;height:36px;border:3px solid rgba(255,255,255,.1);border-top-color:#c0392b;border-radius:50%;animation:s .7s linear infinite;}
  @keyframes s{to{transform:rotate(360deg);}}
  p{color:#777;font-family:sans-serif;font-size:13px;}
</style>
</head>
<body>
<div class="spin"></div>
<p>Connexion en cours...</p>
<script>
  (function() {
    try {
      const hash = location.hash.slice(1);
      if (!hash) { location.href = '/?error=no_session'; return; }

      const data = JSON.parse(atob(hash));
      sessionStorage.setItem('bs_user', JSON.stringify(data));

      // Vérifie que c'est bien écrit avant de rediriger
      const check = sessionStorage.getItem('bs_user');
      if (!check) { location.href = '/?error=storage_failed'; return; }

      // Petit délai pour être sûr que sessionStorage est flush
      setTimeout(function() {
        location.replace('/dashboard.html');
      }, 100);

    } catch(e) {
      console.error(e);
      location.href = '/?error=parse_error';
    }
  })();
</script>
</body>
</html>
